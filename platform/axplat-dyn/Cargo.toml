[package]
name = "axplat-dyn"
version.workspace = true
authors = ["周睿 <zrufo747@outlook.com>"]
categories.workspace = true
description = "A dynamic platform module for ArceOS, providing runtime platform detection and configuration"
edition.workspace = true
keywords.workspace = true
license.workspace = true
repository.workspace = true

[features]
default = ["smp", "irq"]
smp = ["axplat/smp"]
irq = ["axplat/irq"]
uspace = ["somehal/uspace"]
hv = ["somehal/hv", "axcpu/arm-el2"]
rk3588-clk = ["dep:rk3588-clk"]
rk3568-clk = ["dep:rk3568_clk"]
sdmmc = ["dep:sdmmc"]
rockchip-pm = ["dep:rockchip-pm"]
phytium-blk = ["dep:phytium-mci"]
serial = ["dep:some-serial"]

[dependencies]
anyhow = { version = "1", default-features = false }
axalloc.workspace = true
axconfig-macros = "0.4.1"
axcpu.workspace = true
axdriver_base.workspace = true
axdriver_block.workspace = true
axdriver_virtio = { workspace = true, features = ["block"] }
axerrno.workspace = true
axklib.workspace = true
axplat.workspace = true
dma-api = "0.7"
fdt-edit = "0.2"
heapless = "0.9"
log.workspace = true
memory_addr.workspace = true
percpu = { workspace = true, features = ["custom-base"] }
rd-block = "0.1"
rdif-clk = "0.5"
rdrive = "0.20"
rk3568_clk = { version = "0.1", optional = true }
rk3588-clk = { version = "0.1", optional = true }
rockchip-pm = { version = "0.4", optional = true }
phytium-mci = { version = "0.1", default-features = false, features = ["pio"], optional = true }
sdmmc = { version = "0.1", default-features = false, features = ["pio"], optional = true }
somehal = "0.6"
some-serial = { version = "0.3.1", optional = true }
spin = "0.10"
