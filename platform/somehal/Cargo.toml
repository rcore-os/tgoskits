[package]
authors.workspace = true
categories.workspace = true
description.workspace = true
edition.workspace = true
keywords.workspace = true
license.workspace = true
name = "somehal"
repository.workspace = true
version = "0.5.0"

[features]
efi = ["someboot/efi"]
hv = ["someboot/hv"]
mmu = ["someboot/mmu"]
uspace = ["mmu", "someboot/uspace"]

[dependencies]
