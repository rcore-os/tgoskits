[package]
name = "axplat-riscv64-visionfive2"
version = "0.1.2"
edition.workspace = true
authors = ["朝倉水希 <asakuramizu111@gmail.com>"]
description = "Implementation of axplat hardware abstraction layer for RISC-V VisionFive2 board"
repository = "https://github.com/rcore-os/tgoskits"
keywords = ["arceos", "os", "hal", "embedded", "riscv"]
categories = ["embedded", "no-std", "hardware-support", "os"]
license = "MIT OR Apache-2.0"

[features]
fp-simd = ["ax-cpu/fp-simd"]
irq = ["ax-plat/irq", "dep:ax-riscv-plic"]
rtc = ["dep:riscv_goldfish"]
smp = ["ax-plat/smp"]

[target.'cfg(target_arch = "riscv64")'.dependencies]
ax-config-macros = { workspace = true }
ax-cpu = { workspace = true }
ax-kspin = { workspace = true }
ax-lazyinit = { workspace = true }
ax-plat = { workspace = true }
ax-riscv-plic = { workspace = true, optional = true }
log = "0.4"
riscv = "0.14"
riscv_goldfish = { version = "0.1", optional = true }
sbi-rt = { version = "0.0.3", features = ["legacy"] }
uart_16550 = "0.4.0"

[package.metadata.docs.rs]
targets = ["riscv64gc-unknown-none-elf"]
