    "drivers/ax-driver",
    "drivers/blk/*",
    "drivers/examples/*",
    "drivers/firmware/*",
    "drivers/intc/*",
    "drivers/interface/*",
    "drivers/net/*",
    "drivers/npu/*",
    "drivers/pci/*",
    "drivers/rdrive*",
    "drivers/rtc/*",
    "drivers/serial/*",
    "drivers/soc/rockchip/*",
    "drivers/tpu/*",
    "drivers/usb/test_crates/*",
    "drivers/usb/usb-device/hid/*",
    "drivers/usb/usb-device/uvc",
    "drivers/usb/usb-host",
