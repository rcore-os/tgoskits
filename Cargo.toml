[workspace]
members = [
    "apps/*",
    "crates/*",
    "platform/*",
    "test-suit/*",
    "driver/rdrive-macros",
    "driver/rdrive",
    "driver/interface/*",
    "driver/block/*",
    "driver/eth/*",
    "xtask",
]
resolver = "3"

[workspace.package]
authors = ["周睿 <zrufo747@outlook.com>"]
categories = ["embedded", "no-std"]
description = "A kernel."
edition = "2024"
keywords = ["os"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/drivercraft/sparreal-os"

[workspace.dependencies]

anyhow = { version = "1.0", default-features = false }
byte-unit = { version = "5", default-features = false, features = ["byte"] }
derive_more = { version = "2.1", default-features = false, features = ["full"] }
fdt-edit = "0.2.3"
fdt-raw = "0.3"
heapless = { version = "0.9" }
log = "0.4"
ranges-ext = { version = "0.6", path = "crates/ranges-ext" }
thiserror = { version = "2", default-features = false }
tock-registers = "0.10"
uefi = "0.36"

rdrive = { version = "0.20", path = "driver/rdrive" }

dma-api = { version = "0.7", path = "crates/dma-api" }
mmio-api = { path = "crates/mmio-api", version = "0.2" }

bare-test = { path = "crates/bare-test", version = "0.8" }
bare-test-macros = { path = "crates/bare-test-macros", version = "0.3" }
kasm-aarch64 = { path = "crates/kasm-aarch64", version = "0.2" }
kernutil = { path = "crates/kernutil", version = "0.2" }
page-table-generic = { path = "crates/page-table-generic", version = "0.7" }
someboot = { path = "crates/someboot", version = "0.1" }
somehal = { path = "platform/somehal", version = "0.6" }
somehal-macros = { path = "crates/somehal-macros", version = "0.1" }
sparreal-kernel = { path = "crates/sparreal-kernel", version = "0.15" }
sparreal-macros = { path = "crates/sparreal-macros", version = "0.10" }
sparreal-rt = { path = "platform/sparreal-rt", version = "0.13" }

rdif-intc = { path = "driver/interface/rdif-intc", version = "0.14" }
rdif-base = { path = "driver/interface/rdif-base", version = "0.8" }
rdif-def = { path = "driver/interface/rdif-def", version = "0.2" }
rdif-pcie = { path = "driver/interface/rdif-pcie", version = "0.2" }
rdif-block = { path = "driver/interface/rdif-block", version = "0.7" }
rdif-eth = { path = "driver/interface/rdif-eth", version = "0.1" }

rd-block = { path = "driver/block/rd-block", version = "0.1" }
pcie = { path = "driver/bus/pcie", version = "0.6" }

arm-gic-driver = { version = "0.17", path = "driver/intc/gic" }
