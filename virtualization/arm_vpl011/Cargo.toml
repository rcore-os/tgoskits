[package]
name = "arm_vpl011"
version = "0.1.0"
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "A no_std Arm PL011 virtual UART model for AxVM"

[features]
default = []
std = ["ax-kspin/host-test"]

[dependencies]
ax-kspin.workspace = true
axdevice_base.workspace = true
bitflags.workspace = true
thiserror.workspace = true

[dev-dependencies]
ax-kspin = { workspace = true, features = ["host-test"] }

[package.metadata.docs.rs]
all-features = true
targets = ["aarch64-unknown-none-softfloat", "x86_64-unknown-linux-gnu"]
