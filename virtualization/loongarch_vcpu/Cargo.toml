[package]
name = "loongarch_vcpu"
version = "0.5.8"
edition.workspace = true
authors = ["RCore Team <yuchen@tsinghua.edu.cn>"]
description = "LoongArch VCPU implementation for ArceOS Hypervisor"
repository = "https://github.com/rcore-os/tgoskits"
categories = ["embedded", "no-std"]
keywords = ["hypervisor", "loongarch", "vcpu"]
license = "Apache-2.0"

[package.metadata.docs.rs]
targets = ["loongarch64-unknown-none-softfloat"]

[dependencies]
ax-kspin.workspace = true
log = "0.4"

ax-errno = { workspace = true }
ax-percpu = { workspace = true }
ax-memory-addr = { workspace = true }
ax-page-table-multiarch = { workspace = true }
ax-crate-interface = { workspace = true }
axvm-types = { workspace = true }
loongArch64 = "0.2"
