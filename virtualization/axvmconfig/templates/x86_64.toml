[machine]
mode = "virtual"
firmware = "auto"

[base]
id = 1
name = "GuestVM-x86_64"
cpu_num = 1
phys_cpu_sets = [1]

[kernel]
entry_point = 0x8000
enable_bios = true
boot_protocol = "multiboot"
bios_path = "rvm-bios.bin"
bios_load_addr = 0x8000
kernel_path = "arceos-x86_64.bin"
kernel_load_addr = 0x20_0000
image_location = "fs"

[[memory.regions]]
guest_base = 0x0
size = 0x100_0000
permissions = "rwx"
backing = { kind = "allocate" }

[devices]
disable_defaults = []
deny = []
