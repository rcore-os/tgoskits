[package]
name = "axvcpu"
authors = ["aarkegz <aarkegz@gmail.com>"]
version = "0.6.0"
edition.workspace = true
categories = ["virtualization", "no-std"]
description = "Virtual CPU abstraction for ArceOS hypervisor"
repository = "https://github.com/arceos-hypervisor/axvcpu"
keywords = ["vcpu", "hypervisor", "arceos"]
license = "Apache-2.0"

[dependencies]
ax-errno = { workspace = true }
ax-memory-addr = { workspace = true }
ax-page-table-entry = { workspace = true }
ax-percpu = { workspace = true }
axdevice_base = { workspace = true }
axvm-types = { workspace = true }
ax-kspin = { workspace = true }
