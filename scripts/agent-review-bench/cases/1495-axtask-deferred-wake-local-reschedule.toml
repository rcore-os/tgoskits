[[expected]]
id = "axtask-owner-drain-needs-local-reschedule"
path = "os/arceos/modules/axtask/src/run_queue.rs"
line = 1125
severity = "major"
description = "When the owner CPU drains a deferred wake, it always calls kick_remote_cpu(target). select_wake_run_queue can choose the same owner CPU as target, and that self-kick is a no-op. The runnable task can therefore miss the reschedule that the original remote waker supplied and remain queued while the owner enters idle or until a later tick."
match_if = "A finding must identify that the deferred-wake drain loses required scheduling notification when target is the current/owner CPU because kick_remote_cpu is ineffective for a self-target, and require an explicit local reschedule path or equivalent preserved handoff state."
