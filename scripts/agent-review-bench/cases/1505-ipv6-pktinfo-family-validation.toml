description = "The new IPV6_RECVPKTINFO/IPV6_PKTINFO fast paths return success before ensure_ipv6_socket is called. An AF_INET socket can consequently use an IPPROTO_IPV6 option successfully, unlike Linux and the existing IPv6 option paths, which reject the family mismatch with ENOPROTOOPT. The getsockopt path has the same issue."
