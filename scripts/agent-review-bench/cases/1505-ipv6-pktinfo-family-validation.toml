match_if = "评审必须指出：新接受的 IPv6 pktinfo 选项在 set 和/或 get 路径中绕过 IPv6 套接字地址族校验，导致 AF_INET 套接字被错误接受；并要求在成功返回前调用 ensure_ipv6_socket 或执行等价校验。"
