[package]
authors.workspace = true
categories.workspace = true
edition.workspace = true
keywords.workspace = true
license.workspace = true
name = "axbuild"
repository.workspace = true
version = "0.4.21"
description = "An OS build lib toolkit used by arceos"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(axtest)'] }

[target.'cfg(any(windows, unix))'.dependencies]
anyhow = { workspace = true }
axvmconfig = { workspace = true, features = ["std"] }
cargo_metadata = "0.23"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4.6", features = ["derive"] }
colored = { version = "3" }
env_logger = { workspace = true }
futures-util = "0.3"
flate2 = { version = "1.0" }
indicatif = "0.18"
jkconfig = { version = "0.1" }
log = "0.4"
object = "0.38"
ostool = { workspace = true }
regex = { version = "1.12" }
reqwest = { version = "0.13", features = ["stream"] }
addr2line = "0.26"
rustc-demangle = "0.1"
schemars = { workspace = true, features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1" }
sha2 = { version = "0.10" }
tar = { version = "0.4" }
tempfile = "3"
tokio = { version = "1.0", features = ["fs", "io-util", "macros", "process", "rt-multi-thread", "time"] }
toml = { workspace = true, features = ["serde", "parse", "display"] }
tracing = "0.1"
tracing-log = "0.2"
tracing-subscriber = { version = "0.3", features = ["fmt", "std", "time"] }
xz2 = "0.1"
raw-cpuid = "11.0"
proc-macro2 = { version = "1", features = ["span-locations"] }
quote = "1"
syn = { version = "2", features = ["full", "visit"] }
walkdir = "2"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.59", features = [
    "Win32_Foundation",
    "Win32_System_Console",
    "Win32_System_Pipes",
] }

[target.'cfg(unix)'.dependencies]
libc = "0.2"
