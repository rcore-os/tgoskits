[package]
name = "starry-mm"
version = "0.1.0"
edition.workspace = true
description = "Linux virtual-memory policy for StarryOS"
repository.workspace = true
license.workspace = true

[features]
default = []
starry-strict-commit = []

[dependencies]
ax-errno.workspace = true
ax-memory-addr.workspace = true
log.workspace = true
ax-page-table.workspace = true
scope-local.workspace = true
spin = { workspace = true, features = ["mutex", "spin_mutex"] }
thiserror = { workspace = true, default-features = false }

[dev-dependencies]
ax-percpu = { workspace = true, features = ["host-test"] }
cpu-local = { workspace = true, features = ["host-test"] }
