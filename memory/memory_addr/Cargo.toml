[package]
name = "ax-memory-addr"
description = "Wrappers and helper functions for physical and virtual addresses"
keywords = ["arceos", "address", "virtual-memory"]

version = "0.6.9"
repository = "https://github.com/rcore-os/tgoskits"
edition.workspace = true
authors = ["Yuekai Jia <equation618@gmail.com>", "aarkegz <aarkegz@gmail.com>"]
categories = ["os", "memory-management", "no-std"]
license = "Apache-2.0"

[dependencies]
axtest = { workspace = true, optional = true }

[features]
axtest = ["dep:axtest"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(axtest)'] }
