args = [
    "-nographic",
    "-m",
    "512M",
    "-cpu",
    "rv64",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-riscv64-alpine.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0"
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/busybox-tests.sh"
success_regex = ["(?m)^PASS: \\d+  FAIL: 0", "(?m)^Test run completed"]
fail_regex = ['(?i)\bpanic(?:ked)?\b', '(?m)^FAIL: ']
timeout = 600

[host_http_server]
bind = "127.0.0.1"
port = 18383
body = "busybox wget local ok\n"
