args = [
    "-nographic",
    "-m",
    "512M",
    "-cpu",
    "cortex-a53",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-aarch64-alpine.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0,net=10.0.2.0/24,dhcpstart=10.0.2.15",
    "-device",
    "virtio-net-pci,netdev=net1",
    "-netdev",
    "user,id=net1,net=10.0.3.0/24,dhcpstart=10.0.3.15",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/dual-net-tests.sh"
success_regex = ["(?m)^DUAL_NET_TEST_PASSED\\s*$"]
fail_regex = ['(?i)\bpanic(?:ked)?\b', "(?m)^lockdep fatal violation\\s*$", "(?m)^DUAL_NET_TEST_FAILED:"]
timeout = 360

[host_http_server]
bind = "127.0.0.1"
port = 18382
body_size = 1048576
body_byte = 68
