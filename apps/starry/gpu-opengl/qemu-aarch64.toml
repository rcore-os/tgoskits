# gpu-opengl aarch64 - desktop-OpenGL compute carpet on Mesa llvmpipe (the CPU software GL driver over
# the LLVM JIT, reached through surfaceless EGL). Provisioned from Alpine edge as musl packages
# (mesa-gl + mesa-egl + mesa-dri-gallium), which Alpine builds for aarch64, so the carpet runs
# on-target; no host GPU. -cpu max exposes the full AArch64 feature set (LSE atomics, dotprod, ARMv8.2+
# NEON) that llvmpipe's LLVM JIT dispatches to at runtime. -smp 1: single vCPU, so llvmpipe runs every
# workgroup on one thread. 4096M: the llvmpipe LLVM JIT + device buffers are heap-heavy.
args = [
    "-nographic", "-cpu", "max", "-m", "4096M", "-smp", "1",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-aarch64-alpine.img",
    "-device", "virtio-net-pci,netdev=net0", "-netdev", "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = "sh /usr/bin/run_all.sh"
success_regex = ['(?m)^TEST PASSED\s*$']
fail_regex = ['(?i)\bpanic(?:ked)?\b', '(?m)^TEST FAILED\s*$']
timeout = 12000
