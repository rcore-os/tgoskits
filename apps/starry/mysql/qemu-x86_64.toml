args = [
    "-machine",
    "q35",
    "-nographic",
    "-m",
    "2G",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-mysql.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
    "-append",
    "root=/dev/sda",
    "-snapshot",
]
uefi = false
to_bin = false
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/mysql-test.sh"
success_regex = ["(?m)^MYSQL_TEST_PASSED\\s*$"]
fail_regex = [
    "(?i)\\bpanic(?:ked)?\\b",
    "(?i)page fault",
    "(?i)segmentation fault",
    "(?m)^MYSQL_TEST_FAILED(?:[: ].*)?$",
]
timeout = 2400
