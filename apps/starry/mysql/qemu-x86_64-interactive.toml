timeout = 0
shell_prefix = "root@starry:"
uefi = false
to_bin = false
success_regex = []
fail_regex = []

args = [
    "-machine",
    "q35",
    "-nographic",
    "-m",
    "2G",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-mysql.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
    "-append",
    "root=/dev/sda",
    "-snapshot",
]

shell_init_cmd = "/usr/bin/mysql-interactive.sh"
