args = [
  "-machine",
  "virt",
  "-cpu",
  "la464",
  "-nographic",
  "-m",
    "1024M",
  "-device",
  "virtio-blk-pci,drive=disk0",
  "-drive",
  "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-loongarch64-alpine.img",
  "-device",
  "virtio-net-pci,netdev=net0",
  "-netdev",
  "user,id=net0",
]
to_bin = true
uefi = false
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/stress-ng-test.sh"
success_regex = ["(?m)^STRESS_NG_TEST_PASSED\\s*$"]
fail_regex = ['(?i)\bpanic(?:ked)?\b', "(?m)^STRESS_NG_TEST_FAILED\\s*$"]
timeout = 120
