args = [
    "-nographic",
    "-m", "512M",
    "-cpu", "max",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-glibc-test.img",
    "-device", "virtio-net-pci,netdev=net0",
    "-netdev", "user,id=net0",
]
uefi = false
to_bin = false
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/glibc-test.sh"
success_regex = ["ALL TESTS COMPLETED"]
fail_regex = [
    "(?m)RC=[^0]",
    "(?i)not found",
    "(?i)no such file",
    "(?i)segmentation fault",
    "(?i)kernel panic",
    "(?i)panicked at",
    "(?i)unimplemented syscall",
    "(?i)enosys",
    "(?i)unsupported elf",
]
timeout = 120
