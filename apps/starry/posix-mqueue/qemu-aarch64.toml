# posix-mqueue aarch64 - POSIX message queue (mq_*) carpet on StarryOS.
# Platform: dynamic (uefi=false / to_bin=true is the dynamic platform's raw-binary
# boot path). -cpu cortex-a72 is a 64-bit core (the virt default would pick AArch32
# and never boot the 64-bit kernel). All test binaries are static musl, injected into
# the managed Alpine rootfs overlay by prebuild.sh.
args = [
    "-nographic", "-m", "1024M", "-smp", "1", "-cpu", "cortex-a72",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-aarch64-alpine.img",
    "-device", "virtio-net-pci,netdev=net0", "-netdev", "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = "sh /usr/bin/run-mq-tests.sh"
success_regex = ['(?m)^TEST PASSED\s*$']
fail_regex = ['(?i)\bpanic(?:ked)?\b', '(?m)^TEST FAILED\s*$', '(?i)kernel panic']
timeout = 2400
