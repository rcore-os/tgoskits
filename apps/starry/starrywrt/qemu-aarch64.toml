# StarryWRT aarch64 - OpenWrt-userland distribution on StarryOS. Platform: dynamic (uefi=false /
# to_bin=true). -cpu cortex-a72 is a 64-bit core (the virt default would pick AArch32). prebuild
# cross-compiles uci + opkg and provisions dropbear + dnsmasq from Alpine over virtio-net; the
# boot gate verifies every software stack.
args = [
    "-nographic", "-m", "1024M", "-smp", "1", "-cpu", "cortex-a72",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-aarch64-alpine.img",
    "-device", "virtio-net-pci,netdev=net0", "-netdev", "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = "sh /usr/bin/run-starrywrt.sh"
success_regex = ['(?m)^TEST PASSED\s*$']
fail_regex = ['(?i)\bpanic(?:ked)?\b', '(?m)^TEST FAILED\s*$']
timeout = 4200
