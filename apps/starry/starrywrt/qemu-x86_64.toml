# StarryWRT x86_64 - the OpenWrt-userland distribution on the StarryOS kernel. x86_64 boots the
# ELF kernel via the dynamic platform + OVMF (xtask prepares firmware automatically). prebuild
# cross-compiles uci + opkg from OpenWrt source and provisions the dropbear + dnsmasq stacks
# from Alpine (virtio-net user networking), then assembles the OpenWrt /etc layout. The boot
# gate prints the StarryWRT banner and verifies every software stack. rootfs grown for the
# apk cache + generated keys.
args = [
    "-nographic", "-m", "1024M", "-smp", "1",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-alpine.img",
    "-device", "virtio-net-pci,netdev=net0", "-netdev", "user,id=net0",
]
uefi = false
to_bin = false
shell_prefix = "root@starry:"
shell_init_cmd = "sh /usr/bin/run-starrywrt.sh"
success_regex = ['(?m)^TEST PASSED\s*$']
fail_regex = ['(?i)\bpanic(?:ked)?\b', '(?m)^TEST FAILED\s*$']
timeout = 2400
