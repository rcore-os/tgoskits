# StarryWRT loongarch64 - OpenWrt-userland distribution on StarryOS. Platform: dynamic
# (axplat-dyn) - build-loongarch64*.toml carries no ax-hal/plat-static; uefi=false / to_bin=true
# is the dynamic platform's raw-binary boot path, and the build pulls ax-driver/serial for the
# console. prebuild cross-compiles uci + opkg (loongarch64-linux-musl, out-of-band) and
# provisions dropbear + dnsmasq from Alpine over virtio-net; the boot gate verifies every stack.
args = [
    "-machine", "virt", "-cpu", "la464", "-nographic", "-m", "1024M", "-smp", "1",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-loongarch64-alpine.img",
    "-device", "virtio-net-pci,netdev=net0", "-netdev", "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = "sh /usr/bin/run-starrywrt.sh"
success_regex = ['(?m)^TEST PASSED\s*$']
fail_regex = ['(?i)\bpanic(?:ked)?\b', '(?m)^TEST FAILED\s*$']
timeout = 7200
