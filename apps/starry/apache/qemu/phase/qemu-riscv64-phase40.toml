args = [
    "-nographic",
    "-m",
    "1G",
    "-cpu",
    "rv64",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-riscv64-alpine.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/apache-runner.sh phase phase40"
success_regex = ["(?m)^APACHE_RUNNER_PASSED\\b"]
fail_regex = ["(?i)\\bpanic(?:ked)?\\b", "(?m)^APACHE_RUNNER_FAILED\\b"]
timeout = 3600
