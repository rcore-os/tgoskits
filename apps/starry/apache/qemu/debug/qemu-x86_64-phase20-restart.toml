args = [
    "-nographic",
    "-m",
    "1G",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-alpine.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
]
uefi = false
to_bin = false
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/apache-runner.sh debug phase20-restart"
success_regex = ["(?m)^APACHE_PHASE20_RESTART_DEBUG_PASSED\\b"]
fail_regex = ["(?i)\\bpanic(?:ked)?\\b", "(?m)^APACHE_PHASE20_RESTART_DEBUG_FAILED\\b"]
timeout = 3600
