args = [
    "-machine",
    "virt",
    "-cpu",
    "la464",
    "-nographic",
    "-m",
    "512M",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-loongarch64-alpine.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/apache-smoke-tests.sh"
success_regex = ["(?m)^APACHE_APP_SMOKE_PASSED\\s*$"]
fail_regex = ["(?i)\\bpanic(?:ked)?\\b", "(?m)^APACHE_APP_SMOKE_FAILED"]
timeout = 1200
