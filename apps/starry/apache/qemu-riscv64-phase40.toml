args = [
    "-nographic",
    "-m",
    "512M",
    "-cpu",
    "rv64",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-riscv64-alpine.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/apache-phase40-tests.sh"
success_regex = ["(?m)^APACHE_PHASE40_TEST_PASSED\\s*$"]
fail_regex = ["(?i)\\bpanic(?:ked)?\\b", "(?m)^APACHE_PHASE40_TEST_FAILED"]
timeout = 1200
