args = [
    "-machine",
    "q35",
    "-nographic",
    "-m",
    "512M",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-alpine.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0,net=10.0.2.0/24,dhcpstart=10.0.2.15",
]
uefi = false
to_bin = false
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/network-test.sh"
success_regex = ["(?m)^NETWORK_TEST_PASSED\\s*$"]
fail_regex = ['(?i)\bpanic(?:ked)?\b', "(?m)^lockdep fatal violation\\s*$", "(?m)^NETWORK_TEST_FAILED:"]
timeout = 240
