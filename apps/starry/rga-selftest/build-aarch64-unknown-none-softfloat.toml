# Build config for the RGA2 kernel selftest board case (OrangePi-5-Plus).
#
# Mirrors the Rockchip driver set the `orangepi-5-plus-uvc` case uses (so the board boots and mounts
# the SD-card ext4 rootfs), and adds `rga-selftest`. That feature pulls in `rga`
# (= ax-driver/rga probe + rockchip-rga + dma-heap) and runs the RGA2 bring-up selftest at kernel
# init, logging the `RGA2_*_SELFTEST` lines + the `RGA_SELFTEST_SUITE_DONE` sentinel over serial
# before userspace starts. The board harness greps that serial buffer (see the --board-config toml
# under test-suit/starryos/board-orangepi-5-plus/rga-selftest/).
#
# max_cpu_num = 1: device IRQs are statically routed to cpu0 on this board and the selftest does its
# device init + completion-wait on cpu0 (a non-boot-core wait hangs); single-core matches the proven
# boot config.
target = "aarch64-unknown-none-softfloat"
features = [
  "rga-selftest",
  "ax-driver/rockchip-soc",
  "ax-driver/rockchip-dwc-xhci",
  "ax-driver/rockchip-sdhci",
  "ax-driver/rockchip-dwmmc",
]
log = "Info"
max_cpu_num = 1
