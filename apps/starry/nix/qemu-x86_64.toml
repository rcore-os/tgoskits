args = [
    "-machine",
    "q35",
    "-nographic",
    "-m",
    "8192",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-alpine.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
]
# The std/PIC Starry image must use the x86_64 UEFI handoff instead of direct -kernel loading.
uefi = true
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = "exec /usr/bin/test_nix.sh"
success_regex = ["(?m)^NIX_APP_TESTS_PASSED\\s*$"]
fail_regex = [
    '(?i)\bpanic(?:ked)?\b',
    '(?i)\bfatal\b',
    "(?m)^NIX_INSTALL_TEST_FAILED\\s*$",
    "(?m)^NIX_NOSANDBOX_TEST_FAILED\\s*$",
    "(?m)^NIX_NIXPKGS_TEST_FAILED\\s*$",
    "(?m)^NIX_SANDBOX_TEST_FAILED\\s*$",
    "(?m)^NIX_SANDBOX_ERROR:",
]
timeout = 1800
