args = [
    "-nographic",
    "-m", "512M",
    "-cpu", "cortex-a53",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-aarch64-alpine.img",
    "-device", "virtio-net-pci,netdev=net0",
    "-netdev", "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/llama-cpp-test.sh"
success_regex = ["(?m)^LLAMA_TEST_PASSED\\s*$"]
fail_regex = [
    "(?m)^LLAMA_TEST_FAILED:",
    "(?i)kernel panic",
    "(?i)panicked at",
    "(?i)segmentation fault",
    "(?i)illegal instruction",
    "(?i)bus error",
    "(?i)out of memory",
]
timeout = 600
