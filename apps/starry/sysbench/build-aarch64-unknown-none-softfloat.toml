# sysbench aarch64 SMP-4 build.
# Mirrors test-suit/starryos/qemu-smp4/build-aarch64 (proven to boot 4 cores):
# max_cpu_num=4 + nvme root + virtio-net so `apk add sysbench` has networking.
features = [
  "ax-feat/display",
  "ax-feat/rtc",
  "ax-driver/nvme",
  "ax-driver/virtio-net",
  "ax-driver/virtio-gpu",
  "ax-driver/virtio-input",
  "ax-driver/virtio-socket",
  "starry-kernel/input",
  "starry-kernel/vsock",
]
max_cpu_num = 4
log = "Warn"
target = "aarch64-unknown-none-softfloat"
