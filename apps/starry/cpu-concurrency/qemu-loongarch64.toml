# LoongArch dynamic (axplat-dyn) platform: build-loongarch64*.toml carries ax-driver/serial and
# does not opt out of dynamic mode, since the retired static LoongArch path has no serial console
# binding. uefi=false / to_bin=true is the dynamic platform's raw-binary boot path.
args = [
    "-machine", "virt", "-cpu", "la464", "-nographic", "-m", "1024M", "-smp", "1",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-loongarch64-alpine.img",
    "-device", "virtio-net-pci,netdev=net0", "-netdev", "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = "sh /usr/bin/cpu-concurrency.sh"
success_regex = ['(?m)^CPU_CONCURRENCY_PASSED\s*$']
fail_regex = ['(?i)\bpanic(?:ked)?\b', '(?m)^CPU_CONCURRENCY_FAILED\s*$']
timeout = 1800
