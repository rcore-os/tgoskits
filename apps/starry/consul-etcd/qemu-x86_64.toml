# consul-etcd x86_64 - Consul 1.22.7 + etcd 3.6.11 distributed-KV carpet.
# x86_64 boots the ELF kernel via the dynamic platform + OVMF (xtask prepares firmware
# automatically; no PVH note needed). Both services are fully static CGO-free Go ELF
# binaries (official amd64 releases) staged by prebuild.sh; the gate runs them single-node
# over loopback. The rootfs is the per-app rootfs-x86_64-alpine.img which prebuild.sh grows
# to 2.5G so both binaries fit without truncation.
args = [
    "-nographic", "-m", "4096M", "-smp", "1",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-alpine.img",
    "-device", "virtio-net-pci,netdev=net0", "-netdev", "user,id=net0",
]
uefi = false
to_bin = false
shell_prefix = "root@starry:/root #"
shell_init_cmd = "sh /usr/bin/run-consul-etcd.sh"
success_regex = ['(?m)^TEST PASSED\s*$']
fail_regex = ['(?i)\bpanic(?:ked)?\b', '(?m)^TEST FAILED\s*$']
timeout = 3600
