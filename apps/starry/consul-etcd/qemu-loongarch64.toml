# consul-etcd loongarch64 - Consul 1.22.7 + etcd 3.6.11 distributed-KV carpet.
# Platform: dynamic (axplat-dyn), same as aarch64/riscv64 - build-loongarch64*.toml carries
# no ax-hal/loongarch64-qemu-virt / plat-static / plat_dyn=false; uefi=false / to_bin=true is
# the dynamic platform's raw-binary boot path. consul is CROSS-COMPILED from the pinned source
# tag (HashiCorp ships no loong64 release); etcd is the official loong64 release started with
# ETCD_UNSUPPORTED_ARCH=loong64 (set by the gate). The rootfs is the per-app
# rootfs-loongarch64-alpine.img which prebuild.sh grows to 2.5G.
args = [
    "-machine", "virt", "-cpu", "la464", "-nographic", "-m", "4096M", "-smp", "1",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-loongarch64-alpine.img",
    "-device", "virtio-net-pci,netdev=net0", "-netdev", "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:/root #"
shell_init_cmd = "sh /usr/bin/run-consul-etcd.sh"
success_regex = ['(?m)^TEST PASSED\s*$']
fail_regex = ['(?i)\bpanic(?:ked)?\b', '(?m)^TEST FAILED\s*$']
timeout = 9000
