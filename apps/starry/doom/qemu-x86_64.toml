args = [
    "-machine",
    "q35",
    "-serial",
    "stdio",
    "-vnc",
    ":0",
    "-vga",
    "none",
    "-m",
    "2G",
    "-smp",
    "4",
    "-device",
    "virtio-gpu-pci,xres=214,yres=120",
    "-device",
    "virtio-tablet-pci",
    "-device",
    "virtio-keyboard-pci",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-alpine.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
    "-accel", "tcg",
]
uefi = true
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/test_doom.sh"
success_regex = ["DOOMGENERIC_TEST_PASSED"]
fail_regex = [
    "(?i)\\bpanic(?:ked)?\\b",
    "(?i)page fault",
    "(?i)segmentation fault",
    "DOOMGENERIC_TEST_FAILED",
]
timeout = 180
