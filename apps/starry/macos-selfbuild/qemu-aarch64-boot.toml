# AArch64 boot-only QEMU config for externally built StarryOS kernels. The
# rootfs drive is supplied by xtask.
args = [
    "-snapshot",
    "-nographic",
    "-accel",
    "tcg,thread=multi",
    "-machine",
    "virt,gic-version=3",
    "-cpu",
    "cortex-a72",
    "-m",
    "512M",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
success_regex = ["root@starry:"]
fail_regex = [
    "(?i)\\bpanicked at\\b",
    "(?i)\\bkernel panic\\b",
    "(?i)\\bpanic:\\s",
    "(?i)\\bunhandled trap\\b",
    "(?i)\\btrap frame\\b",
    "(?i)fatal",
    "(?i)segmentation fault",
]
timeout = 300
