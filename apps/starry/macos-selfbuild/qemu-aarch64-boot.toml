# Apple Silicon macOS HVF boot-only QEMU config for externally built StarryOS
# kernels. The rootfs drive is supplied by xtask.
args = [
    "-snapshot",
    "-nographic",
    "-accel",
    "hvf",
    "-machine",
    "virt,gic-version=3",
    "-cpu",
    "host",
    "-m",
    "512M",
    "-smp",
    "4",
    "-append",
    "someboot.aarch64_gicd_spi=off",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
success_regex = ["root@starry:"]
fail_regex = [
    "(?i)\\bpanicked at\\b",
    "(?i)\\bkernel panic\\b",
    "(?i)\\bpanic:\\s",
    "(?i)\\bunhandled trap\\b",
    "(?i)\\btrap frame\\b",
    "(?i)fatal",
    "(?i)segmentation fault",
]
timeout = 300
