# Apple Silicon macOS only. The rootfs is selected and patched by
# `cargo xtask starry app qemu`; this config only carries the HVF machine shape
# and the guest command.
args = [
    "-nographic",
    "-accel",
    "hvf",
    "-machine",
    "virt,gic-version=3",
    "-cpu",
    "host",
    "-m",
    "8192M",
    "-smp",
    "4",
]
uefi = false
to_bin = true
persist_rootfs = true
shell_prefix = "root@starry:"
shell_init_cmd = "/bin/sh /opt/starry-macos-run.sh"
success_regex = ["(?m)^===STARRY-MACOS-SELFBUILD-PASS jobs=[0-9]+ elapsed=[0-9]+===$"]
fail_regex = [
    "(?i)\\bpanicked at\\b",
    "(?i)\\bkernel panic\\b",
    "(?i)\\bpanic:\\s",
    "(?i)\\bunhandled trap\\b",
    "(?i)\\btrap frame\\b",
    "(?i)fatal",
    "(?i)segmentation fault",
    "(?m)^===STARRY-MACOS-SELFBUILD-FAIL",
]
timeout = 7200
