args = [
    "-nographic", "-cpu", "rv64",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-riscv64-gdb-smoke.img",
    "-device", "virtio-net-pci,netdev=net0",
    "-netdev", "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/gdbserver-smoke.sh"
success_regex = ["GDBSERVER_SMOKE_DONE"]
fail_regex = [
    '(?i)\bpanic(?:ked)?\b',
    '(?m)FAIL',
    'gdb: not found',
    'Python Exception',
    'Python initialization failed',
    'Remote communication error',
    'ptrace: Function not implemented',
]
timeout = 120
