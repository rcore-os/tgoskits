args = [
    "-nographic",
    "-m",
    "1G",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-alpine.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
]
uefi = true
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = "NGINX_RUNNER_PHASE_TIMEOUT=1800 /usr/bin/nginx-runner.sh debug short-connection-debug"
success_regex = ["(?m)^NGINX_RUNNER_PASSED\\b"]
fail_regex = ["(?i)\\bpanic(?:ked)?\\b", "(?m)^NGINX_RUNNER_FAILED\\b"]
timeout = 3600
