# gpu-gles riscv64 - OpenGL ES 3.1 compute carpet on Mesa llvmpipe (the CPU software rasterizer/JIT)
# over an EGL-surfaceless context. Provisioned from Alpine edge as musl packages (mesa-gles +
# mesa-egl + mesa-dri-gallium), which Alpine builds for riscv64, so the C/C++ carpets run on-target;
# no host GPU or display server. -smp 1: single vCPU, so llvmpipe runs every workgroup on one thread.
# 4096M: the llvmpipe LLVM JIT + device buffers are heap-heavy.
args = [
    "-nographic", "-cpu", "rv64", "-m", "4096M", "-smp", "1",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-riscv64-alpine.img",
    "-device", "virtio-net-pci,netdev=net0", "-netdev", "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = "sh /usr/bin/run_all.sh"
success_regex = ['(?m)^TEST PASSED\s*$']
fail_regex = ['(?i)\bpanic(?:ked)?\b', '(?m)^TEST FAILED\s*$']
timeout = 18000
