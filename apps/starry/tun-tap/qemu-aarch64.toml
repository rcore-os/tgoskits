# tun-tap aarch64 - /dev/net/tun carpet. Platform: dynamic (uefi=false /
# to_bin=true is the dynamic platform's raw-binary boot path). -cpu cortex-a72
# is a 64-bit core (the virt default would pick AArch32 and never boot the
# 64-bit kernel). The static-musl probe drives the TUN datapath in-kernel; no
# guest network is required.
args = [
    "-nographic", "-m", "1024M", "-smp", "1", "-cpu", "cortex-a72",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-aarch64-alpine.img",
    "-device", "virtio-net-pci,netdev=net0", "-netdev", "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = "sh /usr/bin/run-tun-tap.sh"
success_regex = ['(?m)^TEST PASSED\s*$']
fail_regex = ['(?i)\bpanic(?:ked)?\b', '(?m)^TEST FAILED\s*$']
timeout = 1200
