# tun-tap loongarch64 - /dev/net/tun carpet. Platform: dynamic (axplat-dyn),
# same as aarch64/riscv64 - build-loongarch64*.toml carries no
# ax-hal/plat-static / plat_dyn=false; uefi=false / to_bin=true is the dynamic
# platform's raw-binary boot path. The static-musl probe drives the TUN
# datapath in-kernel over local routing under TCG; no guest network is required.
args = [
    "-machine", "virt", "-cpu", "la464", "-nographic", "-m", "1024M", "-smp", "1",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-loongarch64-alpine.img",
    "-device", "virtio-net-pci,netdev=net0", "-netdev", "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = "sh /usr/bin/run-tun-tap.sh"
success_regex = ['(?m)^TEST PASSED\s*$']
fail_regex = ['(?i)\bpanic(?:ked)?\b', '(?m)^TEST FAILED\s*$']
timeout = 3600
