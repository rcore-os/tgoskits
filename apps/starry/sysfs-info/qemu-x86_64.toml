# `-cpu Haswell` is an Intel model whose QEMU TCG emulation populates the cache
# CPUID leaves (leaf 4 deterministic parameters, plus the legacy leaf 0x2
# descriptor table), so the guest kernel enumerates a real L1/L2/L3 hierarchy.
# `-accel tcg` pins software emulation: this host's KVM (nested under WSL2)
# reports CPUID leaf 4 as all-zeros, which would hide the cache; TCG emulates
# the Haswell cache descriptors faithfully and deterministically.
args = [
    "-nographic",
    "-m", "512M",
    "-cpu", "Haswell",
    "-accel", "tcg",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-sysfs-info.img",
    "-device", "virtio-net-pci,netdev=net0",
    "-netdev", "user,id=net0",
]
uefi = false
to_bin = false
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/sysfs-info.sh"
success_regex = ["(?m)^SYSFS_CARPET TEST PASSED\\s*$"]
# Keyed on the carpet's own markers; generic "not found"/"no such file" are
# avoided because OVMF/UEFI firmware prints benign "... Not Found" lines during
# normal boot (BdsDxe Boot#### probing) that would abort the run before the test.
fail_regex = [
    "(?m)^SYSFS_CARPET TEST FAILED",
    "(?m)^SYSFS_INFO_DONE\\s+RC=[^0]",
    "sysfs-carpet: not found",
    "(?i)segmentation fault",
    "(?i)kernel panic",
    "(?i)panicked at",
    "(?i)illegal instruction",
]
timeout = 300
