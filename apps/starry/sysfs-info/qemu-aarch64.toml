args = [
    "-nographic",
    "-m", "512M",
    "-cpu", "cortex-a53",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-aarch64-sysfs-info.img",
    "-device", "virtio-net-pci,netdev=net0",
    "-netdev", "user,id=net0",
    "-append", "root=/dev/sda",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/sysfs-info.sh"
success_regex = ["(?m)^SYSFS_CARPET TEST PASSED\\s*$"]
# Keyed on the carpet's own markers; generic "not found"/"no such file" are
# avoided because firmware/boot can emit benign "... Not Found" lines that would
# abort the run before the test.
fail_regex = [
    "(?m)^SYSFS_CARPET TEST FAILED",
    "(?m)^SYSFS_INFO_DONE\\s+RC=[^0]",
    "sysfs-carpet: not found",
    "(?i)segmentation fault",
    "(?i)kernel panic",
    "(?i)panicked at",
    "(?i)illegal instruction",
]
timeout = 300
