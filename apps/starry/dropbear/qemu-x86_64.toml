# dropbear x86_64 - SSH suite carpet (server + dbclient + dropbearkey + dropbearconvert + scp).
# x86_64 boots the ELF kernel via the dynamic platform + OVMF (xtask prepares firmware
# automatically; no PVH note needed). The gate provisions the dropbear suite on-target with
# `apk add` (branch-matched to the rootfs, current version) over the loopback/user network,
# then runs every SSH session single-node over 127.0.0.1. The rootfs is the per-app
# rootfs-x86_64-alpine.img which prebuild.sh grows to 1.5G for the apk cache + generated keys.
args = [
    "-nographic", "-m", "1024M", "-smp", "1",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-alpine.img",
    "-device", "virtio-net-pci,netdev=net0", "-netdev", "user,id=net0",
]
uefi = false
to_bin = false
shell_prefix = "root@starry:"
shell_init_cmd = "sh /usr/bin/run-dropbear.sh"
success_regex = ['(?m)^TEST PASSED\s*$']
fail_regex = ['(?i)\bpanic(?:ked)?\b', '(?m)^TEST FAILED\s*$']
timeout = 1800
