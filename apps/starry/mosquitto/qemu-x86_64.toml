args = [
    "-machine",
    "q35",
    "-nographic",
    "-m",
    "1G",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-alpine.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
    "-snapshot",
]
uefi = false
to_bin = false
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/test_mosquitto.sh"
success_regex = ["(?m)^ALL MOSQUITTO TESTS PASSED\\s*$"]
fail_regex = [
    "(?i)\\bpanic(?:ked)?\\b",
    "(?m)^MOSQUITTO_SMOKE_TEST_FAILED\\s*$",
    "(?m)^MOSQUITTO_TEST_FAILED\\s*$",
    "(?m)^MOSQUITTO_STRESS_TEST_FAILED\\s*$",
]
timeout = 3600
