args = [
    "-nographic",
    "-m",
    "768M",
    "-cpu",
    "cortex-a53",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-aarch64-alpine.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
    "-append",
    "root=/dev/sda",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/mariadb-test.sh"
success_regex = ["(?m)^MARIADB_TEST_PASSED\\s*$"]
fail_regex = [
    '(?i)\bpanic(?:ked)?\b',
    "(?m)^MARIADB_TEST_FAILED(?:[: ].*)?$",
]
timeout = 1800
