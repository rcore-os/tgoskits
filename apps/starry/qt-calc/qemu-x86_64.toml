args = [
    "-machine",
    "q35",
    "-serial",
    "stdio",
    "-vnc",
    ":0",
    "-vga",
    "none",
    "-m",
    "2G",
    "-smp",
    "4",
    "-device",
    "virtio-gpu-pci,xres=1024,yres=768",
    "-device",
    "virtio-mouse-pci",
    "-device",
    "virtio-keyboard-pci",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-alpine.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
    "-accel", "tcg",
]
uefi = true
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/test-qcalc.sh"
success_regex = ["(?m)^QT_CALC_TEST_PASSED\\s*$"]
fail_regex = [
    '(?i)\bpanic(?:ked)?\b',
    "(?m)^QT_CALC_TEST_FAILED(?:[: ].*)?$",
]
timeout = 1200
