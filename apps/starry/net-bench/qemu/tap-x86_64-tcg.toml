# QEMU 配置: tap-x86_64-tcg
# TAP (无 vhost) + TCG 模拟
# 适用于: x86_64 无 KVM，vhost-net 不可用时的降级模式

args = [
    "-nographic",
    "-m", "2G",
    "-accel", "tcg",
    "-cpu", "max",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-alpine.img",
    "-device", "virtio-net-pci,netdev=net0,mac=52:54:00:12:34:57",
    "-netdev", "tap,id=net0,ifname=tap0,script=no,downscript=no",
    "-snapshot",
]

uefi = true
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/net-bench-tap.sh"
success_regex = ["(?m)^NET_BENCH_PASSED\\s*$"]
fail_regex = ['(?i)\bpanic(?:ked)?\b', "(?m)^NET_BENCH_FAILED:"]
timeout = 300
