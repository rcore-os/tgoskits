args = [
    "-nographic",
    "-m", "512M",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/target/rootfs/rootfs-x86_64-alpine.img",
    "-device", "virtio-net-pci,netdev=net0",
    "-netdev", "user,id=net0"
]
uefi = false
to_bin = false
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/claw-robust-06"
success_regex = ["ALL_TESTS_DONE", "CLAW_SKIP"]
fail_regex = ['(?i)\bpanic(?:ked)?\b', 'ALL_TESTS_FAILED']
timeout = 600
