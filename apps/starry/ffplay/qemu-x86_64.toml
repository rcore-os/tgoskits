args = [
    "-machine",
    "q35",
    "-m",
    "2G",
    "-smp",
    "4",
    "-serial",
    "stdio",
    "-vnc",
    ":0",
    "-vga",
    "none",
    "-device",
    "virtio-gpu-pci,xres=284,yres=160",
    "-device",
    "virtio-tablet-pci",
    "-device",
    "virtio-keyboard-pci",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-alpine.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
    # KVM is disabled because Weston's initialization (weston_compositor_startup)
    # hangs under KVM acceleration.  The root cause is likely a race in timerfd
    # or eventfd that only manifests at KVM speed.  TCG is used instead
    # Re-enable once the KVM hang is fixed: "-accel", "kvm",
    "-accel", "tcg",
]
uefi = true
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/test_ffplay.sh"
success_regex = ["FFPLAY_TEST_PASSED"]
fail_regex = [
    "(?i)\\bpanic(?:ked)?\\b",
    "(?i)page fault",
    "(?i)segmentation fault",
    "FFPLAY_TEST_FAILED",
]
timeout = 3600
