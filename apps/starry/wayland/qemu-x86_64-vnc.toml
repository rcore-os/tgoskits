args = [
  "-m", "1G",
  "-serial", "stdio",
  "-monitor", "none",
  "-vnc", "127.0.0.1:30",
  "-machine", "q35",
  "-device", "virtio-gpu-pci",
  "-device", "virtio-keyboard-pci",
  "-device", "virtio-mouse-pci",
  "-device", "virtio-blk-pci,drive=disk0",
  "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-alpine.img/rootfs-x86_64-alpine.img",
  "-device", "virtio-net-pci,netdev=net0",
  "-netdev", "user,id=net0",
]
uefi = true
to_bin = true
timeout = 900
snapshot = false
success_regex = []	
fail_regex = ["(?i)\\bpanic(?:ked)?\\b"]
