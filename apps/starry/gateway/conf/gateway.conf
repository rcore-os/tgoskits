# gateway.conf -- angie 1.11.5 exercised as a carpet-grade API gateway on StarryOS. A single
# foreground process (daemon off; master_process off) hosts BOTH the gateway front-end
# (127.0.0.1:18080) AND every loopback back-end it proxies to (plaintext HTTP back-ends, TLS
# vhosts, and a stream{} four-layer tier), so the whole HTTP/TLS/cache/gzip/stream/ssl_preread
# directive surface is exercised end-to-end over real in-guest TCP with no external dependency:
# busybox `wget` (plaintext, to :18080) is the ONLY client -- angie itself supplies both ends of
# every TLS / stream / proxy_protocol hop. `user root` keeps the apk build's default --user=angie
# from resolving a missing account (harmless under master_process off, no worker setuid happens).
user root;
daemon off;
master_process off;
worker_processes 1;
pid /run/angie.pid;
error_log /var/log/angie/error.log info;

events {
    worker_connections 256;
}

http {
    default_type text/plain;
    access_log off;
    client_body_temp_path /var/lib/angie/tmp/client_body;
    proxy_temp_path       /var/lib/angie/tmp/proxy;

    proxy_cache_path /var/lib/angie/cache keys_zone=zc:1m max_size=16m inactive=10m use_temp_path=off;
    limit_req_zone  $binary_remote_addr zone=rlz:1m rate=1r/s;
    limit_conn_zone $binary_remote_addr zone=clz:1m;

    # bound every proxied connect so a dead/blackhole upstream fails fast (gateway default; also
    # keeps the failover carpets quick). /ctimeout overrides this with its own 1s + blackhole.
    proxy_connect_timeout 3s;

    # map: default / exact key / regex-with-capture (K carpet).
    map $arg_sel $mapped {
        default   MAP_DEFAULT;
        foo       MAP_FOO;
        ~^re-(?<tail>.+)$  MAP_RE_$tail;
    }

    # split_clients: deterministic bucket for a fixed key (K carpet).
    split_clients "$arg_sc" $bucket {
        50%  BUCKET_A;
        *    BUCKET_B;
    }

    #====================================================================================
    # PLAINTEXT BACK-ENDS (angie proxies to these; wget never touches them directly)
    #====================================================================================

    # B_ONE / B_TWO -- load-balancing identity back-ends.
    server { listen 127.0.0.1:18081; location / { return 200 "BACKEND_ONE"; } }
    server { listen 127.0.0.1:18082; location / { return 200 "BACKEND_TWO"; } }

    # B_REFLECT (18083) -- echoes what the proxy actually forwarded (method / host / proto /
    # content-length / injected headers) into the response, the golden assertion surface for the
    # request-rewriting proxy directives without needing a raw-byte capture tool on target.
    server {
        listen 127.0.0.1:18083;
        location / {
            add_header X-Got-Method $request_method  always;
            add_header X-Got-Host   $http_host        always;
            add_header X-Got-Custom  "$http_x_custom" always;
            add_header X-Got-Probe   "$http_x_probe"  always;
            add_header X-Got-AE      "$http_accept_encoding" always;
            return 200 "RB method=$request_method uri=$request_uri proto=$server_protocol host=$http_host cl=$http_content_length custom=$http_x_custom probe=$http_x_probe xff=$http_x_forwarded_for xreal=$http_x_real_ip remote=$remote_addr\n";
        }
    }

    # B_CTRL (18084) -- controllable responses for the response-side rewriting carpets.
    server {
        listen 127.0.0.1:18084;
        location = /redir {
            return 302 http://127.0.0.1:18084/app/next;
        }
        location = /hdr {
            add_header X-Secret backendsecret always;   # custom header, normally passed
            add_header X-Public ok            always;
            add_header X-Pad    padvalue       always;  # X-Pad is in angie's default-hidden set
            return 200 "HDR\n";
        }
        # A 200 (not a redirect) carrying an upstream cookie: busybox wget stops reading response
        # headers at Location on a 3xx, so a cookie on a redirect would never reach the client's
        # view, making the proxy_cookie_* rewrite unobservable. A 200 keeps the whole header block.
        location = /setcookie {
            add_header Set-Cookie "id=42; Domain=backend.local; Path=/app; HttpOnly" always;
            return 200 "SETCOOKIE";
        }
        location = /err { return 502 "UPSTREAM_ERR_BODY"; }
        location = /cc  {
            add_header Cache-Control "no-cache" always;
            return 200 "CC_BODY";
        }
    }

    # B_BIG (18085) -- a large, highly-compressible body for the gzip / gunzip carpets.
    server {
        listen 127.0.0.1:18085;
        default_type text/plain;
        location / {
            return 200 "\n";
        }
    }

    # B_COUNT (18086) -- a per-hit counter body: each request returns a different value so a cache
    # HIT (identical body on the 2nd request) is provable, and cache MISS/HIT is observable.
    server {
        listen 127.0.0.1:18086;
        location = /count {
            add_header X-Backend-Hit $connection_requests always;
            return 200 "COUNT";
        }
    }

    # B_PROXH (18087) -- HTTP back-end that ACCEPTS the PROXY protocol header; used by the
    # stream proxy_protocol chain to prove the header angie sent is parsed ($proxy_protocol_addr).
    server {
        listen 127.0.0.1:18087 proxy_protocol;
        location / { return 200 "PP addr=$proxy_protocol_addr port=$proxy_protocol_port\n"; }
    }

    # B_502 (18088) -- always-502 back-end for the next_upstream failover carpets.
    server { listen 127.0.0.1:18088; location / { return 502 "B502"; } }

    #====================================================================================
    # TLS BACK-END VHOSTS (angie terminates TLS here; the front-end reaches them via proxy_ssl)
    #====================================================================================
    server {                                     # T_BACKEND: CA-signed CN=backend.local + mTLS
        listen 127.0.0.1:18443 ssl;
        ssl_certificate     /etc/angie/certs/backend.crt;
        ssl_certificate_key /etc/angie/certs/backend.key;
        ssl_client_certificate /etc/angie/certs/ca.crt;
        ssl_verify_client   optional;
        ssl_protocols TLSv1.2 TLSv1.3;
        location / { return 200 "TLS_BACKEND cverify=$ssl_client_verify proto=$ssl_protocol\n"; }
    }
    server {                                     # T_FOO: CA-signed CN=foo.test
        listen 127.0.0.1:18444 ssl;
        ssl_certificate     /etc/angie/certs/foo.crt;
        ssl_certificate_key /etc/angie/certs/foo.key;
        location / { return 200 "SNI_FOO\n"; }
    }
    server {                                     # T_BAR: CA-signed CN=bar.test
        listen 127.0.0.1:18445 ssl;
        ssl_certificate     /etc/angie/certs/bar.crt;
        ssl_certificate_key /etc/angie/certs/bar.key;
        location / { return 200 "SNI_BAR\n"; }
    }
    server {                                     # T_DEFAULT: CA-signed CN=backend.local
        listen 127.0.0.1:18446 ssl;
        ssl_certificate     /etc/angie/certs/backend.crt;
        ssl_certificate_key /etc/angie/certs/backend.key;
        location / { return 200 "SNI_DEFAULT\n"; }
    }
    server {                                     # T_ROGUE: rogue-CA-signed (untrusted) CN=backend.local
        listen 127.0.0.1:18447 ssl;
        ssl_certificate     /etc/angie/certs/rogue.crt;
        ssl_certificate_key /etc/angie/certs/rogue.key;
        location / { return 200 "TLS_ROGUE\n"; }
    }
    server {                                     # T_TLS13: TLS 1.3 only
        listen 127.0.0.1:18448 ssl;
        ssl_certificate     /etc/angie/certs/backend.crt;
        ssl_certificate_key /etc/angie/certs/backend.key;
        ssl_protocols TLSv1.3;
        location / { return 200 "TLS13 proto=$ssl_protocol\n"; }
    }

    #====================================================================================
    # UPSTREAMS
    #====================================================================================
    upstream gw_pool     { server 127.0.0.1:18081; server 127.0.0.1:18082; }
    upstream gw_weight   { server 127.0.0.1:18081 weight=3; server 127.0.0.1:18082 weight=1; }
    upstream gw_backup   { server 127.0.0.1:18099; server 127.0.0.1:18082 backup; }  # 18099 dead
    upstream gw_failover { server 127.0.0.1:18099; server 127.0.0.1:18081; }          # dead -> alive
    upstream gw_err502   { server 127.0.0.1:18088; server 127.0.0.1:18081 backup; }   # primary 502, backup 200
    upstream gw_only502  { server 127.0.0.1:18088; }                                  # single always-502
    upstream gw_least    { least_conn; server 127.0.0.1:18081; server 127.0.0.1:18082; }        # least-connections
    upstream gw_iphash   { ip_hash;    server 127.0.0.1:18081; server 127.0.0.1:18082; }        # client-IP sticky
    upstream gw_khash    { hash $arg_k consistent; server 127.0.0.1:18081; server 127.0.0.1:18082; } # keyed consistent hash
    upstream gw_random   { random;     server 127.0.0.1:18081; server 127.0.0.1:18082; }        # random (two-choices)
    upstream gw_ka       { server 127.0.0.1:18081; keepalive 8; }                               # keepalive pool
    upstream gw_maxfail  { server 127.0.0.1:18099 max_fails=1 fail_timeout=30s;                 # primary dead -> ejected
                           server 127.0.0.1:18081 backup; }
    upstream gw_slow     { zone gw_slow 64k; server 127.0.0.1:18081 slow_start=2s;              # slow_start needs a zone
                           server 127.0.0.1:18082; }

    #====================================================================================
    # GATEWAY FRONT-END (127.0.0.1:18080) -- every carpet endpoint lives here.
    #====================================================================================
    server {
        listen 127.0.0.1:18080;
        server_name localhost;

        # realip runs at the POST_READ phase (before a location is chosen), so set_real_ip_from /
        # real_ip_header must live at server level to take effect (L carpet, exercised by /realip).
        set_real_ip_from 127.0.0.1;
        real_ip_header   X-Forwarded-For;

        # ---- B: location matching priority ----
        location = /            { return 200 "GATEWAY_ROOT"; }
        location = /exact       { add_header X-Gateway angie always; return 200 "EXACT_MATCH"; }
        location   /a           { return 200 "PREFIX_A"; }
        location   /ab          { return 200 "PREFIX_AB"; }              # longest-prefix wins over /a
        location ~ \.txt$       { return 200 "REGEX_TXT"; }
        location ~* \.PnG$      { return 200 "REGEX_PNG_CI"; }
        location ^~ /static     { return 200 "PREFIX_STOP"; }           # stops regex evaluation
        location @named         { return 200 "NAMED_FALLBACK"; }
        location = /named       { try_files /nonexistent @named; }

        # ---- C: request-rewriting proxy directives (reflect back-end at 18083) ----
        location = /px          { proxy_pass http://127.0.0.1:18083; }                  # passthrough URI
        location   /px-uri/     { proxy_pass http://127.0.0.1:18083/reflected/; }       # prefix replace
        location = /sethdr      { proxy_set_header Host custom.example;
                                  proxy_set_header X-Custom injected;
                                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                                  proxy_set_header X-Real-IP $remote_addr;
                                  proxy_pass http://127.0.0.1:18083; }
        location = /drophdr     { proxy_set_header Accept-Encoding "";                   # empty = drop
                                  proxy_pass http://127.0.0.1:18083; }
        location = /setbody     { proxy_set_body "REWRITTEN-BODY-8";                     # CL becomes 15
                                  proxy_pass http://127.0.0.1:18083; }
        location = /method      { proxy_method PUT; proxy_pass http://127.0.0.1:18083; }
        location = /ver10       { proxy_http_version 1.0; proxy_pass http://127.0.0.1:18083; }
        location = /ver11       { proxy_http_version 1.1; proxy_set_header Connection "";
                                  proxy_pass http://127.0.0.1:18083; }
        location = /nobody      { proxy_pass_request_body off; proxy_set_header Content-Length "";
                                  proxy_pass http://127.0.0.1:18083; }

        # ---- D: response-side rewriting (control back-end at 18084) ----
        location = /hide        { proxy_hide_header X-Secret; proxy_pass http://127.0.0.1:18084/hdr; }
        location = /passh       { proxy_pass_header X-Pad;    proxy_pass http://127.0.0.1:18084/hdr; }
        location = /redir       { proxy_redirect http://127.0.0.1:18084/app/ /shop/;
                                  proxy_pass http://127.0.0.1:18084/redir; }
        location = /rediroff    { proxy_redirect off; proxy_pass http://127.0.0.1:18084/redir; }
        location = /cookie      { proxy_cookie_domain backend.local front.local;
                                  proxy_cookie_path /app /;
                                  proxy_pass http://127.0.0.1:18084/setcookie; }

        # ---- E: upstream / load balancing ----
        location = /lb          { proxy_pass http://gw_pool; }
        location = /weight      { proxy_pass http://gw_weight; }
        location = /backup      { proxy_pass http://gw_backup; }
        location = /failover    { proxy_next_upstream error timeout; proxy_pass http://gw_failover; }
        location = /nofail502   { proxy_next_upstream http_502; proxy_pass http://gw_err502/; }
        location = /keep502     { proxy_intercept_errors off;    proxy_pass http://gw_only502/; }
        location = /lb-least    { proxy_pass http://gw_least; }
        location = /lb-iphash   { proxy_pass http://gw_iphash; }
        location = /lb-hash     { proxy_pass http://gw_khash; }
        location = /lb-random   { proxy_pass http://gw_random; }
        location = /lb-ka       { proxy_pass http://gw_ka; }
        location = /lb-maxfail  { proxy_next_upstream error timeout; proxy_pass http://gw_maxfail; }
        location = /lb-slow     { proxy_pass http://gw_slow; }

        # ---- F: timeouts / error interception ----
        location = /ctimeout    { proxy_connect_timeout 1s; proxy_pass http://192.0.2.1:9; }  # blackhole
        location = /dead        { proxy_pass http://127.0.0.1:18099; }
        location = /intercept   { proxy_intercept_errors on; error_page 502 = /err502page;
                                  proxy_pass http://127.0.0.1:18084/err; }
        location = /err502page  { return 200 "CUSTOM_502_PAGE"; }
        location = /nointercept { proxy_intercept_errors off; proxy_pass http://127.0.0.1:18084/err; }

        # ---- G: proxy cache ----
        location = /cache       { proxy_cache zc; proxy_cache_valid 200 10m;
                                  add_header X-Cache $upstream_cache_status always;
                                  proxy_pass http://127.0.0.1:18086/count; }
        location = /cache-bypass{ proxy_cache zc; proxy_cache_valid 200 10m;
                                  proxy_cache_bypass $arg_nocache;
                                  add_header X-Cache $upstream_cache_status always;
                                  proxy_pass http://127.0.0.1:18086/count; }
        location = /cache-ignore{ proxy_cache zc; proxy_cache_valid 200 10m;
                                  proxy_ignore_headers Cache-Control;
                                  add_header X-Cache $upstream_cache_status always;
                                  proxy_pass http://127.0.0.1:18084/cc; }

        # ---- H: gzip / gunzip (self-contained: the gz path is driven by an internal hop that sets
        # Accept-Encoding, so no client-side header is needed -- busybox wget cannot send one) ----
        location = /gz          { gzip on; gzip_min_length 0; gzip_types text/plain;
                                  gzip_vary on; gzip_proxied any;   # compress proxied responses too
                                  proxy_pass http://127.0.0.1:18085; }
        location = /gzraw       { proxy_http_version 1.1;                      # gzip needs HTTP/1.1
                                  proxy_set_header Connection "";
                                  proxy_set_header Accept-Encoding gzip;       # compress at /gz ...
                                  proxy_pass http://127.0.0.1:18080/gz; }      # ... and relay raw gzip
        location = /gunzip      { gunzip on;                                   # decompress for the client
                                  proxy_http_version 1.1;
                                  proxy_set_header Connection "";
                                  proxy_set_header Accept-Encoding gzip;
                                  proxy_pass http://127.0.0.1:18080/gz; }

        # ---- I: proxy_ssl to TLS back-ends ----
        location = /ssl-ok      { proxy_pass https://127.0.0.1:18443/;
                                  proxy_ssl_verify on; proxy_ssl_trusted_certificate /etc/angie/certs/ca.crt;
                                  proxy_ssl_name backend.local; proxy_ssl_server_name on; }
        location = /ssl-fail    { proxy_pass https://127.0.0.1:18447/;
                                  proxy_ssl_verify on; proxy_ssl_trusted_certificate /etc/angie/certs/ca.crt;
                                  proxy_ssl_name backend.local; }
        location = /ssl-noverify{ proxy_pass https://127.0.0.1:18447/; proxy_ssl_verify off; }
        location = /ssl-mtls    { proxy_pass https://127.0.0.1:18443/;
                                  proxy_ssl_protocols TLSv1.2;
                                  proxy_ssl_certificate /etc/angie/certs/client.crt;
                                  proxy_ssl_certificate_key /etc/angie/certs/client.key;
                                  proxy_ssl_name backend.local; proxy_ssl_server_name on; }
        location = /ssl-tls13   { proxy_pass https://127.0.0.1:18448/;
                                  proxy_ssl_protocols TLSv1.3; proxy_ssl_verify off;
                                  proxy_ssl_name backend.local; }
        location = /ssl-mismatch{ proxy_pass https://127.0.0.1:18448/;
                                  proxy_ssl_protocols TLSv1.2; proxy_ssl_verify off;
                                  proxy_ssl_name backend.local; }

        # ---- J: limit_req / limit_conn ----
        # NB: limit_req/limit_conn run at the PREACCESS phase; a bare `return` fires at the earlier
        # REWRITE phase and would bypass the limiter, so the limited locations proxy to a back-end
        # (content phase) to actually engage the limiter.
        location = /limit       { limit_req zone=rlz burst=1 nodelay; limit_req_status 429;
                                  proxy_pass http://127.0.0.1:18081; }
        location = /limitconn   { limit_conn clz 1; limit_conn_status 429;
                                  proxy_buffering on; proxy_buffer_size 1k; proxy_buffers 4 1k;
                                  proxy_limit_rate 3000;                # 16k body over ~5s = held conn
                                  proxy_pass http://127.0.0.1:18085; }

        # ---- K: rewrite / return / map / set / if ----
        location = /old         { rewrite ^/old$ /new last; }
        location = /new         { return 200 "REWRITTEN"; }
        location = /r301        { return 301 http://127.0.0.1:18080/new; }
        location = /permanent   { rewrite ^ /new permanent; }
        location = /map         { return 200 "$mapped"; }
        location = /split       { return 200 "$bucket"; }
        location = /setvar      { set $v "SET-$request_method"; return 200 "$v"; }
        location = /ifua        { if ($arg_flag = yes) { return 200 "IF_YES"; } return 200 "IF_NO"; }
        location = /r302        { return 302 http://127.0.0.1:18080/new; }
        location = /forbidden   { return 403 "FORBIDDEN"; }
        location = /errpage     { error_page 404 = @errbody; return 404; }  # error_page -> named, recode 200
        location @errbody       { return 200 "EP_CUSTOM"; }
        location = /internalonly{ internal; return 200 "INTERNAL"; }        # unreachable from the client (404)
        location = /multihdr    { add_header X-One one always; add_header X-Two two always; return 204 ""; }

        # ---- L: add_header / realip ----
        location = /always      { add_header X-Always alive always; return 204 ""; }
        location = /realip      { proxy_set_header X-Forwarded-For 203.0.113.7;
                                  proxy_pass http://127.0.0.1:18080/realip-echo; }
        location = /realip-echo { return 200 "REMOTE=$remote_addr\n"; }

        # ---- M: sub_filter ----
        location = /sub         { sub_filter 'BACKEND_ONE' 'SUBBED';
                                  sub_filter_once on; sub_filter_types *;
                                  proxy_pass http://127.0.0.1:18081; }
        # chained response filters on one proxied hop: sub_filter body rewrite + add_header together.
        location = /chain       { sub_filter 'BACKEND_ONE' 'CHAINSUB'; sub_filter_once on; sub_filter_types *;
                                  add_header X-Chain chained always; proxy_pass http://127.0.0.1:18081; }

        # ---- N: stub_status ----
        location = /status      { stub_status; }

        # ---- O: stream tier (via stream{} listeners) ----
        location = /stream-tcp  { proxy_pass http://127.0.0.1:19500/; }
        location = /stream-pp   { proxy_pass http://127.0.0.1:19501/; }

        # ---- P: stream ssl_preread SNI routing (front sends TLS ClientHello via proxy_ssl) ----
        location = /sni-foo     { proxy_pass https://127.0.0.1:19443/;
                                  proxy_ssl_verify on; proxy_ssl_trusted_certificate /etc/angie/certs/ca.crt;
                                  proxy_ssl_name foo.test; proxy_ssl_server_name on; }
        location = /sni-bar     { proxy_pass https://127.0.0.1:19443/;
                                  proxy_ssl_verify on; proxy_ssl_trusted_certificate /etc/angie/certs/ca.crt;
                                  proxy_ssl_name bar.test; proxy_ssl_server_name on; }
        location = /sni-default { proxy_pass https://127.0.0.1:19443/;
                                  proxy_ssl_verify off; proxy_ssl_name other.test; proxy_ssl_server_name on; }

        # ---- Q: gRPC upstream (config wiring; data-path needs an h2 gRPC client, host-only) ----
        location = /grpc        { grpc_pass grpc://127.0.0.1:18081;
                                  grpc_set_header X-Real-IP $remote_addr;
                                  grpc_connect_timeout 2s; }
    }
}

#========================================================================================
# STREAM (four-layer) tier -- exercised by the front-end's /stream-* and /sni-* locations.
#========================================================================================
stream {
    log_format sp '$ssl_preread_server_name|$ssl_preread_protocol|$sni_backend';

    map $ssl_preread_server_name $sni_backend {
        foo.test  127.0.0.1:18444;
        bar.test  127.0.0.1:18445;
        default   127.0.0.1:18446;
    }

    # ssl_preread: peek ClientHello SNI (no TLS termination) and route to the matching TLS vhost.
    server {
        listen 127.0.0.1:19443;
        ssl_preread on;
        proxy_pass $sni_backend;
        proxy_timeout 10s;
        access_log /var/log/angie/stream.log sp;
    }

    # plain TCP proxy: forwards the raw HTTP bytes to the reflect back-end.
    server { listen 127.0.0.1:19500; proxy_pass 127.0.0.1:18083; }

    # proxy_protocol: prepend a PROXY header the B_PROXH back-end parses (self-proving chain).
    server { listen 127.0.0.1:19501; proxy_pass 127.0.0.1:18087; proxy_protocol on; }

    # UDP (four-layer datagram) tier: a `return` datagram back-end plus a UDP proxy in front. The
    # `listen ... udp` / stream `return` / proxy_responses surface is parsed (angie -t) and bound
    # live at startup; the datagram round-trip is not asserted (the on-target busybox `nc` is the
    # minimal TCP-only build), the same host-client gap as the gRPC upstream.
    server { listen 127.0.0.1:18089 udp; return "UDP_ECHO\n"; }
    server { listen 127.0.0.1:19502 udp; proxy_pass 127.0.0.1:18089; proxy_responses 1; proxy_timeout 3s; }
}
