# gateway loongarch64 -- angie 1.11.5 full-directive gateway carpet. loongarch64 has no official angie apk,
# so the binary is source-cross-built WITH the full gateway module set (ssl/v2/gzip/grpc/
# stream/ssl_preread) linked against Alpine musl openssl/zlib/pcre2. DYNAMIC platform (axplat-dyn):
# build-loongarch64*.toml carries ax-driver/serial and does not opt out of dynamic mode; the
# retired static path lacked the serial-console binding. uefi=false / to_bin=true = raw boot.
args = [
    "-machine", "virt", "-cpu", "la464", "-nographic", "-m", "2048M", "-smp", "1",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-loongarch64-alpine.img",
    "-device", "virtio-net-pci,netdev=net0", "-netdev", "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = "sh /usr/bin/run-gateway.sh"
success_regex = ['(?m)^GATEWAY_OK=109/109', '(?m)^TEST PASSED\s*$']
fail_regex = ['(?i)\bpanic(?:ked)?\b', '(?m)^TEST FAILED\s*$']
timeout = 180000
