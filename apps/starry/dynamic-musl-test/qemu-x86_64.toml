args = [
    "-nographic",
    "-m", "512M",
    "-cpu", "max",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-dynamic-musl-test.img",
    "-device", "virtio-net-pci,netdev=net0",
    "-netdev", "user,id=net0",
]
uefi = false
to_bin = false
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/dynamic-test.sh"
success_regex = ["(?m)^DYNAMIC_MUSL_TEST_DONE\\s+RC=0\\s*$"]
fail_regex = [
    "(?m)^DYNAMIC_MUSL_TEST_DONE\\s+RC=[^0]",
    "(?i)not found",
    "(?i)no such file",
    "(?i)segmentation fault",
    "(?i)kernel panic",
    "(?i)panicked at",
    "(?i)illegal instruction",
]
timeout = 60
