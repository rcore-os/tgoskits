args = [
    "-nographic",
    "-cpu", "host",
    "-smp", "1",
    "-m", "4G",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-selfhost.img,file.locking=off",
    "-device", "virtio-net-pci,netdev=net0",
    "-netdev", "user,id=net0",
]
uefi = false
to_bin = true
# Bootstrap installs build tools + Rust into the blueprint rootfs; snapshot must
# stay off so those guest writes persist for later self-compilation runs (the
# app runner defaults snapshot to true).
snapshot = false
shell_init_cmd = "/usr/bin/self-compile-inner.sh"
success_regex = ["(?m)^SELFHOST_BOOTSTRAP_SUCCESS\\s*$"]
fail_regex = ['(?i)\bpanicked\b', 'SELFHOST_BOOTSTRAP_FAILED']
timeout = 1800
