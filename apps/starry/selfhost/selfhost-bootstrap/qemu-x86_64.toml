args = [
    "-nographic",
    "-cpu", "host",
    "-smp", "4",
    "-m", "16G",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/selfhost/rootfs-x86_64-selfhost-bootstrap.img,file.locking=off,cache=writeback",
    "-device", "virtio-net-pci,netdev=net0",
    "-netdev", "user,id=net0",
]
uefi = false
to_bin = true
# Bootstrap provisions the full selfhost rootfs (toolchain, Rust, kallsyms tools,
# source, firmware) and warms the dependency cache with one online seed build, so
# snapshot must stay off for those guest writes to persist (the app runner
# defaults snapshot to true). The online seed build needs the same resources as
# self-compilation (smp 4 / 16G); the cache warm-up makes the later OFFLINE
# self-compile reproducible without host sudo.
snapshot = false
# The bootstrap boots StarryOS (seed) + the Alpine rootfs, like every other
# starry app, so the guest shell prompt is the standard `root@starry:`.
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/self-compile-inner.sh"
success_regex = ["(?m)^SELFHOST_BOOTSTRAP_SUCCESS\\s*$"]
fail_regex = ['(?i)\bpanicked\b', 'SELFHOST_BOOTSTRAP_FAILED']
timeout = 7200
