args = [
    "-nographic",
    "-cpu", "host",
    "-smp", "4",
    "-m", "16G",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/selfhost/rootfs-x86_64-selfhost-bootstrap.img,file.locking=off,cache=writeback",
    "-device", "virtio-net-pci,netdev=net0",
    "-netdev", "user,id=net0",
]
uefi = false
to_bin = true
# Bootstrap provisions the full selfhost rootfs (build toolchain, Rust,
# kallsyms tools, source tree, AIC8800 firmware, musl symlinks) inside QEMU with
# NO host sudo.  Offline dependency-cache warming is intentionally NOT done
# (resource-limited under StarryOS; see prebuild.sh and docs).  snapshot must
# stay off so those guest writes (apk packages, Rust toolchain, kallsyms tools)
# persist.
snapshot = false
# The bootstrap boots StarryOS (seed) + the Alpine rootfs, like every other
# starry app, so the guest shell prompt is the standard `root@starry:`.
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/self-compile-inner.sh"
success_regex = ["(?m)^SELFHOST_BOOTSTRAP_SUCCESS\\s*$"]
fail_regex = ['(?i)\bpanicked\b', 'SELFHOST_BOOTSTRAP_FAILED']
timeout = 7200
