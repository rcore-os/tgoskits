args = [
    "-nographic",
    "-cpu", "host",
    "-smp", "4",
    "-m", "16G",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/debian-selfhost/rootfs-x86_64-debian-selfhost.img,file.locking=off,cache=writeback",
    "-device", "virtio-net-pci,netdev=net0",
    "-netdev", "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/self-compile-inner.sh"
success_regex = ["(?m)^SELF_COMPILE_SUCCESS\\s*$"]
fail_regex = ['(?i)\bpanicked\b', 'SELF_COMPILE_FAILED']
timeout = 7200
