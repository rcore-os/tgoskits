[package]
name = "arceos-thread_perf"
version = "0.1.0"
edition.workspace = true
authors = ["RCore Team <yuchen@tsinghua.edu.cn>"]
publish = false

[features]
default = []
arceos = ["dep:ax-std", "ax-std/alloc", "ax-std/multitask", "ax-std/irq"]
orangepi-5-plus = ["arceos", "ax-std/serial", "ax-std/rockchip-soc"]
licheerv-nano-sg2002 = [
    "arceos",
    "ax-std/serial",
    "ax-driver/sg2002-placeholder",
    "ax-driver/cvsd",
    "axplat-dyn/irq",
    "axplat-dyn/thead-mae",
]

[dependencies]
ax-std = { path = "../../../os/arceos/ulib/axstd", optional = true, default-features = false }
ax-driver = { workspace = true, optional = true }
axplat-dyn = { workspace = true, optional = true }

[package.metadata.axstd]
features = ["log-level-off"]
