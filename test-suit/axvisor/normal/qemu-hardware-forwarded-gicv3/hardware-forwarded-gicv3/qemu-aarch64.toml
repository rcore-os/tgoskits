args = [
  "-nographic",
  "-cpu",
  "cortex-a72",
  "-machine",
  "virt,virtualization=on,gic-version=3",
  "-smp",
  "4",
  "-device",
  "virtio-blk-device,drive=disk0",
  "-drive",
  "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-aarch64-alpine.img",
  "-append",
  "root=/dev/vda rw init=/bin/sh",
  "-m",
  "8g",
]
fail_regex = [
  "(?i)\\bpanic(?:ked)?\\b",
  "(?i)kernel panic",
  "(?i)login incorrect",
  "(?i)permission denied",
]
success_regex = [
  "(?m)^guest test pass!\\s*$",
]
shell_prefix = "~ #"
shell_init_cmd = "start=$(date +%s) && for block in 1 2 3 4 5 6 7 8; do dd if=/dev/vda of=/dev/null bs=4096 count=1 skip=$block 2>/dev/null && sleep 1 || exit 1; done && test $(( $(date +%s) - start )) -ge 8 && echo 'guest test pass!'"
timeout = 120
to_bin = true
uefi = false
