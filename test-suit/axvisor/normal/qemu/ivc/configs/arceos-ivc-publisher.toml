# Vm base info configs
#
[base]
# Guest vm id.
id = 1
# Guest vm name.
name = "arceos-ivc-publisher"
# Virtualization type.
vm_type = 1
# The number of virtual CPUs.
cpu_num = 1
# Guest vm physical cpu ids.
phys_cpu_ids = [0]

#
# Vm kernel configs
#
[kernel]
# The entry point of the kernel image.
entry_point = 0x8020_0000
# The location of image: "memory" | "fs".
image_location = "memory"
# The file path of the kernel image.
kernel_path = "../../../../../../target/aarch64-unknown-none-softfloat/release/arceos-ivc-publisher.bin"
# The load address of the kernel image.
kernel_load_addr = 0x8020_0000
# The load address of the device tree blob (DTB).
dtb_load_addr = 0x8000_0000

# Memory regions with format (`base_paddr`, `size`, `flags`, `map_type`).
# For `map_type`, 0 means `MAP_ALLOC`, 1 means `MAP_IDENTICAL`, 2 means `MAP_RESERVED`.
memory_regions = [
  [0x8000_0000, 0x4000_0000, 0x7, 1], # System RAM 1G MAP_IDENTICAL
]

#
# Device specifications
#
[devices]
# The interrupt mode.
interrupt_mode = "passthrough"

# Pass-through devices.
passthrough_devices = [
  ["/",],
]

# Passthrough addresses.
# Base-GPA  Length.
passthrough_addresses = []

# Devices that are not desired to be passed through to the guest.
excluded_devices = [
  ["/pcie@10000000"],
]

# Emu_devices.
# Name Base-Ipa Ipa_len Alloc-Irq Emu-Type EmuConfig.
emu_devices = [
  ["ivc-channel", 0xbff0_0000, 0x1_0000, 0, 0xA, []],
]
