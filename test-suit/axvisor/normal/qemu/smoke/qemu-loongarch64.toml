args = [
  "-machine",
  "virt",
  "-cpu",
  "la464",
  "-m",
  "2G",
  "-smp",
  "1",
  "-nographic",
  "-serial",
  "mon:stdio",
  "-no-reboot",
  "-device",
  "virtio-blk-pci,drive=disk0",
  "-drive",
  "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-loongarch64-alpine.img",
]
fail_regex = [
  "(?i)\\bpanic(?:ked)?\\b",
  "(?i)kernel panic",
  "(?i)login incorrect",
  "(?i)permission denied",
]
success_regex = ["(?m)^guest linux test pass!\\s*$"]
shell_prefix = "~ #"
shell_init_cmd = "pwd && echo 'guest linux test pass!'"
to_bin = false
uefi = false
