args = [
  "-nographic",
  "-cpu",
  "host",
  "-machine",
  "q35",
  "-smp",
  "1",
  "-accel",
  "kvm",
  "-device",
  "virtio-blk-pci,drive=disk0",
  "-drive",
  "id=disk0,if=none,format=raw,file=${workspace}/target/rootfs/rootfs-x86_64-alpine.img",
  "-m",
  "128M",
]
fail_regex = [
  "(?i)\\bpanic(?:ked)?\\b",
  "(?i)kernel panic",
  "(?i)login incorrect",
  "(?i)permission denied",
]
success_regex = ["Hello world from user mode program!"]
shell_prefix = ">>"
shell_init_cmd = "hello_world"
to_bin = false
uefi = false
