build_config = "os/axvisor/configs/board/phytiumpi.toml"
vmconfigs = ["os/axvisor/configs/vms/linux-aarch64-e2000-smp1.toml"]

board_type = "PhytiumPi"
fail_regex = [
  "(?i)\\bpanic(?:ked)?\\b",
  "(?i)kernel panic",
  "(?i)login incorrect",
  "(?i)permission denied",
]
shell_init_cmd = "root"
shell_prefix = "login:"
success_regex = [
  "(?m)^root@.*#\\s*$",
]
timeout = 300
