args = [
  "-machine",
  "virt",
  "-cpu",
  "la464",
  "-m",
  "2G",
  "-smp",
  "1",
  "-nographic",
  "-serial",
  "mon:stdio",
  "-no-reboot",
  "-device",
  "virtio-blk-pci,drive=disk0",
  "-drive",
  "id=disk0,if=none,format=raw,file=${workspace}/target/rootfs/rootfs-loongarch64-alpine.img",
]
build_config = "os/axvisor/configs/board/qemu-loongarch64.toml"
vmconfigs = []
fail_regex = [
  "(?i)\\bpanic(?:ked)?\\b",
  "(?i)kernel panic",
  "(?i)login incorrect",
  "(?i)permission denied",
]
success_regex = ["Welcome to AxVisor Shell!", "axvisor:\\$"]
shell_prefix = "axvisor:$"
shell_init_cmd = ""
to_bin = false
uefi = false
