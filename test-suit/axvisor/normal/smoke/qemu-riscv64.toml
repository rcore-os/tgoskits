args = [
  "-nographic",
  "-cpu",
  "rv64",
  "-machine",
  "virt",
  "-bios",
  "default",
  "-smp",
  "4",
  "-device",
  "virtio-blk-device,drive=disk0",
  "-drive",
  "id=disk0,if=none,format=raw,file=${workspace}/target/rootfs/rootfs-riscv64-alpine.img",
  "-append",
  "root=/dev/vda rw init=/bin/sh",
  "-m",
  "4g",
]
build_config = "os/axvisor/configs/board/qemu-riscv64.toml"
vmconfigs = ["os/axvisor/configs/vms/linux-riscv64-qemu-smp1.toml"]
fail_regex = [
  "(?i)\\bpanic(?:ked)?\\b",
  "(?i)kernel panic",
  "(?i)login incorrect",
  "(?i)permission denied",
]
success_regex = ["(?m)^guest test pass!\\s*$"]
shell_prefix = "~ #"
shell_init_cmd = "pwd && echo 'guest test pass!'"
to_bin = true
uefi = false
