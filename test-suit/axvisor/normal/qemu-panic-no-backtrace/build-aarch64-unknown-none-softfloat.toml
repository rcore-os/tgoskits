features = [
    "test-panic-no-backtrace",
]
log = "Info"
target = "aarch64-unknown-none-softfloat"
vm_configs = []

# No BACKTRACE=y — the default-off path.
# axruntime's #[panic_handler] still emits BACKTRACE_BEGIN/BACKTRACE_END
# markers, but with alloc=false + BT_ERROR requires_alloc since the
# capture path is disabled without the backtrace feature.
