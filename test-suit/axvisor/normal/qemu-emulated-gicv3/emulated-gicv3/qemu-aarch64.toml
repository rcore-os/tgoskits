args = [
  "-nographic",
  "-cpu",
  "cortex-a72",
  "-machine",
  "virt,virtualization=on,gic-version=3",
  "-smp",
  "4",
  "-device",
  "virtio-blk-device,drive=disk0",
  "-drive",
  "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-aarch64-alpine.img",
  "-append",
  "root=/dev/vda rw init=/bin/sh",
  "-m",
  "8g",
]
fail_regex = [
  "(?i)\\bpanic(?:ked)?\\b",
  "(?i)kernel panic",
  "(?i)login incorrect",
  "(?i)permission denied",
  "Current EL synchronous exception",
  "Unhandled (?:synchronous )?exception",
  "Failed to initialize guest VM",
  "invalid VM configuration",
  "VM\\[1\\].*VCpu\\[[0-9]+\\].*(?:error|failed)",
]
success_regex = [
  "(?s)EXT4-fs \\(vda\\): mounted.*Run /bin/sh as init process",
]
timeout = 120
to_bin = true
uefi = false
