args = [
  "-nographic",
  "-cpu",
  "cortex-a72",
  "-machine",
  "virt,virtualization=on,gic-version=3",
  "-smp",
  "4",
  "-device",
  "virtio-blk-device,drive=disk0",
  "-drive",
  "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-aarch64-alpine.img",
  "-append",
  "console=ttyAMA0 rdinit=/init",
  "-m",
  "8g",
]
fail_regex = [
  "(?i)\\bpanic(?:ked)?\\b",
  "(?i)kernel panic",
  "(?i)login incorrect",
  "(?i)permission denied",
  "Current EL synchronous exception",
  "Unhandled (?:synchronous )?exception",
  "Failed to initialize guest VM",
  "invalid VM configuration",
  "CPU[0-9]+: failed to come online",
  "VM\\[1\\].*VCpu\\[[0-9]+\\].*(?:error|failed)",
]
success_regex = [
  "(?m)^AXVM_GICV3_PL011_SMP_OK\\s*$",
]
shell_prefix = "AXVM> "
shell_init_cmd = "test \"$(/bin/busybox grep -c '^processor' /proc/cpuinfo)\" = 2 && /bin/busybox echo 'AXVM_GICV3_PL011_SMP_OK'"
timeout = 120
to_bin = true
uefi = false
