[package]
name = "arceos-axtest-suit"
version = "0.1.0"
edition.workspace = true
publish = false

[features]
default = []
std = []
ax-std = ["dep:ax-hal", "dep:ax-std"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(axtest)'] }

[dependencies]
ax-hal = { workspace = true, optional = true }
ax-std = { workspace = true, optional = true, features = ["default"] }
axtest.workspace = true
