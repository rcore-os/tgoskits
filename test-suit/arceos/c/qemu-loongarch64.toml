args = [
    "-m",
    "2G",
    "-smp",
    "4",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
    "-nographic",
]
# LoongArch dynamic platform C images use the same UEFI boot contract as the
# Rust suite; keep it explicit instead of relying on axbuild boot rewriting.
uefi = true
to_bin = true
success_regex = ["ArceOS C test suite run OK!"]
fail_regex = ["(?i)\\bpanic(?:ked)?\\b", "ARCEOS_C_TEST_FAIL"]
timeout = 120

[host_http_server]
bind = "127.0.0.1"
port = 18283
body = "ArceOS C test suite host fixture\n"
