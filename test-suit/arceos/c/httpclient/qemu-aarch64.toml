args = [
    "-machine",
    "virt",
    "-cpu",
    "cortex-a72",
    "-m",
    "128M",
    "-nographic",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
    "-serial",
    "mon:stdio",
]
uefi = false
to_bin = true
success_regex = ["HTTP/1.1 200 OK"]
fail_regex = ['(?i)\bpanic(?:ked)?\b']
timeout = 120
