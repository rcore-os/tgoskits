args = [
    "-nographic",
    "-smp",
    "4",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
]
# x86_64 dynamic platform images boot through the configured UEFI firmware.
# Keep the boot contract explicit instead of relying on axbuild rewriting it.
uefi = true
to_bin = true
success_regex = ["ArceOS C test suite run OK!"]
fail_regex = ["(?i)\\bpanic(?:ked)?\\b", "ARCEOS_C_TEST_FAIL"]
timeout = 120

[host_http_server]
bind = "127.0.0.1"
port = 18280
body = "ArceOS C test suite host fixture\n"
