args = ["-machine", "virt", "-cpu", "la464", "-m", "128M", "-smp", "1", "-nographic", "-device", "virtio-blk-pci,drive=disk0", "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/runtime-assets/arceos/std/qemu-smp1/io_test/disk.img", "-serial", "mon:stdio"]
