args = ["-machine", "q35", "-cpu", "max", "-m", "128M", "-smp", "1", "-nographic", "-device", "virtio-blk-pci,drive=disk0", "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/runtime-assets/arceos/std/qemu-smp1/arce_agent/disk.img", "-serial", "mon:stdio"]
uefi = false
to_bin = false
success_regex = ["ArceAgent smoke test ready"]
fail_regex = ["(?i)\\bpanic(?:ked)?\\b"]
timeout = 30
