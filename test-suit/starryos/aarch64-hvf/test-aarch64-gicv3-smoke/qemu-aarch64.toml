args = [
    # cortex-a76 has a native GICv3 system-register CPU interface, so
    # ICC_SRE_EL1.SRE is reset to 1 and the kernel's GICv3 driver can
    # acknowledge timer IRQs out of the box. cortex-a72 hung userspace
    # under -machine virt,gic-version=3 because SRE was 0 and the CPU
    # side of the GIC was unreachable from EL1 without the MMIO GICC
    # alias that GICv3 does not expose.
    "-nographic", "-machine", "virt,gic-version=3", "-cpu", "cortex-a76",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/target/rootfs/rootfs-aarch64-alpine.img",
    "-device", "virtio-net-pci,netdev=net0",
    "-netdev", "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/test-aarch64-gicv3-smoke"
success_regex = ["(?m)DONE: \\d+ pass, 0 fail"]
fail_regex = ['(?i)\bpanic(?:ked)?\b', '(?m)FAIL']
timeout = 120
