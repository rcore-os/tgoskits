env = { AX_IP = "10.0.2.15", AX_GW = "10.0.2.2" }
features = [
  "ax-feat/display",
  "ax-feat/rtc",
  "ax-driver/rtc",
  "ax-driver/virtio-blk",
  "ax-driver/virtio-net",
  "gic-v3",
  "cntv-timer",
  "starry-kernel/input",
  "starry-kernel/vsock",
]
# CNTV PPI 11 = IRQ 27. The kernel's `cntv-timer` path programs the
# virtual-timer registers and the GIC must subscribe IRQ 27 instead
# of the GICv2 + CNTP default of 30. ax-config-gen merges this -w
# override over the platform's default axconfig.
axconfig_overrides = ["devices.timer-irq=27"]
log = "Warn"
plat_dyn = true
target = "aarch64-unknown-none-softfloat"
