args = [
  "-machine",
  "virt",
  "-cpu",
  "la464",
  "-nographic",
  "-m",
  "128M",
  "-device",
  "virtio-blk-pci,drive=disk0",
  "-drive",
  "id=disk0,if=none,format=raw,file=${workspace}/target/loongarch64-unknown-none-softfloat/disk.img",
  "-device",
  "virtio-net-pci,netdev=net0",
  "-netdev",
  "user,id=net0",
]
fail_regex = ['(?i)\bpanic(?:ked)?\b']
shell_init_cmd = "pwd && echo 'All tests passed!'"
shell_prefix = "starry:~#"
success_regex = ["^All tests passed!$"]
to_bin = true
uefi = false
timeout = 5
