args = [
    "-nographic", "-cpu", "rv64", "-smp", "1", "-m", "2G",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-riscv64-debian-selfhost-v2.img",
    "-device", "virtio-net-pci,netdev=net0",
    "-netdev", "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = '''
TOOLS_OK=1; for t in cc gcc busybox; do which "$t" 2>/dev/null || { echo "MISSING: $t"; TOOLS_OK=0; }; done; if [ "$TOOLS_OK" -eq 1 ]; then echo "CHECK_DONE"; else echo "CHECK_FAILED"; fi
'''
success_regex = ["(?m)^CHECK_DONE\\s*$"]
fail_regex = ['(?i)\bpanic(?:ked)?\b', 'CHECK_FAILED']
timeout = 120
