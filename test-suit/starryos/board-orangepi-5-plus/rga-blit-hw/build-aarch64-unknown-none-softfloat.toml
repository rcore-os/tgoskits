# Per-case board build for rga-blit-hw: the Rockchip driver set that boots the OrangePi-5-Plus and
# mounts the SD-card ext4 rootfs (where the pre-staged /guest/rga_test/rga-blit-hw binary lives),
# plus `rga`. The `rga` feature enables /dev/rga + /dev/dma_heap (= ax-driver/rga + rockchip-rga +
# dma-heap) WITHOUT the removed boot-time selftest hook — the userspace binary drives those nodes
# after boot.
#
# max_cpu_num = 1: device IRQs are statically routed to cpu0 on this board and the RGA driver does
# its device init + completion-poll (PR-1 is polling-only) on cpu0; single-core matches the proven
# board boot config.
target = "aarch64-unknown-none-softfloat"
features = [
  "rga",
  "ax-driver/rockchip-soc",
  "ax-driver/rockchip-dwc-xhci",
  "ax-driver/rockchip-sdhci",
  "ax-driver/rockchip-dwmmc",
]
log = "Info"
max_cpu_num = 1
