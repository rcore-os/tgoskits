board_type = "OrangePi-5-Plus"
shell_prefix = "root@starry:/root #"
shell_init_cmd = "echo 'RTL8125_NET_TEST_PASSED'"
success_regex = ["(?m)^RTL8125_NET_TEST_PASSED\\s*$"]
fail_regex = ['(?i)\bpanic(?:ked)?\b', '(?i)segmentation fault', '(?i)SIGSEGV', 'exit with code: 139', "(?m)^RTL8125_NET_TEST_FAILED\\b"]
timeout = 180
