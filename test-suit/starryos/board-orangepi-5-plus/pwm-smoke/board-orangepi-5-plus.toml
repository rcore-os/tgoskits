board_type = "OrangePi-5-Plus"
shell_prefix = "root@starry:/root #"
shell_init_cmd = "p=STARRY_PWM_; s=SMOKE_; ok=1; echo ${p}${s}BEGIN; for c in 0 1 4 5; do b=/sys/class/pwm/pwmchip$c; [ -d $b ] || { echo PWM$c:missing; ok=0; continue; }; n=$(cat $b/npwm 2>/dev/null); echo 0 >$b/unexport 2>/dev/null; echo 0 >$b/export || ok=0; ch=$b/pwm0; [ -d $ch ] || { echo PWM$c:nochan; ok=0; continue; }; echo 1000000 >$ch/period || ok=0; echo 300000 >$ch/duty_cycle || ok=0; echo 0 >$ch/enable || ok=0; r=$(cat $ch/period 2>/dev/null):$(cat $ch/duty_cycle 2>/dev/null):$(cat $ch/enable 2>/dev/null); echo 0 >$b/unexport; u=$?; echo PWM$c:$n:$r:u$u; [ \"$n:$r:$u\" = \"1:1000000:300000:0:0\" ] || ok=0; done; [ $ok = 1 ] && echo ${p}${s}OK || echo ${p}${s}FAILED"
success_regex = ["(?m)^STARRY_PWM_SMOKE_OK\\s*$"]
fail_regex = [
  '(?i)\bpanic(?:ked)?\b',
  '(?i)segmentation fault',
  '(?i)SIGSEGV',
  'exit with code: 139',
  "(?i)(cat|sh): .*not found",
  "(?m)^STARRY_PWM_SMOKE_FAILED\\s*$",
]
timeout = 180
