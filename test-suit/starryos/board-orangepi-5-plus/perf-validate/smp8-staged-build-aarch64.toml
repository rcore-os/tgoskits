# STAGED smp8 build for perf-validate — NOT auto-discovered.
#
# `nearest_build_wrapper` only matches files named `build-*.toml`; this file is
# named `smp8-staged-*` ON PURPOSE so it is ignored by the harness today (the
# default wrapper stays smp1 so CI doesn't depend on multi-core boot).
#
# PROVEN 2026-07-02: this minimal feature set BOOTS the board fully multi-core
# (online=8, clusters=4+4) and perf-validate ran the entire SMP + big.LITTLE
# matrix on real silicon (38 pass). The smp8 boot hang is NOT the block device —
# it is a USB IRQ storm on the first A76 (cpu4): once a secondary A76 comes
# online, `rockchip-dwc-xhci`'s IRQ 253 is taken in a tight loop and wedges boot
# (same class as the NPU secondary-core init hang). Neither USB nor NPU is needed
# for perf, so this build DROPS rockchip-dwc-xhci + rknpu (and PCIe/net), keeping
# only the SoC + SD/block drivers to mount the rootfs (the block path polls, so
# it is smp-safe). To run the full multi-core matrix, rename this file to
# `build-aarch64-unknown-none-softfloat.toml` (replacing the smp1 wrapper).
#
# The FULL-feature smp8 build still hangs (USB storm) until that driver is fixed
# to keep its IRQ on cpu0 / not storm on a secondary.
target = "aarch64-unknown-none-softfloat"
features = [
  "ax-driver/rockchip-soc",
  "ax-driver/rockchip-sdhci",
  "ax-driver/rockchip-dwmmc",
]
log = "Warn"
max_cpu_num = 8
