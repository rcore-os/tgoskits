board_type = "OrangePi-5-Plus"
shell_prefix = "root@starry:/root #"
shell_init_cmd = "cd /guest/npu_demo && ./yolov8.sh"
success_regex = ["(?m)^=== Detection Results Summary ===\\s*$"]
fail_regex = ['(?i)\bpanic(?:ked)?\b', '(?i)segmentation fault', '(?i)SIGSEGV', 'exit with code: 139', "(?m)^rknn_init fail! ret=-1\\s*$"]
timeout = 300
