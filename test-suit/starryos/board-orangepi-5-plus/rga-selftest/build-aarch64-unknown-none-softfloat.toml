# Build config for the rga-selftest board case. The standard OrangePi-5-Plus board
# build plus `rga-selftest`, which pulls in `rga` (ax-driver/rga + rockchip-rga +
# dma-heap) and runs the RGA2 bring-up selftest at boot. The case's success_regex
# waits for the RGA_SELFTEST_SUITE_DONE sentinel the selftest prints. A per-case
# build config is used here (the other board cases share the board-level build); the
# board test runner resolves the nearest build-<target>.toml to each case.
target = "aarch64-unknown-none-softfloat"
features = [
  "ax-driver/list-pci-devices",
  "ax-driver/rk3588-pcie",
  "ax-driver/realtek-rtl8125",
  "ax-driver/rockchip-soc",
  "ax-driver/rockchip-dwc-xhci",
  "ax-driver/rockchip-sdhci",
  "ax-driver/rockchip-dwmmc",
  "rknpu",
  "rga-selftest",
]
log = "Info"
max_cpu_num = 1
