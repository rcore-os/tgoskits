# Board test for the RGA2 boot-time selftest.
# StarryOS must be built with the `rga-selftest` feature enabled
# (board config `features` list or `FEATURES=rga-selftest` on the build command line).
# The selftest runs automatically at boot; this case waits for the shell prompt and
# then triggers a search of the buffered serial output for the expected result line.
#
# success_regex matches the end-of-suite sentinel `RGA_SELFTEST_SUITE_DONE`, printed only after every
# selftest has run. It must NOT match an intermediate PASS line: ostool tears down on the FIRST
# success_regex match, which would drop later results.
#
# fail_regex is deliberately CATASTROPHIC-ONLY (not the old blanket `RGA2_\w*SELFTEST.*FAIL`, and
# not the per-op fill/copy/resize FAIL lines). Every op now logs an explicit
# `class={COLOR_OK|NOWRITE|ZERO|OTHER_UNIFORM|MIXED}` + a pixel dump, and we are actively iterating
# on the coherency fix — so a per-op wrong-output must NOT tear the run down, or we lose the later
# ops' classification (the whole point of the run). Per-op correctness is judged from the captured
# `class=`/PASS-FAIL lines; only failures that mean "nothing useful ran" fail the case:
#   - no RGA2 core found (nothing to test)
#   - smoke engine-level failure (`result=FAIL` → timeout/hardware: the engine itself is broken)
#   - any allocation failure (`alloc=FAIL`)
# A run that reaches RGA_SELFTEST_SUITE_DONE means the suite executed end-to-end; read the per-op
# `class=` lines for the actual fill/copy/resize/dmabuf/fillblit verdicts.

board_type = "OrangePi-5-Plus"
shell_prefix = "root@starry:/root #"
shell_init_cmd = "echo RGA_SELFTEST_CHECK"
success_regex = ["(?m)^RGA_SELFTEST_SUITE_DONE\\s*$"]
fail_regex = [
    'RGA2_SELFTEST no-rga2-core',
    'result=FAIL',
    'alloc=FAIL',
]
timeout = 300
