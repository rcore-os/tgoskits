args = [
    "-nographic",
    "-m",
    "512M",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-alpine.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
]
uefi = false
to_bin = false
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/kmod-load"
success_regex = [
    "(?m)^LOADED /lib/modules/hello\\.ko\\s*$",
    "(?m)^Hello, Kernel Module!\\s*$",
    "(?m)^Vector contents: \\[1, 2, 3, 4, 5\\]\\s*$",
    "(?m)^KMOD_SMOKE_DONE rc=0\\s*$",
]
fail_regex = ['(?i)\bpanic(?:ked)?\b', '(?m)^LOAD_FAIL']
timeout = 90
