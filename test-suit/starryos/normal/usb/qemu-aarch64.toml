args = [
    "-nographic",
    "-cpu",
    "cortex-a53",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/target/rootfs/rootfs-aarch64-alpine.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = """
set -eu
echo STARRY_LSUSB_BEGIN
lsusb | tee /tmp/starry-lsusb.out
grep -Eq "^Bus [0-9]{3} Device [0-9]{3}: ID [0-9a-fA-F]{4}:[0-9a-fA-F]{4}" /tmp/starry-lsusb.out || {
    printf 'STARRY_LSUSB_DEVICE_%s\n' MISSING
    exit 1
}
echo STARRY_LSUSB_DEVICE_OK
/usr/bin/usb-transfer-test
echo STARRY_USB_TESTS_PASSED
"""
success_regex = ["(?m)^STARRY_USB_TESTS_PASSED\\s*$"]
fail_regex = [
    '(?i)\bpanic(?:ked)?\b',
    "(?m)^STARRY_LSUSB_DEVICE_MISSING\\s*$",
    "unable to initialize libusb",
    "(?m)^lsusb: .*",
    "USB test failed",
]
timeout = 20
