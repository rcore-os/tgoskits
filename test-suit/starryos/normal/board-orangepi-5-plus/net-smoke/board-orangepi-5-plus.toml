board_type = "OrangePi-5-Plus"
shell_prefix = "root@starry:/root #"
shell_init_cmd = '''export GLIBC_TUNABLES=glibc.pthread.rseq=0; pass=RTL8125_NET_TEST_PASS; fail=RTL8125_NET_TEST_FAIL; echo RTL8125_NET_TEST_START; if /usr/bin/nc -z -w 10 223.5.5.5 80; then printf '%sED\n' "$pass"; else rc=$?; printf '%sED rc=%s\n' "$fail" "$rc"; fi'''
success_regex = ["(?m)^RTL8125_NET_TEST_PASSED\\s*$"]
fail_regex = ['(?i)\bpanic(?:ked)?\b', "(?m)^RTL8125_NET_TEST_FAILED\\b"]
timeout = 180
