board_type = "OrangePi-5-Plus"
shell_prefix = "root@starry:/root #"
shell_init_cmd = '''export GLIBC_TUNABLES=glibc.pthread.rseq=0; pass=RTL8125_NET_TEST_PASS; fail=RTL8125_NET_TEST_FAIL; echo RTL8125_NET_TEST_START; printf 'HEAD /generate_204 HTTP/1.0\r\nHost: connect.rom.miui.com\r\n\r\n' | /usr/bin/nc -w 10 connect.rom.miui.com 80 >/dev/null; rc=$?; echo RTL8125_NET_TEST_RC=$rc; if [ "$rc" -eq 0 ]; then printf '%sED\n' "$pass"; else printf '%sED rc=%s\n' "$fail" "$rc"; fi'''
success_regex = ["(?m)^RTL8125_NET_TEST_PASSED\\s*$"]
fail_regex = ['(?i)\bpanic(?:ked)?\b', "(?m)^RTL8125_NET_TEST_FAILED\\b"]
timeout = 180
