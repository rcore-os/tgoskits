# Build-time config template for StarryOS on Orange Pi 5 Plus.
target = "aarch64-unknown-none-softfloat"
# Runtime U-Boot settings live in `orangepi-5-plus-uboot.toml`.
env = {}
features = [
  "starry-kernel/plat-dyn",
  "axplat-dyn/pci-list-devices",
  "axplat-dyn/realtek-rtl8125",
  "axplat-dyn/rockchip-soc",
  "axplat-dyn/rockchip-dwc-xhci",
  "axplat-dyn/rockchip-sdhci",
  "axplat-dyn/rockchip-dwmmc",
  "rknpu",
]
log = "Info"
max_cpu_num = 1
plat_dyn = true
