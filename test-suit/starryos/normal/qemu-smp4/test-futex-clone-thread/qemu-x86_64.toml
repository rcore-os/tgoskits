args = [
    "-nographic",
    "-m", "512M",
    "-smp", "4",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-alpine.img",
    "-device", "virtio-net-pci,netdev=net0",
    "-netdev", "user,id=net0",
]
uefi = false
to_bin = false
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/test-futex-clone-thread"
success_regex = ['DONE: \d+ pass, 0 fail']
fail_regex = ['(?i)\bpanic(?:ked)?\b', '(?m)FAIL']
timeout = 360
