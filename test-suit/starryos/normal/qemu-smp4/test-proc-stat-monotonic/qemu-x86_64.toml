args = [
    "-nographic",
    "-m",
    "512M",
    "-smp",
    "4",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
]
uefi = true
to_bin = false
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/test-proc-stat-monotonic"
success_regex = ["(?m)^PASS: /proc/stat cpu total is monotonic across child exit$"]
fail_regex = ['(?i)\bpanic(?:ked)?\b', '(?m)^FAIL:']
timeout = 120
