args = [
    "-nographic",
    "-m",
    "512M",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/target/rootfs/rootfs-x86_64-alpine.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
    "-debugcon",
    "file:/workspace/syscall-starry.log",
    "-global",
    "isa-debugcon.iobase=0xe9",
]
uefi = false
to_bin = false
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/bug-sigwaitinfo-blocked-sigchld"
success_regex = ['(?m)^TEST PASSED\s*$']
fail_regex = ['(?m)^TEST FAILED\s*$', '(?i)\bpanic(?:ked)?\b']
timeout = 15
