args = [
    "-nographic",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-alpine.img",
    "-device", "virtio-net-pci,netdev=net0",
    "-netdev", "user,id=net0",
]
uefi = false
to_bin = false
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/test-ptrace-x86-breakpoint-reinsert"
success_regex = ["DONE: 1 pass, 0 fail"]
fail_regex = [
    '(?i)\\bpanic(?:ked)?\\b',
    '(?m)FAIL',
    '#GP',
    'General protection',
    'Segmentation fault',
]
timeout = 120
