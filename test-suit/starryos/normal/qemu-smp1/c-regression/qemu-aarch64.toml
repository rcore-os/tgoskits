args = [
    "-nographic", "-cpu", "cortex-a53",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/target/rootfs/rootfs-aarch64-alpine.img",
    "-device", "virtio-net-pci,netdev=net0",
    "-netdev", "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
test_commands = [
    "/usr/bin/test-fault-sig-ign",
    "/usr/bin/test-file-io-edge",
    "/usr/bin/test-fallocate-memfd",
    "/usr/bin/test-memfd-seals",
    "/usr/bin/test-mremap",
    "/usr/bin/test-msync",
    "/usr/bin/test-netlink-genl",
    "/usr/bin/test-netlink-rtnetlink",
    "/usr/bin/test-netlink-uevent",
    "/usr/bin/test-rmdir-nonempty",
    "/usr/bin/test-sysfs-class",
]
success_regex = ["(?m)^STARRY_GROUPED_TESTS_PASSED\\s*$"]
fail_regex = ['(?i)\bpanic(?:ked)?\b', '(?m)^STARRY_GROUPED_TEST_FAILED:']
timeout = 240
