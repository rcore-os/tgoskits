args = [
    "-nographic",
    "-m",
    "512M",
    "-cpu",
    "rv64",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/target/rootfs/rootfs-riscv64-alpine.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
test_commands = [
    "/usr/bin/test-epoll-ctl-mod",
    "/usr/bin/test-prlimit64",
    "/usr/bin/test-rename-content",
    "/usr/bin/test-unix-stream-eof",
    "/usr/bin/times_test",
]
success_regex = ["(?m)^STARRY_GROUPED_TESTS_PASSED\\s*$"]
fail_regex = ['(?i)\bpanic(?:ked)?\b', '(?m)^STARRY_GROUPED_TEST_FAILED:']
timeout = 120
