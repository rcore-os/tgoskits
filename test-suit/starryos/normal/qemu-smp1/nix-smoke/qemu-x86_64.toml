args = [
    "-machine",
    "q35",
    "-nographic",
    "-m",
    "512M",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-alpine.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
]
uefi = false
to_bin = false
shell_prefix = "root@starry:"
test_commands = [
    "/usr/bin/nix-smoke",
    "/usr/bin/nix-smoke-nosandbox",
]
success_regex = ["(?m)^STARRY_GROUPED_TESTS_PASSED\\s*$"]
fail_regex = [
    '(?i)\bpanic(?:ked)?\b',
    '(?i)\bfatal\b',
    "(?m)^STARRY_GROUPED_TEST_FAILED:",
    "(?m)^NIX_SMOKE_TEST_FAILED\\s*$",
    "(?m)^NIX_NOSANDBOX_TEST_FAILED\\s*$",
]
timeout = 1200
