args = [
    "-nographic",
    "-m",
    "512M",
    "-cpu",
    "cortex-a53",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-aarch64-alpine.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = '''
fetch_timeout=60
repo_file=/etc/apk/repositories
original_repos="$(cat "$repo_file")"
case "$original_repos" in
    *dl-cdn.alpinelinux.org*)
        apk_region=us
        repo_candidates='https://dl-cdn.alpinelinux.org/alpine upstream'
        ;;
    *)
        apk_region=china
        repo_candidates='https://mirrors.aliyun.com/alpine aliyun
https://mirrors.tuna.tsinghua.edu.cn/alpine tuna
https://mirrors.ustc.edu.cn/alpine ustc'
        ;;
esac
echo "APK_CURL_REGION_$apk_region"
repo_candidates_file=/tmp/apk-curl-repositories
printf '%s\n' "$repo_candidates" > "$repo_candidates_file"

try_apk_curl() {
    mirror="$1"
    label="$2"
    printf '%s\n' "$original_repos" | \
        sed "s#http://[^/]*/alpine/#$mirror/#g;s#https://[^/]*/alpine/#$mirror/#g" > "$repo_file"
    rm -f /lib/apk/db/lock
    echo "APK_CURL_REPO_$label"
    echo "APK_CURL_UPDATE_BEGIN"
    timeout "$fetch_timeout" apk --timeout "$fetch_timeout" update && \
    echo "APK_CURL_UPDATE_DONE" && \
    echo "APK_CURL_ADD_BEGIN" && \
    timeout "$fetch_timeout" apk --timeout "$fetch_timeout" add curl && \
    echo "APK_CURL_ADD_DONE" && \
    echo "APK_CURL_PROBE_BEGIN" && \
    curl --version && \
    curl --connect-timeout 10 --max-time 30 -i https://baidu.com && \
    echo "APK_CURL_PROBE_DONE"
}

i=0
while IFS= read -r repo
do
    test -n "$repo" || continue
    i=$((i + 1))
    mirror=${repo% *}
    label=${repo#* }
    echo "APK_CURL_ATTEMPT_$i"
    if try_apk_curl "$mirror" "$label"; then
        echo 'APK_CURL_TEST_PASSED'
        exit 0
    fi
    sleep 2
done < "$repo_candidates_file"
echo 'APK_CURL_TEST_FAILED'
'''
success_regex = ["(?m)^APK_CURL_TEST_PASSED\\s*$"]
fail_regex = ['(?i)\bpanic(?:ked)?\b', "(?m)^lockdep fatal violation\\s*$", "(?m)^APK_CURL_TEST_FAILED\\s*$"]
timeout = 420
