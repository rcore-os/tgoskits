args = [
    "-nographic",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/target/rootfs/rootfs-x86_64-alpine.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
]
uefi = false
to_bin = false
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/starry-udp-test"
success_regex = ["(?m)^UDP_TEST_DONE\\s*$"]
fail_regex = ['(?i)\bpanic(?:ked)?\b', "(?m)^UDP_TEST_FAILED\\s*$"]
timeout = 30
