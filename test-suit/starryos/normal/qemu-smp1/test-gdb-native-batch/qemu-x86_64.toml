args = [
    "-nographic",
    "-m", "512M",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-alpine.img",
    "-device", "virtio-net-pci,netdev=net0",
    "-netdev", "user,id=net0",
]
uefi = false
to_bin = false
shell_prefix = "root@starry:"
shell_init_cmd = "apk add gdb && echo GDB_APK_OK"
success_regex = ["GDB_APK_OK"]
fail_regex = [
    '(?i)\\bpanic(?:ked)?\\b',
    '(?m)FAIL',
    'Segmentation fault',
    'Out of memory',
    'gdb: not found',
    'Python Exception',
    'Python initialization failed',
    'Cannot insert breakpoint',
    'ptrace: Function not implemented',
    'No stack',
]
timeout = 300
