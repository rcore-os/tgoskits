args = [
    "-nographic", "-cpu", "cortex-a53",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/target/aarch64-unknown-none-softfloat/rootfs-aarch64.img",
    "-device", "virtio-net-pci,netdev=net0",
    "-netdev", "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/test-mt-execve"
# Single final-stage marker. `LEADER_CHILD_OK` is printed only by the
# post-execve image of the final leader-exec phase, which is reached only
# after every earlier phase (NULL argv/envp ABI, failed-execve TG
# preservation, non-leader execve de_thread, blocked-pending-signal
# survives execve) passes — any earlier failure trips `(?m)FAIL` in
# fail_regex or causes the driver to return non-zero before printing
# this marker.
success_regex = ["(?m)^LEADER_CHILD_OK\\s*$"]
fail_regex = ['(?i)\bpanic(?:ked)?\b', '(?m)FAIL']
timeout = 30
