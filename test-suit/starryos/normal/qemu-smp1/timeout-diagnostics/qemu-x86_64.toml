args = [
    "-nographic",
    "-m",
    "512M",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-alpine.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
]
uefi = false
to_bin = false
shell_prefix = "root@starry:"
shell_init_cmd = '''
fail() {
    echo "TIMEOUT_DIAG_ERROR: $1"
    echo 'TIMEOUT_DIAG_FAILED'
    exit 1
}

echo 'TIMEOUT_DIAG_D1_BEGIN'
timeout 5 sleep 30
d1_rc=$?
echo "TIMEOUT_DIAG_D1_EXIT=$d1_rc"
[ "$d1_rc" -eq 143 ] || fail 'D1 expected timeout exit 143'
echo 'TIMEOUT_DIAG_D1_PASSED'

echo 'TIMEOUT_DIAG_D2_BEGIN'
timeout 5 sh -c 'trap "" TERM; sleep 10'
d2_rc=$?
echo "TIMEOUT_DIAG_D2_EXIT=$d2_rc"
if [ "$d2_rc" -eq 137 ]; then
    echo 'TIMEOUT_DIAG_D2_SIGKILL_FALLBACK'
else
    echo 'TIMEOUT_DIAG_D2_NO_IMPLICIT_SIGKILL_FALLBACK'
fi

echo 'TIMEOUT_DIAG_D3_BEGIN'
timeout 5 sh -c 'sleep 10 & sleep 10 & wait'
d3_rc=$?
echo "TIMEOUT_DIAG_D3_EXIT=$d3_rc"
[ "$d3_rc" -eq 143 ] || fail 'D3 expected direct child timeout exit 143'
echo 'TIMEOUT_DIAG_D3_PASSED'

echo 'TIMEOUT_DIAG_PASSED'
exit 0
'''
success_regex = ["(?m)^TIMEOUT_DIAG_PASSED\\s*$"]
fail_regex = [
    '(?i)\bpanic(?:ked)?\b',
    '(?i)\bfatal\b',
    "(?m)^TIMEOUT_DIAG_FAILED\\s*$",
]
timeout = 60
