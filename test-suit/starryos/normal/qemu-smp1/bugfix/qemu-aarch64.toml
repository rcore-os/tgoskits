args = [
    "-nographic",
    "-m",
    "512M",
    "-cpu",
    "cortex-a53",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-aarch64-alpine.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
test_commands = [
    "/usr/bin/bug-futex-wait-wake",
    "/usr/bin/bug-lseek-negative-einval",
    "/usr/bin/bug-mkdir-empty-path",
    "/usr/bin/bug-packet-arping",
    "/usr/bin/bug-netlink-getlink",
    "/usr/bin/bug-nginx-fionread-socket",
    "/usr/bin/bug-open-dir-wronly",
    "/usr/bin/bug-pipe-fd-errno",
    "/usr/bin/bug-setpriority-current",
    "/usr/bin/bug-preadv2-invalid-flags",
    "/usr/bin/bug-preadv2-offset-neg1",
    "/usr/bin/bug-pwritev2-read-at",
    "/usr/bin/bug-signal-to-child",
    "/usr/bin/bug-sigchld-si-code-exit-group",
    "/usr/bin/bug-sigwaitinfo-blocked-sigchld",
    "/usr/bin/bug-tgkill-sigwait-ignored",
    "/usr/bin/bug-tty-sigint",
    "/usr/bin/bug-unlinkat-einval",
    "/usr/bin/bug-writev-dir-ebadf",
    "/usr/bin/test-dev-zero-full-transfer",
    "/usr/bin/clone3-badsize",
    "/usr/bin/bug-unaligned-cow-split",
    "/usr/bin/bug-proc-maps-lseek-refresh",
    "/usr/bin/bug-fcntl-posix-lock",
    "/usr/bin/bug-fcntl-ofd-lock",
    "/usr/bin/bug-fcntl-posix-exit-release",
    "/usr/bin/bug-fcntl-posix-close-release",
    "/usr/bin/bug-fcntl-ofd-pid-einval",
    "/usr/bin/bug-fcntl-fd-mode-ebadf",
    "/usr/bin/bug-fcntl-setlkw-blocks",
    "/usr/bin/bug-fcntl-len-negative",
    "/usr/bin/bug-flock",
    "/usr/bin/bug-flock-blocks",
    "/usr/bin/bug-flock-failed-upgrade",
    "/usr/bin/bug-fcntl-partial-wake",
    "/usr/bin/bug-fcntl-whence",
    "/usr/bin/bug-advisory-lock-dir",
    "/usr/bin/bug-proc-net-arp",
    "/usr/bin/bug-proc-init-pid",
    "/usr/bin/bug-af-inet6-v4mapped",
    "/usr/bin/bug-tcp-udp-bind-same-port",
    "/usr/bin/bug-tcp-send-no-epoll-notify",
    "/usr/bin/bug-epollet-second-chunk",
    "/usr/bin/bug-ext4-dir-ops",
    "/usr/bin/bug-tcp-concurrent-connect",
    "/usr/bin/bug-tcp-nonblocking-connect-so-error",
    "/usr/bin/bug-kill-zombie-esrch",
    "/usr/bin/bug-kill-zombie-perm",
    "/usr/bin/bug-raw-terminal-polling",
    "/usr/bin/bug-tty-cursor-report",
    "/usr/bin/bug-rename-replace",
    "/usr/bin/bug-rename-file-into-child-dir",
    "/usr/bin/bug-tmpfs-hardlink-cache",
    "/usr/bin/bug-zombie-syscalls",
    "/usr/bin/bug-starry-setuid-setgid-no-uidvalid",
    "/usr/bin/bug-open-nofollow-sym",
    "/usr/bin/bug-open-creat-directory-einval",
    "/usr/bin/bug-open-path-honors-excl",
    "/usr/bin/bug-open-path-dir-write-eisdir",
    "/usr/bin/bug-open-path-creat-creates",
    "/usr/bin/bug-open-path-sym-write-enoent",
    "/usr/bin/bug-open-rdonly-trunc-einval",
    "/usr/bin/bug-open-rdonly-append-promotes-rw",
    "/usr/bin/bug-open-creat-on-existing-dir-no-eisdir",
    "/usr/bin/bug-open-append-trunc-einval",
    "/usr/bin/bug-open-tmpfile-no-einval",
    "/usr/bin/bug-open-pathmax-no-enametoolong",
    "/usr/bin/bug-openat-empty-path-no-enoent",
    "/usr/bin/bug-openat-abs-path-honors-invalid-dirfd",
    "/usr/bin/bug-open-path-fstat-ebadf",
    "/usr/bin/bug-open-trailing-slash",
    "/usr/bin/bug-open-path-fchmod-bypass",
    "/usr/bin/bug-open-creat-dangling-no-create",
    "/usr/bin/bug-open-unix-socket-no-enxio",
    "/usr/bin/bug-open-fifo-wronly-no-reader-no-enxio",
    "/usr/bin/bug-prctl-set-vma-anon-name",
    "/usr/bin/bug-waitid-basic",
]
success_regex = ["(?m)^STARRY_GROUPED_TESTS_PASSED\\s*$"]
fail_regex = ['(?i)\bpanic(?:ked)?\b', "(?m)^lockdep fatal violation\\s*$", '(?m)^STARRY_GROUPED_TEST_FAILED:']
timeout = 360
