[package]
name = "rust-hello"
version = "0.1.0"
edition = "2021"

# Declare a standalone workspace so this crate is not treated as part of the
# tgoskits root workspace when cargo is invoked with --manifest-path.
[workspace]

[[bin]]
name = "rust-hello"
path = "src/main.rs"

[dependencies]
# Uses the system zlib installed by prebuild.sh to validate the prebuild pipeline.
flate2 = { version = "1", features = ["zlib"], default-features = false }
