args = [
    "-machine",
    "q35",
    "-nographic",
    "-m",
    "512M",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-alpine.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
]
uefi = false
to_bin = false
shell_prefix = "root@starry:"
shell_init_cmd = '''
fail() {
    echo "NIX_NOSANDBOX_ERROR: $1"
    echo 'NIX_NOSANDBOX_TEST_FAILED'
    exit 1
}

echo 'NIX_NOSANDBOX_PHASE_ROOTFS_BEGIN'
mkdir -p /nix /etc/nix /tmp/nix-smoke-nosandbox || fail 'failed to create Nix smoke directories'

echo 'NIX_NOSANDBOX_PHASE_INSTALL_BEGIN'
if command -v nix >/dev/null 2>&1; then
    echo 'NIX_NOSANDBOX_INFO: nix already available'
else
    apk update || fail 'apk update failed before Nix install'
    apk add nix || fail 'apk add nix failed'
fi
echo 'NIX_NOSANDBOX_PHASE_INSTALL_DONE'

echo 'NIX_NOSANDBOX_PHASE_NIX_BEGIN'
nix --version || fail 'nix --version failed'
echo 'NIX_NOSANDBOX_PHASE_NIX_DONE'

echo 'NIX_NOSANDBOX_PHASE_BUILD_BEGIN'
cat > /tmp/nix-smoke-nosandbox/default.nix <<'EOF'
derivation {
  name = "nix-smoke-nosandbox";
  system = builtins.currentSystem;
  builder = "/bin/sh";
  args = [ "-c" "echo NIX_LOCAL_BUILD_NOSANDBOX_OK > $out" ];
}
EOF
echo 'NIX_NOSANDBOX_INFO: tiny local unsandboxed nix-build timeout is 120s'
if command -v timeout >/dev/null 2>&1; then
    timeout 120 nix-build --no-substitute --option sandbox false /tmp/nix-smoke-nosandbox/default.nix >/tmp/nix-smoke-nosandbox/build.log 2>&1
    build_rc=$?
else
    nix-build --no-substitute --option sandbox false /tmp/nix-smoke-nosandbox/default.nix >/tmp/nix-smoke-nosandbox/build.log 2>&1
    build_rc=$?
fi
if [ "$build_rc" -ne 0 ]; then
    cat /tmp/nix-smoke-nosandbox/build.log
    echo "NIX_NOSANDBOX_BUILD_EXIT=$build_rc"
    if grep -q 'interrupted by the user' /tmp/nix-smoke-nosandbox/build.log; then
        fail 'tiny local unsandboxed nix-build was interrupted after waiting for store lock'
    fi
    fail 'tiny local unsandboxed nix-build failed'
fi
cat /tmp/nix-smoke-nosandbox/build.log
cat ./result || fail 'nix-build result symlink could not be read'
grep -q 'NIX_LOCAL_BUILD_NOSANDBOX_OK' ./result || fail 'tiny local unsandboxed nix-build output marker missing'
echo 'NIX_NOSANDBOX_PHASE_BUILD_DONE'
echo 'NIX_NOSANDBOX_TEST_PASSED'
exit 0
'''
success_regex = ["(?m)^NIX_NOSANDBOX_TEST_PASSED\\s*$"]
fail_regex = [
    '(?i)\bpanic(?:ked)?\b',
    '(?i)\bfatal\b',
    "(?m)^NIX_NOSANDBOX_TEST_FAILED\\s*$",
]
timeout = 900
