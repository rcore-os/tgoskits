board_type = "OrangePi-5-Plus"
shell_prefix = "root@starry:/root #"
shell_init_cmd = '''export GLIBC_TUNABLES=glibc.pthread.rseq=0; if command -v apk >/dev/null 2>&1; then apk update&&apk add curl; else echo "apk not found; using preinstalled curl"; fi; curl --version&&curl --connect-timeout 15 --max-time 60 --resolve baidu.com:443:110.242.68.66 -i https://baidu.com&&echo APK_CURL_TEST_PASSED||echo APK_CURL_TEST_FAILED'''
success_regex = ["(?m)^APK_CURL_TEST_PASSED\\s*$"]
fail_regex = ['(?i)\bpanic(?:ked)?\b', "(?m)^APK_CURL_TEST_FAILED\\s*$"]
timeout = 600
