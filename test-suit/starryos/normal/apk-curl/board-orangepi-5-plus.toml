board_type = "OrangePi-5-Plus"
shell_prefix = "root@starry:/root #"
shell_init_cmd = '''export GLIBC_TUNABLES=glibc.pthread.rseq=0; echo CURL_STAGE_START; if command -v apk >/dev/null 2>&1; then echo CURL_STAGE_APK_FOUND; apk update&&apk add curl; else echo "apk not found; using preinstalled curl"; fi; echo CURL_STAGE_VERSION; curl --version; echo CURL_STAGE_FETCH; curl -v --connect-timeout 15 --max-time 60 -i http://10.3.10.9:18789/; rc=$?; echo CURL_STAGE_FETCH_RC=$rc; if [ "$rc" -eq 0 ]; then echo APK_CURL_TEST_PASSED; else echo APK_CURL_TEST_FAILED; fi'''
success_regex = ["(?m)^APK_CURL_TEST_PASSED\\s*$"]
fail_regex = ['(?i)\bpanic(?:ked)?\b', "(?m)^APK_CURL_TEST_FAILED\\s*$"]
timeout = 600
