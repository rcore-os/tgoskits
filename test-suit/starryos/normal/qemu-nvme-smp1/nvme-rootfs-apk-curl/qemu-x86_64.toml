args = [
    "-machine",
    "q35",
    "-nographic",
    "-m",
    "512M",
    "-drive",
    "id=nvm,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-alpine.img",
    "-device",
    "nvme,serial=starry-nvme-rootfs,drive=nvm",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
]
uefi = false
to_bin = false
shell_prefix = "root@starry:"
shell_init_cmd = '''
i=0
while [ $i -lt 3 ]; do
    apk update && \
    apk add curl && \
    curl --version && \
    echo 'NVME_ROOTFS_APK_CURL_TEST_PASSED' && \
    exit 0
    i=$((i + 1))
    sleep 2
done
echo 'NVME_ROOTFS_APK_CURL_TEST_FAILED'
'''
success_regex = ["(?m)^NVME_ROOTFS_APK_CURL_TEST_PASSED\\s*$"]
fail_regex = ['(?i)\bpanic(?:ked)?\b', "(?m)^NVME_ROOTFS_APK_CURL_TEST_FAILED\\s*$"]
timeout = 1200
