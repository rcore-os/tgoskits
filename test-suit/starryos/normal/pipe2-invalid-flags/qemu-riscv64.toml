args = [
    "-nographic",
    "-cpu",
    "rv64",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/target/riscv64gc-unknown-none-elf/rootfs-riscv64.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = '''
set -e
chmod +x /root/pipe2-invalid-flags
/root/pipe2-invalid-flags
echo 'All tests passed!'
'''
success_regex = ["(?m)^All tests passed!\\s*$"]
fail_regex = ['(?i)\\bFAIL\\b', '(?i)\\bpanic(?:ked)?\\b']
timeout = 10
