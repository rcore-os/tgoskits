args = [
  "-nographic",
  "-cpu",
  "rv64",
  "-device",
  "virtio-blk-pci,drive=disk0",
  "-drive",
  "id=disk0,if=none,format=raw,file=${workspace}/target/riscv64gc-unknown-none-elf/rootfs-riscv64.img",
  "-device",
  "virtio-net-pci,netdev=net0",
  "-netdev",
  "user,id=net0",
]
fail_regex = ['(?i)\bpanic(?:ked)?\b', 'failed:']
shell_init_cmd = '''
updated=0
for attempt in 1 2 3; do
  if apk update; then
    updated=1
    break
  fi
  echo "apk update retry ${attempt}"
  sleep 1
done
[ "$updated" -eq 1 ] || {
  printf '%s%s apk update\n' 'failed' ':'
  exit 1
}
echo 'All tests passed!'
'''
shell_prefix = "starry:~#"
success_regex = ["(?m)^All tests passed!\\s*$"]
timeout = 420
to_bin = true
uefi = false
