args = [
    "-nographic",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-alpine.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
]
uefi = false
to_bin = false
shell_prefix = "root@starry:"
shell_init_cmd = '''
for i in $(seq 1 60); do
  if cat /proc/net/dhcp 2>/dev/null | grep -q 'ip=10\.0\.2\.'; then
    break
  fi
  sleep 1
done
cat /proc/net/dhcp | grep 'ip=10\.0\.2\.' && \
cat /proc/net/dhcp | grep 'gateway=10\.0\.2\.2' && \
apk update && \
echo 'DHCP_TEST_DONE' || \
echo 'DHCP_TEST_FAILED'
'''
success_regex = ["(?m)^DHCP_TEST_DONE\\s*$"]
fail_regex = ['(?i)\bpanic(?:ked)?\b', "(?m)^DHCP_TEST_FAILED\\s*$"]
timeout = 300
