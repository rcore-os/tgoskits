args = [
    "-nographic",
    "-m",
    "512M",
    "-cpu",
    "cortex-a53",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-aarch64-alpine.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = '''
echo 'DHCP_PROBE_BEGIN'

ifconfig_out="$(ifconfig eth0 2>&1 || true)"
echo "$ifconfig_out"
ip_addr_out="$(ip addr show eth0 2>&1 || true)"
echo "$ip_addr_out"
if echo "$ifconfig_out" "$ip_addr_out" | grep -qF '10.0.2.15'; then
    echo 'DHCP_ADDR_OK'
else
    echo 'DHCP_TEST_FAILED'
    exit 1
fi

resolver_out="$(cat /etc/resolv.conf 2>&1 || true)"
echo "$resolver_out"
if echo "$resolver_out" | grep -qF '10.0.2.3'; then
    echo 'DHCP_RESOLVER_OK'
else
    echo 'DHCP_TEST_FAILED'
    exit 1
fi

echo 'DHCP_TEST_DONE'
'''
success_regex = ["(?m)^DHCP_TEST_DONE\\s*$"]
fail_regex = ['(?i)\bpanic(?:ked)?\b', "(?m)^lockdep fatal violation\\s*$", "(?m)^DHCP_TEST_FAILED\\s*$"]
timeout = 120
