# axconfig override for the GICv3 + CNTV test build. Identical to the
# default aarch64-qemu-virt config except for `timer-irq`, which moves
# from CNTP / PPI 14 = IRQ 30 (default) to CNTV / PPI 11 = IRQ 27 so
# the virtual-timer interrupt the `gic-v3` feature programs lands on
# the GIC line the kernel handler subscribes to. Pulled in by the
# build config via `env = { AX_CONFIG_PATH = "..." }`.

# Architecture identifier.
arch = "aarch64"                                # str
# Platform identifier.
platform = "aarch64-qemu-virt"                  # str
# Platform package.
package = "ax-plat-aarch64-qemu-virt"            # str

[plat]
max-cpu-num = 1
phys-memory-base = 0x4000_0000
phys-memory-size = 0x2000_0000
kernel-base-paddr = 0x4020_0000
kernel-base-vaddr = "0xffff_0000_4020_0000"
phys-virt-offset = "0xffff_0000_0000_0000"
phys-bus-offset = 0
kernel-aspace-base = "0xffff_0000_0000_0000"
kernel-aspace-size = "0x0000_ffff_ffff_f000"
boot-stack-size = 0x40000

psci-method = "hvc"

[devices]
mmio-ranges = [
    [0x0900_0000, 0x1000],
    [0x0910_0000, 0x1000],
    [0x0800_0000, 0x10_0000],
    [0x0a00_0000, 0x4000],
    [0x1000_0000, 0x2eff_0000],
    [0x40_1000_0000, 0x1000_0000],
]
virtio-mmio-ranges = [
    [0x0a00_0000, 0x200],
    [0x0a00_0200, 0x200],
    [0x0a00_0400, 0x200],
    [0x0a00_0600, 0x200],
    [0x0a00_0800, 0x200],
    [0x0a00_0a00, 0x200],
    [0x0a00_0c00, 0x200],
    [0x0a00_0e00, 0x200],
    [0x0a00_1000, 0x200],
    [0x0a00_1200, 0x200],
    [0x0a00_1400, 0x200],
    [0x0a00_1600, 0x200],
    [0x0a00_1800, 0x200],
    [0x0a00_1a00, 0x200],
    [0x0a00_1c00, 0x200],
    [0x0a00_1e00, 0x200],
    [0x0a00_3000, 0x200],
    [0x0a00_2200, 0x200],
    [0x0a00_2400, 0x200],
    [0x0a00_2600, 0x200],
    [0x0a00_2800, 0x200],
    [0x0a00_2a00, 0x200],
    [0x0a00_2c00, 0x200],
    [0x0a00_2e00, 0x200],
    [0x0a00_3000, 0x200],
    [0x0a00_3200, 0x200],
    [0x0a00_3400, 0x200],
    [0x0a00_3600, 0x200],
    [0x0a00_3800, 0x200],
    [0x0a00_3a00, 0x200],
    [0x0a00_3c00, 0x200],
    [0x0a00_3e00, 0x200],
]
pci-ecam-base = 0x40_1000_0000
pci-bus-end = 0xff
pci-ranges = [
    [0x3ef_f0000, 0x1_0000],
    [0x1000_0000, 0x2eff_0000],
    [0x80_0000_0000, 0x80_0000_0000],
]
uart-paddr = 0x0900_0000
uart-irq = 33
# CNTV / PPI 11 = IRQ 27 (GICv3 + virtual-timer build only).
timer-irq = 27
ipi-irq = 1

gicc-paddr = 0x0801_0000
gicd-paddr = 0x0800_0000
gicr-paddr = 0x080A_0000

rtc-paddr = 0x901_0000
