board_type = "LicheeRV-Nano-SG2002"
kernel_load_addr = "0x80200000"
fit_load_addr = "0x82200000"
bootm_addr = "0x82200000"
shell_prefix = "root@starry:"
shell_init_cmd = "echo STARRY_SG2002_BOOT_OK"
success_regex = ["(?m)^STARRY_SG2002_BOOT_OK\\s*$"]
fail_regex = [
  "(?i)\\bpanic(?:ked)?\\b",
  "failed to determine root device",
]
timeout = 600
