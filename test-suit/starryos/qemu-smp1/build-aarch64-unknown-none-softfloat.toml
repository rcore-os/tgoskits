features = [
  "ax-feat/display",
  "ax-feat/rtc",
  "ax-driver/serial",
  "ax-driver/nvme",
  "ax-driver/virtio-net",
  "ax-driver/virtio-gpu",
  "ax-driver/virtio-input",
  "ax-driver/virtio-socket",
  "ax-driver/xhci-pci",
  "starry-kernel/input",
  "starry-kernel/vsock",
  # RGA + dma-heap (aarch64 only — RK-specific). The probe is inert in QEMU (no RGA FDT node),
  # so /dev/rga + /dev/dma_heap exist and the rga-abi / dma-heap-dmabuf system tests exercise the
  # real ioctl plumbing (graceful no-hardware path) instead of skipping.
  "starry-kernel/rga",
]
log = "Warn"
target = "aarch64-unknown-none-softfloat"
