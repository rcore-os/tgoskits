args = [
    "-nographic",
    "-m", "512M",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-alpine.img",
    "-device", "virtio-net-pci,netdev=net0",
    "-netdev", "user,id=net0",
]
uefi = false
to_bin = false
shell_prefix = "root@starry:"
test_commands = [
    "/usr/bin/test-ext4-inode-unique",
    "/usr/bin/test-fcntl-lock-lifecycle",
    "/usr/bin/test-flock-cloexec",
    "/usr/bin/test-lock-close-range-cloexec",
    "/usr/bin/test-nix-builder-lifecycle",
    "/usr/bin/starry-test-suit/test-open-unlink-write",
    "/usr/bin/starry-test-suit/test-pidfd-poll-exit",
    "/usr/bin/starry-test-suit/test-pipe-poll-close",
    "/usr/bin/starry-test-suit/test-proc-wchan",
    "/usr/bin/starry-test-suit/test-pty-master-close",
    "/usr/bin/test-pty-openpt",
    "/usr/bin/test-unshare-mount-ns",
    "/usr/bin/starry-test-suit/test-unshare-fs",
]
success_regex = ["(?m)^STARRY_GROUPED_TESTS_PASSED\\s*$"]
fail_regex = [
    '(?i)\bpanic(?:ked)?\b',
    '(?i)\bfatal\b',
    "(?m)^STARRY_GROUPED_TEST_FAILED:",
    "(?m)^EXT4_INODE_UNIQUE_FAILED",
    "(?m)^FLOCK_CLOEXEC_FAILED:",
    "(?m)^LOCK_CLOSE_RANGE_CLOEXEC_FAILED:",
    '(?m)not found',
    '(?m)^TEST FAILED\s*$',
    '(?m)^\s*FAIL\s*[|:]',
]
timeout = 600
