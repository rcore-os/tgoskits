args = [
    "-nographic", "-machine", "virt,gic-version=2",
    "-cpu", "cortex-a53", "-m", "512M",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-aarch64-alpine.img",
    "-device", "virtio-net-pci,netdev=net0",
    "-netdev", "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = '''
set -e

echo "STAGE_APK_BEGIN"
apk update
apk add sqlite
echo "STAGE_APK_OK"

echo "STAGE_S0_BEGIN"
sqlite3 --version
echo "S0_OK"

echo "STAGE_S1_BEGIN"
out="$(sqlite3 :memory: 'SELECT 1;')"
test "$out" = "1"
echo "S1_OK"

echo "STAGE_S2_BEGIN"
rm -f /tmp/test.db /tmp/test.db-journal /tmp/test.db-wal /tmp/test.db-shm
sqlite3 /tmp/test.db "CREATE TABLE t(id INTEGER PRIMARY KEY, name TEXT);"
test -f /tmp/test.db
echo "S2_OK"

echo "STAGE_S3_BEGIN"
out="$(sqlite3 /tmp/test.db "INSERT INTO t(name) VALUES('alice'); SELECT id, name FROM t;")"
test "$out" = "1|alice"
echo "S3_OK"

echo "STAGE_S4_BEGIN"
out="$(sqlite3 /tmp/test.db "SELECT id, name FROM t;")"
test "$out" = "1|alice"
echo "S4_OK"

echo "ALL_STAGES_PASSED"
'''
success_regex = ["(?m)^ALL_STAGES_PASSED\\s*$"]
fail_regex = ['(?m)^(?:\x1b\[[0-9;]*[A-Za-z])*panicked at(?:\s|$)', '(?m)^STARRY_GROUPED_TEST_FAILED:']
timeout = 300
