args = [
    "-nographic",
    "-m", "512M",
    "-cpu", "max",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-alpine.img",
    "-device", "virtio-net-pci,netdev=net0",
    "-netdev", "user,id=net0",
]
uefi = false
to_bin = false
shell_prefix = "root@starry:"
shell_init_cmd = '''
test -x /opt/llama/llama-cli || chmod +x /opt/llama/llama-cli
/opt/llama/llama-cli -m /opt/llama/tiny-llm-q4_0.gguf --no-mmap -p "test" -n 1 -t 1 -c 256 > /tmp/llama-load.log 2>&1
RC=$?
echo "LLAMA_LOAD_RC=$RC"
if [ "$RC" -eq 0 ]; then
    echo "LLAMA_LOAD_OK"
else
    echo "LLAMA_LOAD_FAILED"
fi
'''
success_regex = ["(?m)^LLAMA_LOAD_OK\\s*$"]
fail_regex = [
    "(?m)^LLAMA_LOAD_FAILED\\s*$",
    "(?i)kernel panic",
    "(?i)panicked at",
    "(?i)segmentation fault",
    "(?i)illegal instruction",
    "(?i)bus error",
    "(?i)not implemented",
    "(?i)out of memory",
    "(?i)killed",
]
timeout = 300
