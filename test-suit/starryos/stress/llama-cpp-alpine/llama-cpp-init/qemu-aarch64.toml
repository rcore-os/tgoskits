args = [
    "-nographic",
    "-m", "512M",
    "-cpu", "cortex-a53",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-aarch64-alpine.img",
    "-device", "virtio-net-pci,netdev=net0",
    "-netdev", "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = '''
/opt/llama/llama-cli -m /nonexistent.gguf -p "hi" -n 1 -t 1 > /tmp/llama-init.log 2>&1
RC=$?
echo "LLAMA_INIT_RC=$RC"
if grep -qi "error\|failed\|cannot\|unable\|not found\|no such" /tmp/llama-init.log; then
    echo "LLAMA_L1_GRACEFUL"
else
    echo "LLAMA_L1_UNEXPECTED"
fi
'''
success_regex = ["(?m)^LLAMA_L1_GRACEFUL\\s*$"]
fail_regex = [
    "(?m)^LLAMA_L1_UNEXPECTED\\s*$",
    "(?i)kernel panic",
    "(?i)panicked at",
    "(?i)segmentation fault",
    "(?i)illegal instruction",
    "(?i)bus error",
    "(?i)not implemented",
]
timeout = 120
