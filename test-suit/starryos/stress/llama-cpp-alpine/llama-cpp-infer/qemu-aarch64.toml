args = [
    "-nographic",
    "-m", "512M",
    "-cpu", "cortex-a53",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-aarch64-alpine.img",
    "-device", "virtio-net-pci,netdev=net0",
    "-netdev", "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = '''
test -x /opt/llama/llama-cli || chmod +x /opt/llama/llama-cli
/opt/llama/llama-cli -m /opt/llama/tiny-llm-q4_0.gguf --no-mmap -p "hello" -n 8 -t 1 -c 512 > /tmp/llama-infer.log 2>&1
RC=$?
echo "LLAMA_INFER_RC=$RC"
tail -20 /tmp/llama-infer.log
if [ "$RC" -ne 0 ]; then
    echo "LLAMA_INFER_FAILED"
else
    echo "LLAMA_INFER_OK"
fi
'''
success_regex = ["(?m)^LLAMA_INFER_OK\\s*$"]
fail_regex = [
    "(?m)^LLAMA_INFER_FAILED\\s*$",
    "(?i)kernel panic",
    "(?i)panicked at",
    "(?i)segmentation fault",
    "(?i)illegal instruction",
    "(?i)bus error",
    "(?i)not implemented",
    "(?i)out of memory",
    "(?i)killed",
]
timeout = 600
