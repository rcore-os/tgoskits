args = [
    "-nographic",
    "-cpu", "rv64",
    "-m", "512M",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-riscv64-alpine.img",
    "-device", "virtio-net-pci,netdev=net0",
    "-netdev", "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = '''
/opt/llama/llama-cli --help > /tmp/llama-help.log 2>&1
RC=$?
echo "LLAMA_HELP_RC=$RC"
if [ "$RC" -eq 0 ]; then echo "LLAMA_L0_OK"; else echo "LLAMA_L0_FAILED"; fi
'''
success_regex = ["(?m)^LLAMA_L0_OK\\s*$"]
fail_regex = [
    "(?m)^LLAMA_L0_FAILED\\s*$",
    "(?i)kernel panic",
    "(?i)panicked at",
    "(?i)segmentation fault",
    "(?i)illegal instruction",
    "(?i)bus error",
]
timeout = 60
