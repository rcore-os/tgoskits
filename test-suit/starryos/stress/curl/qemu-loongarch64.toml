args = [
    "-machine", "virt",
    "-cpu", "la464",
    "-nographic",
    "-m", "512M",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-loongarch64-alpine.img",
    "-device", "virtio-net-pci,netdev=net0",
    "-netdev", "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = """
apk update >/dev/null 2>&1 &&
apk add curl ca-certificates >/dev/null 2>&1 &&
curl --version &&
curl -fsS --connect-timeout 5 --max-time 15 http://10.0.2.2:8000/ > /tmp/curl.out &&
cat /tmp/curl.out &&
grep "hello from host" /tmp/curl.out &&
code=$(curl -sS -o /tmp/curl_status.out -w "%{http_code}" --connect-timeout 5 --max-time 15 http://10.0.2.2:8000/) &&
test "$code" = "200" &&
grep "hello from host" /tmp/curl_status.out &&
code_404=$(curl -sS -o /tmp/curl_404.out -w "%{http_code}" --connect-timeout 5 --max-time 15 http://10.0.2.2:8000/not-found || true) &&
test "$code_404" = "404" &&
curl -I -sS --connect-timeout 5 --max-time 15 http://10.0.2.2:8000/ | grep -i "HTTP/" &&
echo "CURL_TEST_DONE=$(date +%s)"
"""
success_regex = ["(?m)^CURL_TEST_DONE=\\d+\\s*$"]
fail_regex = [
    "(?m)^(?:\\x1b\\[[0-9;]*[A-Za-z])*panicked at(?:\\s|$)",
    "(?m)^CURL_TEST_FAILED\\s*$",
]
timeout = 300

