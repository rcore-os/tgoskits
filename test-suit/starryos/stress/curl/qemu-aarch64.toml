args = [
    "-machine", "virt",
    "-cpu", "cortex-a53",
    "-nographic",
    "-m", "512M",

    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/target/aarch64-unknown-none-softfloat/rootfs-aarch64.img",

    "-device", "virtio-net-pci,netdev=net0",
    "-netdev", "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = """
unset http_proxy https_proxy HTTP_PROXY HTTPS_PROXY ALL_PROXY all_proxy
echo "[curl-test] start"
apk update >/dev/null 2>&1
apk add curl ca-certificates >/dev/null 2>&1
OUT=$(curl --noproxy '*' -sS --connect-timeout 5 --max-time 15 http://10.0.2.2:8000/)
echo "[curl-test] response:"
echo "$OUT"
echo "$OUT" | grep "hello from host"
echo "[curl-test] passed"
"""

success_regex = ["(?m)^CURL_TEST_DONE=\\d+\\s*$"]
fail_regex = [
    "(?m)^(?:\\x1b\\[[0-9;]*[A-Za-z])*panicked at(?:\\s|$)",
    "(?m)^CURL_TEST_FAILED\\s*$",
]
timeout = 300

