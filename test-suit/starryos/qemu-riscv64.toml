args = [
    "-nographic",
    "-cpu",
    "rv64",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=/home/zhourui/opensource/tgoskits2/target/riscv64gc-unknown-none-elf/disk.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "starry:~#"
shell_init_cmd = "pwd && echo 'shell ok'"
success_regex = ["^shell ok$"]
fail_regex = ['(?i)\bpanic(?:ked)?\b']
timeout = 3