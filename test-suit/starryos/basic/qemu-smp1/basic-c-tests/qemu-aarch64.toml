args = [
    "-nographic",
    "-m",
    "512M",
    "-cpu",
    "cortex-a53",
    "-device",
    "virtio-blk-pci,drive=disk0",
    "-drive",
    "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-aarch64-alpine.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
    "-device",
    "virtio-keyboard-pci",
    "-device",
    "virtio-tablet-pci",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
test_commands = [
    '''
found=0
failed=0
for bin in /usr/bin/starry-basic-tests/*; do
    [ -f "$bin" ] && [ -x "$bin" ] || continue
    found=1
    echo "STARRY_BASIC_TEST_BEGIN: $bin"
    if ! "$bin"; then
        failed=1
    fi
done
[ "$found" -eq 1 ] && [ "$failed" -eq 0 ] && echo "STARRY_GROUPED_TESTS_PASSED"
''',
]
success_regex = ["(?m)^STARRY_GROUPED_TESTS_PASSED\\s*$"]
fail_regex = ['(?i)\bpanic(?:ked)?\b', '(?m)^STARRY_GROUPED_TEST_FAILED:']
timeout = 300
