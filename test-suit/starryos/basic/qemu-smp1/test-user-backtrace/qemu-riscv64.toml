args = [
    "-nographic", "-cpu", "rv64",
    "-device", "virtio-blk-pci,drive=disk0",
    "-drive", "id=disk0,if=none,format=raw,file=${workspace}/target/rootfs/rootfs-riscv64-alpine.img",
    "-device", "virtio-net-pci,netdev=net0",
    "-netdev", "user,id=net0",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/test-user-backtrace"
success_regex = ["(?s)user register dump:.*?user backtrace:.*?DONE: 1 pass, 0 fail"]
fail_regex = ['(?i)\bpanic(?:ked)?\b', '(?m)FAIL']
timeout = 60
