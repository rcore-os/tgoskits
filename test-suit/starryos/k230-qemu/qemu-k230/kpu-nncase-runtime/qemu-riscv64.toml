args = [
  "-L",
  "${workspace}/../../qemu-k230-docker-build/pc-bios",
  "-machine",
  "k230",
  "-smp",
  "2",
  "-m",
  "2G",
  "-nographic",
  "-dtb",
  "${workspace}/os/StarryOS/configs/board/k230-canmv.dtb",
  "-drive",
  "if=sd,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-riscv64-alpine.img",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/k230-nncase-runtime-demo"
success_regex = [
  "(?m)^K230_NNCASE_RUNTIME_PASS$",
]
fail_regex = [
  "(?i)\\bpanic(?:ked)?\\b",
  "(?i)illegal instruction",
  "(?i)aborted",
  "(?m)^NNCASE_MINIMAL_FAIL:",
  "(?m)^YOLOV8N_DEMO_FAIL:",
  "(?m)^K230_NNCASE_RUNTIME_FAIL:",
]
timeout = 300
