args = [
    "-nographic",
    "-m",
    "512M",
    "-device",
    "nvme,serial=deadbeef,drive=nvm",
    "-drive",
    "id=nvm,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-alpine.img",
]
# This std/PIC test image requires the x86_64 UEFI handoff before the tty test starts.
uefi = true
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/tty-input-burst.sh"
success_regex = ["(?m)^STARRY_TTY_INPUT_BURST_PASSED\\s*$"]
fail_regex = [
    "(?i)panic",
    "(?m)^lockdep fatal violation\\s*$",
    "/dev/console has no serial TTY binding",
    "Failed to bind console tty",
    "(?m)^STARRY_TTY_INPUT_BURST_FAILED",
]
timeout = 300
