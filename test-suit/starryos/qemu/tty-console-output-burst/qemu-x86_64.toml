args = [
    "-nographic",
    "-m",
    "512M",
    "-device",
    "nvme,serial=deadbeef,drive=nvm",
    "-drive",
    "id=nvm,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-alpine.img",
]
uefi = false
to_bin = false
shell_prefix = "root@starry:"
shell_init_cmd = "exec /usr/bin/tty-output-burst"
success_regex = ["(?m)^STARRY_TTY_OUTPUT_BURST_FRAME:120:[^\\r\\n]{192}\\r?\\nSTARRY_TTY_OUTPUT_BURST_PASSED\\s*$"]
fail_regex = [
    "(?i)panic",
    "(?m)^lockdep fatal violation\\s*$",
    "/dev/console has no serial TTY binding",
    "Failed to bind console tty",
    "(?m)^STARRY_TTY_OUTPUT_BURST_FAILED",
]
timeout = 300
