args = [
    "-nographic",
    "-cpu",
    "Haswell,+avx",
    "-m",
    "512M",
    "-smp",
    "2",
    "-device",
    "nvme,serial=deadbeef,drive=nvm",
    "-drive",
    "id=nvm,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-alpine.img",
    "-device",
    "virtio-net-pci,netdev=net0",
    "-netdev",
    "user,id=net0",
    "-device",
    "virtio-gpu-pci",
    "-device",
    "virtio-keyboard-pci",
    "-device",
    "virtio-tablet-pci",
    "-device",
    "qemu-xhci,id=xhci,msi=off,msix=off",
    "-audiodev",
    "none,id=audio0",
    "-device",
    "usb-audio,bus=xhci.0,audiodev=audio0",
    "-drive",
    "id=usbdisk,if=none,format=raw,snapshot=on,file=${workspace}/tmp/axbuild/rootfs/rootfs-x86_64-busybox.img",
    "-device",
    "usb-storage,bus=xhci.0,drive=usbdisk,serial=starry-usb-storage",
]
uefi = false
to_bin = false
shell_prefix = "root@starry:"
test_commands = [
    '''
set -e
for name in block-io-bench block-io-smoke bug-futex-wait-wake test-futex-wake-op-smp test-cargo-jobserver-wait; do
    bin=/usr/bin/starry-test-suit/$name
    echo "STARRY_IRQ_IO_GATE_BEGIN: $name"
    "$bin"
    echo "STARRY_IRQ_IO_GATE_CASE_PASSED: $name"
done
echo "STARRY_IRQ_IO_GATE_PASSED"
''',
]
success_regex = ["(?m)^STARRY_IRQ_IO_GATE_PASSED\\s*$"]
fail_regex = ['(?i)\bpanic(?:ked)?\b', "(?m)^lockdep fatal violation\\s*$", '(?m)^STARRY_GROUPED_TEST_FAILED:']
timeout = 300

[host_http_server]
bind = "127.0.0.1"
port = 18380
body_size = 20971520
body_byte = 97
