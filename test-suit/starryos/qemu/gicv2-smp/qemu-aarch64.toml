args = [
    "-nographic",
    "-machine",
    "virt,gic-version=2",
    "-m",
    "512M",
    "-cpu",
    "cortex-a53",
    "-smp",
    "4",
    "-device",
    "nvme,serial=deadbeef,drive=nvm",
    "-drive",
    "id=nvm,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-aarch64-alpine.img",
]
uefi = false
to_bin = true
shell_prefix = "root@starry:"
shell_init_cmd = "/usr/bin/gicv2-smp"
success_regex = ["(?m)^STARRY_GICV2_SMP_PASSED\\s*$"]
fail_regex = [
    '(?i)\bpanic(?:ked)?\b',
    "(?m)^lockdep fatal violation\\s*$",
    "(?m)^STARRY_GICV2_SMP_FAILED",
]
timeout = 300
