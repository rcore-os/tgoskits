[package]
name = "ax-net"
version = "0.7.2"
repository = "https://github.com/rcore-os/tgoskits"
edition.workspace = true
authors = ["Mivik <mivikq@gmail.com>"]
description = "Unified network stack for TGOSKits (ArceOS, StarryOS, Axvisor)"
license.workspace = true

[features]
vsock = ["dep:rdif-vsock"]

[dependencies]
async-channel = { version = "2.5", default-features = false }
async-trait = "0.1"
ax-errno = { workspace = true }
ax-hal = { workspace = true }
ax-io = { workspace = true }
ax-kspin = { workspace = true }
axpoll = { workspace = true }
ax-sync = { workspace = true }
ax-task = { workspace = true, features = ["irq", "multitask"] }
bitflags = "2.9"
cfg-if = { workspace = true }
enum_dispatch = "0.3"
event-listener = { version = "5.4", default-features = false }
hashbrown = "0.16"
log = { workspace = true }
rd-net = { workspace = true }
rdif-vsock = { workspace = true, optional = true }
ringbuf = { version = "0.4", default-features = false, features = ["alloc"] }
spin = { workspace = true }

[dependencies.smoltcp]
workspace = true
features = [
  "alloc",
  "log",             # no std
  "async",
  "medium-ethernet",
  "medium-ip",
  "proto-ipv4",
  "proto-ipv6",
  "socket-raw",
  "socket-icmp",
  "socket-udp",
  "socket-tcp",
  "socket-dhcpv4",
  "socket-dns",
  "iface-max-addr-count-8",
  # "fragmentation-buffer-size-65536", "proto-ipv4-fragmentation",
  # "reassembly-buffer-size-65536", "reassembly-buffer-count-32",
  # "assembler-max-segment-count-32",
]

[dev-dependencies]
ax-hal = { workspace = true, features = ["host-test"] }
ax-kspin = { workspace = true, features = ["host-test"] }
ax-task = { workspace = true, features = ["host-test"] }
