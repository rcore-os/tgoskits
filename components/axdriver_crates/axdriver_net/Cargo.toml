[package]
name = "ax-driver-net"
edition.workspace = true
version = "0.3.11"
repository = "https://github.com/rcore-os/tgoskits"
authors = [
    "Yuekai Jia <equation618@gmail.com>",
    "ChengXiang Qi <kuangjux@outlook.com>",
    "朝倉水希 <asakuramizu111@gmail.com>",
    "Yu Chen <yuchen@tsinghua.edu.cn>"
]
description = "Common traits and types for network device (NIC) drivers"
keywords = ["arceos", "driver", "nic"]
categories = ["os", "no-std", "hardware-support"]
readme = "README.md"
license = "Apache-2.0"

[features]
default = []
fxmac = ["dep:fxmac_rs"]
ixgbe = ["dep:ixgbe-driver"]

[dependencies]
ax-driver-base = { workspace = true }
bitflags = "2.9"
fxmac_rs = { workspace = true, optional = true }
ixgbe-driver = { version = "0.1.1-preview.1", optional = true }
log = { workspace = true }
spin = "0.9"
