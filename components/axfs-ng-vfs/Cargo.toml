[package]
name = "axfs-ng-vfs"
version = "0.5.7"
edition.workspace = true
authors = ["Mivik <mivikq@gmail.com>", "朝倉水希 <asakuramizu111@gmail.com>"]
description = "Virtual filesystem layer for ArceOS"
keywords = ["vfs", "filesystem", "ax-fs-ng", "arceos"]
repository = "https://github.com/Starry-OS/axfs-ng-vfs"
license = "Apache-2.0"

[features]
default = []
lockdep = ["ax-kspin/lockdep"]

[dependencies]
ax-errno = { workspace = true }
ax-kspin = { workspace = true }
bitflags = "2.10"
cfg-if = "1"
hashbrown = "0.16"
inherit-methods-macro = "0.1"
log = "0.4"
smallvec = "1.15"

[dev-dependencies]
ax-crate-interface.workspace = true
ax-kernel-guard = { workspace = true, features = ["preempt"] }
ax-kspin = { workspace = true, features = ["host-test"] }
