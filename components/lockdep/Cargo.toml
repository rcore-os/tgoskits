[package]
name = "ax-lockdep"
version = "0.1.4"
repository = "https://github.com/rcore-os/tgoskits"
edition.workspace = true
authors = ["Shi Lei <shi_lei@massclouds.com>"]
description = "Lock dependency tracing helpers for ArceOS components"
license.workspace = true

[features]
task-context = ["dep:axpanic"]

[dependencies]
ax-crate-interface = { workspace = true }
ax-kernel-guard = { workspace = true }
axpanic = { workspace = true, optional = true }

[target.'cfg(target_arch = "riscv64")'.dependencies]
sbi-rt = { workspace = true, features = ["legacy"] }
