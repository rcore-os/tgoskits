[aarch64-unknown-none]
rustflags = [
    "-C",
    "relocation-model=pic",
    "-Clink-args=-pie",
    "-Clink-args=-znostart-stop-gc",
]
cargoargs = ["-Z", "build-std=core,alloc"]

