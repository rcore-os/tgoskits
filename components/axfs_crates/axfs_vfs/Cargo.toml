[package]
name = "ax-fs-vfs"
description = "Virtual filesystem interfaces used by ArceOS"
keywords = ["arceos", "filesystem", "vfs"]
edition.workspace = true
version = "0.4.0"
repository = "https://github.com/rcore-os/tgoskits"
authors = ["Yuekai Jia <equation618@gmail.com>"]
categories = ["os", "no-std", "filesystem"]
license = "Apache-2.0"

[features]
default = []

[dependencies]
log = "0.4"
bitflags = "2.10"
ax-errno = { workspace = true }
ax-kspin = { workspace = true }
axpoll = { workspace = true }
cfg-if = "1"
hashbrown = "0.16"
inherit-methods-macro = "0.1"
smallvec = "1.15"
