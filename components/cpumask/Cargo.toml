[package]
name = "ax-cpumask"
version = "0.3.5"
repository = "https://github.com/rcore-os/tgoskits"
edition.workspace = true
authors = ["keyang.hu@qq.com"]
description = "CPU mask library in Rust"
keywords = ["arceos", "cpu-affinity", "cpumask"]
categories = ["os", "no-std"]
license = "Apache-2.0"

[dependencies]
axtest = { workspace = true, optional = true }
bitmaps = { version = "3.2.1", default-features = false }

[features]
axtest = ["dep:axtest"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(axtest)'] }
