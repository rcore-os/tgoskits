[package]
name = "x86_vcpu"
version = "0.5.6"
edition.workspace = true
authors = [
    "Mingxian Su <aarkegz@gmail.com>",
    "Keyang Hu <keyang.hu@qq.com>"
]
categories = ["virtualization", "no-std"]
description = "x86 Virtual CPU implementation for the Arceos Hypervisor"
repository = "https://github.com/arceos-hypervisor/x86_vcpu"
keywords = ["x86", "vcpu", "hypervisor", "arceos"]
license = "Apache-2.0"

[package.metadata.docs.rs]
targets = ["x86_64-unknown-none"]

[dependencies]
log = "0.4.19"
cfg-if = "1.0"
bitflags = "2.2"
bit_field = "0.10"
paste = "1.0.15"
x86 = "0.52"
x86_64 = "0.15"
raw-cpuid = "11.0"
numeric-enum-macro = "0.2"

ax-errno = { workspace = true }
ax-page-table-entry = { workspace = true }
ax-memory-addr = { workspace = true }
ax-crate-interface = { workspace = true }
axaddrspace = { workspace = true }
axvcpu = { workspace = true }
x86_vlapic = { workspace = true }
axdevice_base = { workspace = true }
axvisor_api = { workspace = true }
spin = { version = "0.10", default-features = false }

[features]
default = ["vmx"]
tracing = []
vmx = []
svm = []
