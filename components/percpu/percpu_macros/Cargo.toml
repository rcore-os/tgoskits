[package]
name = "ax-percpu-macros"
description = "Macros to define and access a per-CPU data structure"
version = "0.4.9"
repository = "https://github.com/rcore-os/tgoskits"
edition.workspace = true
authors = ["Yuekai Jia <equation618@gmail.com>", "hky1999 <976929993@qq.com>", "Su Mingxian <aarkegz@gmail.com>", "yufeng <321353225@qq.com>"]
keywords = ["arceos", "percpu"]
categories = ["development-tools::procedural-macro-helpers", "no-std"]
license = "Apache-2.0"

[features]
default = []

# For single CPU use, just make the per-CPU data a global variable.
sp-naive = []

# Whether the system enables preemption.
preempt = []

# ARM specific, whether to run at the EL2 privilege level.
arm-el2 = []

# Allow using non-zero VMA addresses for `.percpu` section. Required for testing
# on Linux user-space. May reduce performance slightly.
non-zero-vma = []

custom-base = []

[dependencies]
cfg-if = "1.0"
proc-macro2 = "1.0"
quote = "1.0"
syn = { version = "2.0", features = ["full"] }

[lib]
proc-macro = true
