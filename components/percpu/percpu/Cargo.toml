[package]
name = "ax-percpu"
description = "Define and access per-CPU data structures"
version = "0.4.13"
repository = "https://github.com/rcore-os/tgoskits"
edition.workspace = true
authors = ["Yuekai Jia <equation618@gmail.com>", "hky1999 <976929993@qq.com>", "Su Mingxian <aarkegz@gmail.com>", "yufeng <321353225@qq.com>"]
keywords = ["arceos", "percpu"]
categories = ["development-tools::procedural-macro-helpers", "no-std"]
license = "Apache-2.0"

[features]
default = []

# Enable Linux user-space fallback used by ax-percpu's own host tests.
host-test = ["dep:spin"]

# For single CPU use, just make the per-CPU data a global variable.
sp-naive = ["ax-percpu-macros/sp-naive"]

# Whether the system enables preemption.
preempt = ["ax-percpu-macros/preempt", "dep:ax-kernel-guard"]

# ARM specific, whether to run at the EL2 privilege level.
arm-el2 = ["ax-percpu-macros/arm-el2"]

# Allow using non-zero VMA addresses for `.percpu` section. Required for testing
# on Linux user-space. May reduce performance slightly.
non-zero-vma = ["ax-percpu-macros/non-zero-vma"]

# Enable custom per-CPU base mode: per-CPU statics are generated as `PerCpuData<T>`
# and the caller is responsible for setting the CPU-local base register (e.g. via
# `init_percpu_reg`) before current-CPU access.
custom-base = ["ax-percpu-macros/custom-base"]

[dependencies]
cfg-if = "1.0"
ax-kernel-guard = { workspace = true, optional = true }
ax-percpu-macros = { workspace = true }
spin = { workspace = true, optional = true }

[target.'cfg(target_arch = "x86_64")'.dependencies]
x86 = "0.52"
