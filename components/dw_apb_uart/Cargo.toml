[package]
name = "dw_apb_uart"
authors = ["Luoyuan Xiao <xiaoluoyuan@163.com>"]
version = "0.1.1"
edition = "2021"
description = "Uart snps,dw-apb-uart driver in Rust for BST A1000b FADA board."
license = "GPL-3.0-or-later OR Apache-2.0 OR MulanPSL-2.0"
homepage = "https://github.com/arceos-org/arceos"
repository = "https://github.com/arceos-org/dw_apb_uart"
documentation = "https://arceos-org.github.io/dw_apb_uart"

[features]
# Default UART source clock for `init_with_baud()` / `init()`:
#   - sg2002 (CV181x): 25 MHz
#   - rk3588:          24 MHz (xin24m crystal)
# Pick exactly one. Code that knows the clock can always call
# `init_with_baud_clk(baud, clk_hz)` directly regardless of feature.
default = ["sg2002"]
sg2002 = []
rk3588 = []

[dependencies]
tock-registers = "0.10"
