[package]
name = "irq-framework"
version = "0.3.0"
edition.workspace = true
authors = ["RCore Team <yuchen@tsinghua.edu.cn>"]
description = "A no_std dynamic IRQ registration and dispatch framework"
repository.workspace = true
license.workspace = true
keywords = ["irq", "interrupt", "no-std", "kernel"]
categories = ["no-std", "os"]

[dependencies]
axtest = { workspace = true, optional = true }

[features]
axtest = ["dep:axtest"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(axtest)'] }
