[package]
name = "scope-local"
version = "0.4.2"
edition.workspace = true
description = "Scope local storage"
authors = ["朝倉水希 <asakuramizu111@gmail.com>"]
keywords = ["arceos"]
repository = "https://github.com/Starry-OS/scope-local"
license = "Apache-2.0"

[dependencies]
ax-percpu = { workspace = true, features = ["non-zero-vma"] }
spin = { workspace = true }

[dev-dependencies]
ctor = "0.6"
ax-percpu = { workspace = true, features = ["host-test", "non-zero-vma"] }
