[package]
name = "ax-page-table-entry"
description = "Page table entry definition for various hardware architectures"
version = "0.8.7"
repository = "https://github.com/rcore-os/tgoskits"
edition.workspace = true
authors = ["Yuekai Jia <equation618@gmail.com>"]
keywords = ["arceos", "paging", "page-table", "virtual-memory"]
categories = ["os", "hardware-support", "memory-management", "no-std"]
license = "Apache-2.0"

[features]
arm-el2 = []
xuantie-c9xx = []

[dependencies]
bitflags = "2.9"
ax-memory-addr.workspace = true

[target.'cfg(any(target_arch = "aarch64", doc, docsrs))'.dependencies]
aarch64-cpu = "11.0"

[target.'cfg(any(target_arch = "x86_64", doc, docsrs))'.dependencies]
x86_64 = { version = "0.15", default-features = false }

[package.metadata.docs.rs]
rustc-args = ["--cfg", "docsrs"]
all-features = true
