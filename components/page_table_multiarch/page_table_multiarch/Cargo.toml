[package]
name = "ax-page-table-multiarch"
description = "Generic page table structures for various hardware architectures"
version = "0.8.7"
repository = "https://github.com/rcore-os/tgoskits"
edition.workspace = true
authors = ["Yuekai Jia <equation618@gmail.com>"]
keywords = ["arceos", "paging", "page-table", "virtual-memory"]
categories = ["os", "hardware-support", "memory-management", "no-std"]
license = "Apache-2.0"

[features]
default = []
ax-errno = ["dep:ax-errno"]
copy-from = ["dep:bitmaps"]

[dependencies]
ax-errno = { workspace = true, optional = true }
arrayvec = { version = "0.7", default-features = false }
bitmaps = { version = "3.2", default-features = false, optional = true }
log = "0.4"
ax-memory-addr.workspace = true
ax-page-table-entry.workspace = true

[target.'cfg(any(target_arch = "x86_64", doc, docsrs))'.dependencies]
x86 = "0.52"

[target.'cfg(any(target_arch = "riscv32", target_arch = "riscv64", doc, docsrs))'.dependencies]
riscv = { version = "0.16", default-features = false }

[package.metadata.docs.rs]
rustc-args = ["--cfg", "docsrs"]
all-features = true

[dev-dependencies]
rand = { version = "0.10", default-features = false }
