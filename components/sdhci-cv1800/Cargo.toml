[package]
name = "sdhci-cv1800"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
description = "CV1800/SG2002 SDHCI controller driver core; OS capabilities injected via the SdhciDelay trait."
# Board bring-up / in-tree integration only; not intended for crates.io.
publish = false

[features]
default = []
# OS glue: ArceOS-backed delay/yield provider. The driver core does not need it.
arceos = ["dep:ax-task"]

[dependencies]
sdio-host = { workspace = true }
log = { workspace = true }

# OS glue dependency — optional, only used behind the `arceos` feature.
ax-task = { workspace = true, optional = true }
