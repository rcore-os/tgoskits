[package]
name = "sdhci-cv1800"
version = "0.1.1"
edition = "2024"
license = "Apache-2.0"
repository.workspace = true
description = "CV1800/SG2002 SDIO1 platform wrapper for the generic IRQ-driven SDHCI host"

[features]
default = []

[dependencies]
dma-api = { workspace = true }
mmio-api = { workspace = true }
sdhci-host = { workspace = true, default-features = false }
sdio-host2 = { workspace = true }
sdmmc-protocol = { workspace = true, default-features = false, features = ["sdio"] }
rdif-irq = { workspace = true }
