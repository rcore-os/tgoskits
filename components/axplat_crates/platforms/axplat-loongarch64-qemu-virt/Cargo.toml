[package]
name = "ax-plat-loongarch64-qemu-virt"
version = "0.5.7"
repository = "https://github.com/rcore-os/tgoskits"
description = "Implementation of `axplat` hardware abstraction layer for QEMU LoongArch virtual machine."
keywords = ["arceos", "os", "hal", "embedded", "loongarch"]
categories = ["embedded", "no-std", "hardware-support", "os"]
edition.workspace = true
authors = ["Yuekai Jia <equation618@gmail.com>", "Youjie Zheng <Azure_stars@126.com>", "yanjuguang <coolyanjg@163.com>", "Su Mingxian <aarkegz@gmail.com>", "RobertYuan <634954435@qq.com>", "hky1999 <keyang.hu@qq.com>"]
license = "Apache-2.0"

[features]
fp-simd = ["ax-cpu/fp-simd"]
irq = ["ax-plat/irq"]
rtc = ["dep:chrono"]
smp = ["ax-plat/smp", "ax-kspin/smp", "irq"]

[dependencies]
chrono = { version = "0.4", default-features = false, optional = true }
ax-kspin = { workspace = true }
ax-lazyinit = { workspace = true }
log = "0.4"
loongArch64 = "0.2.4"
ax-page-table-entry = { workspace = true }
uart_16550 = "0.5"

ax-config-macros = { workspace = true }
ax-cpu = { workspace = true }
ax-plat = { workspace = true }

[package.metadata.docs.rs]
targets = ["loongarch64-unknown-none"]
