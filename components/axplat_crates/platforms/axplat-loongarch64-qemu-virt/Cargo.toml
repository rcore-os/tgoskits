[package]
name = "ax-plat-loongarch64-qemu-virt"
version = "0.5.2"
repository = "https://github.com/rcore-os/tgoskits"
description = "Implementation of `axplat` hardware abstraction layer for QEMU LoongArch virtual machine."
keywords = ["arceos", "os", "hal", "embedded", "loongarch"]
categories = ["embedded", "no-std", "hardware-support", "os"]
edition = "2024"
authors = [
    "Yuekai Jia <equation618@gmail.com>",
    "Youjie Zheng <Azure_stars@126.com>",
    "yanjuguang <coolyanjg@163.com>",
    "Su Mingxian <aarkegz@gmail.com>",
    "RobertYuan <634954435@qq.com>",
    "hky1999 <keyang.hu@qq.com>",
]
license = "Apache-2.0"

[features]
fp-simd = ["ax-cpu/fp-simd"]
irq = ["ax-plat/irq"]
rtc = ["dep:chrono"]
smp = ["ax-plat/smp", "ax-kspin/smp", "irq"]

[dependencies]
chrono = { version = "0.4", default-features = false, optional = true }
ax-kspin = "0.3.2"
ax-lazyinit = "0.4.3"
log = "0.4"
ax-page-table-entry = "0.8.2"
ax-config-macros = "0.4.2"
ax-cpu = { workspace = true }
ax-plat = { workspace = true }

[target.'cfg(target_arch = "loongarch64")'.dependencies]
loongArch64 = "0.2.4"
uart_16550 = "0.5"

[package.metadata.docs.rs]
targets = ["loongarch64-unknown-none-softfloat"]
