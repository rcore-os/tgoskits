[package]
name = "ax-plat-aarch64-peripherals"
version = "0.5.2"
repository = "https://github.com/rcore-os/tgoskits"
description = "ARM64 common peripheral drivers with `axplat` compatibility"
keywords = ["arceos", "os", "hal", "peripheral", "aarch64"]
categories = ["embedded", "no-std", "hardware-support", "os"]
edition = "2024"
authors = [
    "Yuekai Jia <equation618@gmail.com>",
    "Youjie Zheng <Azure_stars@126.com>",
    "yanjuguang <coolyanjg@163.com>",
    "Su Mingxian <aarkegz@gmail.com>",
    "RobertYuan <634954435@qq.com>",
    "hky1999 <keyang.hu@qq.com>",
]
license = "Apache-2.0"

[features]
irq = ["ax-plat/irq"]

[dependencies]
ax-kspin = "0.3.2"
log = "0.4"
spin = "0.10"
ax-int-ratio = "0.3.3"
ax-lazyinit = "0.4.3"
ax-cpu = { workspace = true }
ax-plat = { workspace = true }

[target.'cfg(target_arch = "aarch64")'.dependencies]
aarch64-cpu = "11.0"
ax-arm-pl011 = "0.3.1"
arm-gic-driver = "0.16"
ax-arm-pl031 = "0.4.2"

[package.metadata.docs.rs]
targets = ["aarch64-unknown-none-softfloat"]
