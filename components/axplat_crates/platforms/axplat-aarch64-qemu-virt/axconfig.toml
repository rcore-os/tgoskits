# Architecture identifier.
arch = "aarch64"                                # str
# Platform identifier.
platform = "aarch64-qemu-virt"                  # str
# Platform package.
package = "ax-plat-aarch64-qemu-virt"            # str

#
# Platform configs
#
[plat]
# Maximum number of CPUs. For platforms that do not support runtime CPU number
# detection, it's also the number of CPUs to boot.
max-cpu-num = 1                     # uint
# Base address of the whole physical memory.
phys-memory-base = 0x4000_0000      # uint
# Size of the whole physical memory. (512M)
phys-memory-size = 0x2000_0000       # uint
# Base physical address of the kernel image.
kernel-base-paddr = 0x4020_0000     # uint
# Base virtual address of the kernel image.
kernel-base-vaddr = "0xffff_0000_4020_0000"     # uint
# Linear mapping offset, for quick conversions between physical and virtual
# addresses.
phys-virt-offset = "0xffff_0000_0000_0000"      # uint
# Offset of bus address and phys address. some boards, the bus address is
# different from the physical address.
phys-bus-offset = 0                             # uint
# Kernel address space base.
kernel-aspace-base = "0xffff_0000_0000_0000"    # uint
# Kernel address space size.
kernel-aspace-size = "0x0000_ffff_ffff_f000"    # uint
# Stack size on bootstrapping. (256K)
boot-stack-size = 0x40000                       # uint

# PSCI
psci-method = "hvc"             # str

#
# Device specifications
#
[devices]
# MMIO ranges with format (`base_paddr`, `size`).
mmio-ranges = [
    [0x0900_0000, 0x1000],      # PL011 UART
    [0x0910_0000, 0x1000],      # PL031 RTC
    # GIC region: covers GICv2 (GICD at 0x0800_0000 + GICC at
    # 0x0801_0000, 128 KB total) and GICv3 (GICD 64 KB + GICR at
    # 0x080A_0000 with 0x20000 per-CPU stride). 1 MB window covers
    # both layouts plus headroom for redistributors on multi-CPU v3.
    [0x0800_0000, 0x10_0000],   # GIC (v2: GICD+GICC  |  v3: GICD+GICR)
    [0x0a00_0000, 0x4000],      # VirtIO
    [0x1000_0000, 0x2eff_0000],     # PCI memory ranges (ranges 1: 32-bit MMIO space)
    [0x40_1000_0000, 0x1000_0000],  # PCI config space
]                                   # [(uint, uint)]
# VirtIO MMIO ranges with format (`base_paddr`, `size`).
virtio-mmio-ranges = [
    [0x0a00_0000, 0x200],
    [0x0a00_0200, 0x200],
    [0x0a00_0400, 0x200],
    [0x0a00_0600, 0x200],
    [0x0a00_0800, 0x200],
    [0x0a00_0a00, 0x200],
    [0x0a00_0c00, 0x200],
    [0x0a00_0e00, 0x200],
    [0x0a00_1000, 0x200],
    [0x0a00_1200, 0x200],
    [0x0a00_1400, 0x200],
    [0x0a00_1600, 0x200],
    [0x0a00_1800, 0x200],
    [0x0a00_1a00, 0x200],
    [0x0a00_1c00, 0x200],
    [0x0a00_1e00, 0x200],
    [0x0a00_3000, 0x200],
    [0x0a00_2200, 0x200],
    [0x0a00_2400, 0x200],
    [0x0a00_2600, 0x200],
    [0x0a00_2800, 0x200],
    [0x0a00_2a00, 0x200],
    [0x0a00_2c00, 0x200],
    [0x0a00_2e00, 0x200],
    [0x0a00_3000, 0x200],
    [0x0a00_3200, 0x200],
    [0x0a00_3400, 0x200],
    [0x0a00_3600, 0x200],
    [0x0a00_3800, 0x200],
    [0x0a00_3a00, 0x200],
    [0x0a00_3c00, 0x200],
    [0x0a00_3e00, 0x200],
]                               # [(uint, uint)]
# Base physical address of the PCIe ECAM space.
pci-ecam-base = 0x40_1000_0000  # uint
# End PCI bus number (`bus-range` property in device tree).
pci-bus-end = 0xff              # uint
# PCI device memory ranges (`ranges` property in device tree).
pci-ranges = [
    [0x3ef_f0000, 0x1_0000],            # PIO space
    [0x1000_0000, 0x2eff_0000],         # 32-bit MMIO space
    [0x80_0000_0000, 0x80_0000_0000],   # 64-bit MMIO space
]                               # [(uint, uint)]
# UART Address
uart-paddr = 0x0900_0000        # uint
# UART IRQ number (SPI, 1)
uart-irq = 33                   # uint
# Timer interrupt num. CNTP / PPI 14 = IRQ 30 is the default that
# every aarch64 board in tree expects. Builds with the `cntv-timer`
# Cargo feature on this crate (e.g. `FEATURES=starryos/cntv-timer
# cargo xtask starry build --arch aarch64 ...`) use CNTV / PPI 11 =
# IRQ 27 instead and must override this value via
# `axconfig_overrides = ["devices.timer-irq=27"]`. The static_assert
# in init.rs enforces this at compile time. The
# `test-suit/starryos/aarch64-hvf` group is the in-tree test profile
# that enables both GICv3 and CNTV with this override.
timer-irq = 30                  # uint
# IPI interrupt num
ipi-irq = 1                     # uint

# GIC CPU Interface base address (GICv2 only; ignored on GICv3).
gicc-paddr = 0x0801_0000        # uint
# GIC Distributor base address (used by both v2 and v3).
gicd-paddr = 0x0800_0000        # uint
# GIC Redistributor base address (GICv3 only). QEMU's `virt` machine
# with `gic-version=3` places GICR at 0x080A_0000 with 0x20000
# per-CPU stride. Apple HVF's virtualized interrupt controller is
# always GICv3, so this address is exercised whenever `-accel hvf`
# is in use. Ignored by the GICv2 backend.
gicr-paddr = 0x080A_0000        # uint

# pl031@9010000 {
#     clock-names = "apb_pclk";
#     clocks = <0x8000>;
#     interrupts = <0x00 0x02 0x04>;
#     reg = <0x00 0x9010000 0x00 0x1000>;
#     compatible = "arm,pl031\0arm,primecell";
# };
# RTC (PL031) Address
rtc-paddr = 0x901_0000          # uint
