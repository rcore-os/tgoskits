[package]
name = "aic8800"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
description = "AIC8800 Wi-Fi driver core (SDIO, firmware, WPA2, SoftAP). OS-independent; runtime capabilities are injected via wifi-host::WifiRuntime."

[features]
default = []
# OS glue: provides an ArceOS-backed `WifiRuntime` implementation. The driver
# core does not need this; enable it when integrating on ArceOS/Starry.
arceos = ["dep:ax-task", "dep:ax-hal", "sdhci-cv1800/arceos"]

[dependencies]
log = { workspace = true }

sdio-host = { workspace = true }
sdhci-cv1800 = { workspace = true }
wifi-host = { workspace = true }

spin = { workspace = true }
atomic-waker = { workspace = true }

rdif-eth = { workspace = true }
rd-net = { workspace = true }
dma-api = { workspace = true }

# OS glue dependencies — optional, only used behind the `arceos` feature.
ax-task = { workspace = true, features = ["multitask"], optional = true }
ax-hal = { workspace = true, features = ["irq"], optional = true }

hmac = { version = "0.12", default-features = false }
sha1 = { version = "0.10", default-features = false }
digest = { version = "0.10", default-features = false }
aes = { version = "0.8", default-features = false }
pbkdf2 = { version = "0.12", default-features = false }

