[package]
authors = ["周睿 <zrufo747@outlook.com>"]
categories = ["embedded", "no-std"]
description = "Sparreal OS kernel"
edition.workspace = true
keywords = ["os"]
license = "MPL-2.0"
name = "somehal"
repository = "https://github.com/ZR233/sparreal-os"
version = "0.5.0"

[features]
efi = []
hv = []
mmu = []
uspace = ["mmu"]

[dependencies]
acpi = "6.0.1"
aml = "0.16"
ansi_rgb = "0.2"
anyhow = {workspace = true, default-features = false}
arrayvec = {version = "0.7", default-features = false}
bitflags = "2.9"
buddy_system_allocator = "0.11"
byte-unit = {workspace = true}
fdt-raw = "0.1"
fdt-edit = "0.1"
heapless = "0.9"
kernutil = {workspace = true}
log = "0.4"
num-align = "0.1"
numeric-enum-macro = "0.2"
page-table-generic = {workspace = true}
rgb = "0.8"
some-serial = "0.3"
somehal-macros = {workspace = true}
spin = "0.10"
uguid = "2.2.1"
ranges-ext = {workspace = true}
tock-registers.workspace = true

[target.'cfg(target_arch = "loongarch64")'.dependencies]
loongArch64 = "0.2"
uefi.workspace = true

[target.'cfg(target_arch = "aarch64")'.dependencies]
aarch64-cpu = "11"
aarch64-cpu-ext = "0.1"
kasm-aarch64 = {workspace = true}
some-serial = "0.3"
smccc = "0.2"

[build-dependencies]
prettyplease = "0.2"
quote = "1.0"
syn = "2.0"
