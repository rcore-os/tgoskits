[package]
name = "axplat-custom"
version = "0.1.0"
publish = false
authors.workspace = true
categories.workspace = true
description = "Example custom ax-plat platform crate for ArceOS"
edition.workspace = true
keywords.workspace = true
license.workspace = true
repository.workspace = true

[features]
default = []
smp = ["ax-plat/smp"]
irq = ["ax-plat/irq"]

[dependencies]
ax-plat.workspace = true
rdrive.workspace = true

[package.metadata.axplat]
platform = "custom"
arch = "aarch64"
crate = "axplat_custom"
dynamic = false
