[package]
name = "ax-plat-dyn"
version = "0.6.2"
authors = ["周睿 <zrufo747@outlook.com>"]
categories.workspace = true
description = "A dynamic platform module for ArceOS, providing runtime platform detection and configuration"
edition.workspace = true
keywords.workspace = true
license.workspace = true
repository.workspace = true

[features]
default = ["smp", "irq" ]
smp = ["ax-plat/smp"]
irq = ["ax-plat/irq"]
rtc = []
fp-simd = ["ax-cpu/fp-simd"]
uspace = ["somehal/uspace"]
hv = ["somehal/hv", "ax-cpu/arm-el2"]

[dependencies]
anyhow = { version = "1", default-features = false }
ax-config-macros = { workspace = true }
ax-cpu.workspace = true
ax-driver = { workspace = true, features = ["fdt", "pci-fdt"] }
ax-errno.workspace = true
axklib.workspace = true
ax-plat.workspace = true
heapless = "0.9"
log.workspace = true
ax-memory-addr.workspace = true
ax-percpu = { workspace = true, features = ["custom-base"] }
rdrive.workspace = true
somehal.workspace = true
spin = "0.10"

[package.metadata.axplat]
platform = "dyn"
arch = "aarch64"
crate = "ax_plat_dyn"
dynamic = true
