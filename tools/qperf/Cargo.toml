[package]
name = "qperf"
version = "0.1.0"
edition = "2024"
publish = false

[lib]
crate-type = ["cdylib"]
test = false

[dependencies]
anyhow = "1.0.100"
bincode.workspace = true
crossbeam-channel = "0.5.15"
qemu-plugin = { version = "10.1.0-v2", default-features = false, features = [
    "anyhow",
    "plugin-api-v5",
] }
zerocopy = { version = "0.8.26", features = ["derive", "std"] }
