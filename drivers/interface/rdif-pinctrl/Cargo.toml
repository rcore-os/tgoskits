[package]
authors = ["周睿 <zrufo747@outlook.com>"]
categories = ["embedded", "no-std"]
description = "Driver Interface pin control definition."
edition.workspace = true
keywords = ["os", "driver", "pinctrl", "gpio"]
license = "MIT"
name = "rdif-pinctrl"
repository.workspace = true
version = "0.1.2"

[dependencies]
axtest = { workspace = true, optional = true }
fdt-edit = { workspace = true, optional = true }
rdif-base = { workspace = true }
thiserror = { version = "2", default-features = false }

[features]
axtest = ["dep:axtest"]
default = []
fdt = ["dep:fdt-edit"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(axtest)'] }
