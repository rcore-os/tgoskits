[package]
edition = "2024"
name = "rockchip-npu"
version = "0.1.0"

[dependencies]
aarch64-cpu-ext = "0.1"
dma-api = { version = "0.7.2" }
log = "0.4"
mbarrier = "0.1"
num-align = "0.1"
rdif-base = {version = "0.8"}
spin = "0.10"
thiserror = {version = "2.0", default-features = false}
tock-registers = "0.10"
bitflags = "2"

[dev-dependencies]
arm-scmi = { git = "https://github.com/drivercraft/arm-scmi" }
bare-test = "0.8"
fdt-edit = "0.2.3"
rk3588-clk = { version = "0.1.3" }
rockchip-pm = { version = "0.4" }

[build-dependencies]
bare-test-macros = "0.3"

[[test]]
harness = false
name = "test"
