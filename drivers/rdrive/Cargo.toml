[package]
authors = ["周睿 <zrufo747@outlook.com>"]
categories = ["embedded", "no-std"]
description = "A dyn driver manager."
edition.workspace = true
keywords = ["os", "driver"]
license = "MIT"
name = "rdrive"
repository.workspace = true
version = "0.23.6"

[dependencies]
acpi = "6.1.1"
ax-kspin = { workspace = true }
fdt-edit.workspace = true
fdt-raw.workspace = true
log = "0.4"
mmio-api.workspace = true
paste = "1"
spin = { workspace = true }
thiserror = { version = "2", default-features = false }

pcie.workspace = true

rdif-base = { workspace = true }
rdif-clk = { workspace = true }
rdif-pinctrl = { workspace = true, features = ["fdt"] }
rdif-power = { workspace = true }
rdif-reset = { workspace = true }
rdrive-macros.workspace = true
rdif-pcie = { workspace = true }

[target.'cfg(target_arch = "x86_64")'.dependencies]
x86.workspace = true

[dev-dependencies]
ax-kspin-test-runtime = { path = "../../components/kspin/test-runtime" }
