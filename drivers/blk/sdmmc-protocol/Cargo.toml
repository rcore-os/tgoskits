[package]
name = "sdmmc-protocol"
version = "0.4.1"
edition = "2024"
license = "Apache-2.0"
description = "no_std SD/MMC protocol building blocks for embedded systems"
documentation = "https://docs.rs/sdmmc-protocol"
readme = "README.md"
keywords = ["sd", "mmc", "sdio", "embedded", "no_std"]
categories = ["embedded", "no-std", "hardware-support"]

[dependencies]
bitflags = "2"
dma-api.workspace = true
log.workspace = true
rdif-block = { workspace = true, optional = true }
sdio-host2.workspace = true

[features]
default = []
sdio = []
rdif = ["sdio", "dep:rdif-block"]
