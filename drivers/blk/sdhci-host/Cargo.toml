[package]
name = "sdhci-host"
version = "0.4.1"
repository.workspace = true
edition = "2024"
license = "Apache-2.0"
description = "SDHCI host controller backend for sdmmc-protocol (no_std, FIFO/ADMA2)"
readme = "README.md"
keywords = ["sd", "sdhci", "embedded", "no_std"]
categories = ["embedded", "no-std", "hardware-support"]

[dependencies]
sdmmc-protocol = { workspace = true, default-features = false, features = ["sdio", "rdif"] }
sdio-host2.workspace = true
embedded-hal = "1"
log.workspace = true
dma-api.workspace = true
mmio-api.workspace = true
rdif-block.workspace = true

[features]
default = []
