[package]
name = "arm-gic-driver"
version = "0.17.7"
edition = "2024"
license = "MIT"
description = "A driver for the Arm Generic Interrupt Controller."
authors = ["周睿 <zrufo747@outlook.com>"]
repository.workspace = true
keywords = ["arm", "aarch64", "driver", "gic", "interrupt-controller"]
categories = ["embedded", "no-std", "hardware-support"]

[lib]
doctest = false

[package.metadata.docs.rs]
# Build docs on aarch64 so that platform-specific modules are included
targets = ["aarch64-unknown-linux-gnu"]
all-features = true

[features]
rdif = ["rdif-intc"]

[dependencies]
tock-registers = { version = "0.10" }
enum_dispatch = "0.3"
log = "0.4"
bitflags = "2.9"
paste = "1"
rdif-intc = {workspace = true, optional = true}

[target.'cfg(target_arch = "aarch64")'.dependencies]
aarch64-cpu = "11"
