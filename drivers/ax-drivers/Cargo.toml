[package]
name = "ax-drivers"
version = "0.1.0"
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "ArceOS rdrive driver registration and rdif binding collection"

[lib]
name = "ax_drivers"

[features]
default = []

fdt = ["dep:fdt-edit"]
acpi = []
pci = ["dep:pcie", "dep:heapless", "dep:spin"]
irq = []

block = ["dep:ax-errno", "dep:rd-block", "dep:spin"]
net = ["dep:rd-net", "dep:spin"]
display = ["dep:ax-errno", "dep:rdif-display"]
input = ["dep:ax-errno", "dep:rdif-input"]
vsock = ["dep:ax-errno", "dep:rdif-vsock"]

virtio-core = ["dep:ax-alloc", "dep:virtio-drivers", "virtio-drivers/alloc"]
virtio = ["virtio-core"]
virtio-blk = ["block", "virtio"]
virtio-net = ["net", "virtio"]
virtio-gpu = ["display", "virtio"]
virtio-input = ["input", "virtio"]
virtio-socket = ["vsock", "virtio"]

ramdisk = ["block", "dep:ramdisk"]
sdmmc = ["block", "dep:simple-sdmmc"]
cvsd = ["block", "dep:sg200x-bsp"]
bcm2835-sdhci = ["block", "dep:bcm2835-sdhci"]
ahci = ["block", "pci", "dep:simple-ahci"]
ixgbe = ["net", "pci", "dep:ax-alloc", "dep:ixgbe-driver"]
fxmac = ["net", "dep:ax-alloc", "dep:ax-crate-interface", "dep:fxmac_rs"]
intel-net = ["net", "pci", "dep:eth-intel"]
realtek-rtl8125 = ["net", "pci", "dep:realtek-rtl8125"]

usb = ["dep:crab-usb"]
xhci-mmio = ["usb"]
xhci-pci = ["usb", "pci"]
serial = ["dep:some-serial"]
rtc = []
rknpu = ["dep:rockchip-npu"]
rockchip-sdhci = ["block", "dep:sdhci-host", "dep:sdmmc-protocol"]
rockchip-dwmmc = ["block", "dep:dwmmc-host", "dep:sdmmc-protocol"]
rk3588-pcie = ["pci", "dep:rk3588-pci"]
rockchip-soc = ["dep:rockchip-soc"]
rockchip-pm = ["dep:rockchip-pm"]
pci-list-devices = ["pci"]

[dependencies]
anyhow = { workspace = true }
ax-alloc = { workspace = true, optional = true }
ax-crate-interface = { workspace = true, optional = true }
ax-errno = { workspace = true, optional = true }
axklib.workspace = true
bcm2835-sdhci = { workspace = true, optional = true }
crab-usb = { workspace = true, optional = true }
dma-api.workspace = true
dwmmc-host = { workspace = true, optional = true }
eth-intel = { workspace = true, optional = true }
fdt-edit = { workspace = true, optional = true }
fxmac_rs = { workspace = true, optional = true }
heapless = { workspace = true, optional = true }
ixgbe-driver = { workspace = true, optional = true }
log.workspace = true
mmio-api.workspace = true
pcie = { workspace = true, optional = true }
ramdisk = { workspace = true, optional = true }
rd-block = { workspace = true, optional = true }
rd-net = { workspace = true, optional = true }
rdif-display = { workspace = true, optional = true }
rdif-input = { workspace = true, optional = true }
rdif-vsock = { workspace = true, optional = true }
realtek-rtl8125 = { workspace = true, optional = true }
rdrive.workspace = true
rk3588-pci = { workspace = true, optional = true }
rockchip-npu = { workspace = true, optional = true }
rockchip-pm = { workspace = true, optional = true }
rockchip-soc = { workspace = true, optional = true }
sdhci-host = { workspace = true, optional = true }
sdmmc-protocol = { workspace = true, default-features = false, optional = true }
sg200x-bsp = { workspace = true, optional = true }
simple-ahci = { workspace = true, optional = true }
simple-sdmmc = { workspace = true, optional = true }
some-serial = { workspace = true, optional = true }
spin = { workspace = true, optional = true }
virtio-drivers = { workspace = true, optional = true }
