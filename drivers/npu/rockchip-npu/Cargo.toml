[package]
authors = ["周睿 <zrufo747@outlook.com>"]
categories = ["embedded", "hardware-support", "no-std"]
description = "Low-level device layer for Rockchip NPUs"
edition.workspace = true
autotests = false
keywords = ["rk3588", "npu", "rknn"]
license = "Apache-2.0"
name = "rockchip-npu"
version = "0.2.9"
repository.workspace = true

[dependencies]
aarch64-cpu-ext = "0.1"
bitflags = "2"
dma-api = {workspace = true}
log = "0.4"
mbarrier = "0.1"
num-align = "0.1"
rdif-base.workspace = true
spin = { workspace = true }
thiserror = {version = "2.0", default-features = false}
tock-registers = "0.10"

[dev-dependencies]
# fdt-edit = "0.2.3"
# rockchip-pm = { workspace = true }
# rockchip-soc = { workspace = true }

