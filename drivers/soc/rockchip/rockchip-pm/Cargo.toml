[package]
edition.workspace = true
name = "rockchip-pm"
version = "0.4.3"
autotests = false
authors = ["周睿 <zrufo747@outlook.com>"]
categories = ["embedded", "no-std"]
description = "Driver for Rockchip Power Management Unit (PMU) supporting RK3588 and similar SoCs."
keywords = ["os", "rockchip", "power", "driver"]
license = "MIT"
readme = "README.md"
documentation = "https://docs.rs/rockchip-pm"
repository = "https://github.com/drivercraft/rockchip-pm"

exclude = [
  "dtb/*",
]

[dependencies]
log = "0.4"
mbarrier = "0.1"
rdif-base.workspace = true
tock-registers = "0.10"

