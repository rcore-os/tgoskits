name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-pre.*'

permissions:
  contents: write

jobs:
  check:
    uses: ./.github/workflows/check.yml

  test:
    uses: ./.github/workflows/test.yml
    needs: check

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag and branch (HEAD-based)
        shell: bash
        run: |
          set -e

          TAG="${{ github.ref_name }}"
          TAG_COMMIT=$(git rev-list -n 1 "$TAG")

          git fetch origin main

          MAIN_HEAD=$(git rev-parse origin/main)

          echo "Tag:        $TAG"
          echo "Tag commit: $TAG_COMMIT"
          echo "main HEAD:  $MAIN_HEAD"

          if [[ "$TAG" == *-pre.* ]]; then
            echo "✅ prerelease tag detected"
          else
            if [ "$TAG_COMMIT" != "$MAIN_HEAD" ]; then
              echo "⚠️  Warning: stable release tag not created from main HEAD"
            fi
            echo "✅ stable release tag validated"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-pre.') }}
          body: |
            ## ${{ github.ref_name }}

            - [Documentation](https://docs.rs/rockchip-pm)
            - [crates.io](https://crates.io/crates/rockchip-pm)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag and branch (HEAD-based)
        shell: bash
        run: |
          set -e

          TAG="${{ github.ref_name }}"
          TAG_COMMIT=$(git rev-list -n 1 "$TAG")

          git fetch origin main

          MAIN_HEAD=$(git rev-parse origin/main)

          echo "Tag:        $TAG"
          echo "Tag commit: $TAG_COMMIT"
          echo "main HEAD:  $MAIN_HEAD"

          if [[ "$TAG" == *-pre.* ]]; then
            echo "✅ prerelease tag detected"
          else
            if [ "$TAG_COMMIT" != "$MAIN_HEAD" ]; then
              echo "⚠️  Warning: stable release tag not created from main HEAD"
            fi
            echo "✅ stable release tag validated"
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
          components: rust-src
          targets: aarch64-unknown-none-softfloat

      - name: Publish to crates.io
        run: cargo publish --registry crates-io --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
