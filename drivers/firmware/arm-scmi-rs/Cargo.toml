[package]
name = "arm-scmi-rs"
version = "0.1.4"
edition = "2024"
autotests = false
description = "ARM SCMI (System Control and Management Interface) protocol implementation for no_std embedded environments"
license = "MIT"
repository = "https://github.com/rcore-os/tgoskits"
readme = "README.md"
keywords = ["arm", "scmi", "no_std", "embedded", "clock"]
categories = ["embedded", "hardware-support", "no-std", "os"]

[dependencies]
ax-kspin = { workspace = true }
bitflags = "2"
log = "0.4"
mbarrier = "0.1"
smccc = "0.2"
thiserror = {version = "2", default-features = false}
tock-registers = "0.10"
nb = "1"
aarch64-cpu-ext = "0.1"

[dev-dependencies]
num-align = "0.1"

