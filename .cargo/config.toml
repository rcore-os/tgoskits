include = [{ path = ".config-local.toml", optional = true }]

[net]
# 使用系统 git 拉取依赖，可利用已配置的 git 凭证（如 gh auth、credential helper）
git-fetch-with-cli = true

[resolver]
incompatible-rust-versions = "allow"

[alias]
axvisor = "run -p axvisor --bin xtask --"
xtask = "run -p tg-xtask --"
starry = "run -p tg-xtask -- starry"
arceos = "run -p tg-xtask -- arceos"