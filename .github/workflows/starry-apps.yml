name: Starry Apps

on:
  schedule:
    # GitHub cron uses UTC. This runs at 02:00 Beijing time (UTC+8).
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: starry-apps-${{ github.ref }}
  cancel-in-progress: false

jobs:
  starry_apps:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rcore-os/tgoskits-container:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: PicoClaw CLI offline smoke
            cache_key: starry-app-picoclaw-cli
            command: |
              apps/starry/picoclaw-cli/prepare_picoclaw_rootfs.sh
              cargo xtask starry qemu \
                --arch x86_64 \
                --qemu-config apps/starry/picoclaw-cli/qemu-x86_64-picoclaw-offline.toml \
                --rootfs tmp/axbuild/rootfs/rootfs-x86_64-picoclaw.img
          - name: Codex CLI offline help smoke
            cache_key: starry-app-codex-cli
            command: |
              apps/starry/codex-cli/prepare_codex_rootfs.sh
              cargo xtask starry qemu \
                --arch x86_64 \
                --qemu-config apps/starry/codex-cli/qemu-x86_64-codex-help.toml \
                --rootfs tmp/axbuild/rootfs/rootfs-x86_64-codex.img
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Show checkout state
        shell: bash
        run: |
          set -eux
          command -v git
          git -c safe.directory="${GITHUB_WORKSPACE}" rev-parse --show-toplevel
          git -c safe.directory="${GITHUB_WORKSPACE}" rev-parse --is-inside-work-tree

      - name: Ensure qemu user emulators
        shell: bash
        run: |
          set -eux
          for emulator in \
            qemu-aarch64-static \
            qemu-riscv64-static \
            qemu-loongarch64-static \
            qemu-x86_64-static
          do
            if ! command -v "${emulator}" >/dev/null 2>&1; then
              echo "::error::${emulator} not found; rebuild the CI container image to include qemu-user-static"
              exit 1
            fi
          done

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.cache_key }}
          save-if: ${{ github.event_name == 'schedule' }}

      - name: Show Rust version
        run: rustc --version

      - name: Run Starry app smoke
        env:
          STARRY_APK_REGION: us
        shell: bash
        run: |
          set -euxo pipefail
          ${{ matrix.command }}

  starry_orangepi_apps:
    name: ${{ matrix.name }}
    runs-on: [self-hosted, linux, board]
    if: github.repository_owner == 'rcore-os'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Orange Pi 5 Plus UVC smoke
            command: cargo starry example board -t orangepi-5-plus-uvc
          - name: Orange Pi 5 Plus UVC RKNN smoke
            command: cargo starry example board -t orangepi-5-plus-uvc-rknn
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Show Rust version
        run: rustc --version

      - name: Run Starry board app smoke
        shell: bash
        run: |
          set -euxo pipefail
          ${{ matrix.command }}
