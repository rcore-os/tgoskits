name: Build & Test

on:
  push:
  pull_request:

permissions:
  contents: read
  packages: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - run: rustc --version
      - run: cargo fmt --all -- --check

  test_std:
    name: Test with std
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}-container:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-std
          save-if: ${{ github.event_name == 'push' }}

      - run: rustc --version
      - run: cargo xtask test

  test_os_target:
    name: Test ${{ matrix.os }} ${{ matrix.target }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}-container:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # axvisor
          - os: axvisor
            target: aarch64
          # starry
          - os: starry
            target: riscv64
          - os: starry
            target: aarch64
          - os: starry
            target: loongarch64
          - os: starry
            target: x86_64
          # arceos
          - os: arceos
            target: x86_64-unknown-none
          - os: arceos
            target: riscv64gc-unknown-none-elf
          - os: arceos
            target: aarch64-unknown-none-softfloat
          - os: arceos
            target: loongarch64-unknown-none-softfloat
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - run: rustc --version

      - name: Install FAT image tools
        run: |
          apt-get update
          apt-get install -y --no-install-recommends dosfstools

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-${{ matrix.os }}-${{ matrix.target }}
          save-if: ${{ github.event_name == 'push' }}

      - name: Run ${{ matrix.os }} tests
        run: cargo ${{ matrix.os }} test qemu --target ${{ matrix.target }}

  test_axvisor_x86_64:
    name: Test axvisor x86_64
    runs-on:
      - self-hosted
      - linux
      - intel
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - run: rustc --version

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-axvisor-x86_64
          cache-bin: false
          save-if: ${{ github.event_name == 'push' }}

      - name: Run axvisor x86_64 tests
        run: cargo axvisor test qemu --target x86_64

  test_axvisor_uboot_board:
    name: Test axvisor ${{ matrix.board }} ${{ matrix.guest }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # - board: phytiumpi
          - board: roc-rk3568-pc
            guest: linux
            uboot_config: .github/workflows/uboot.toml
          - board: rdk-s100
            guest: linux
            uboot_config: .github/workflows/uboot-rdk-s100.toml
          - board: rdk-s100
            guest: arceos
            uboot_config: .github/workflows/uboot-rdk-s100.toml
    runs-on:
      - self-hosted
      - linux
      - ${{ matrix.board }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - run: rustc --version

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-axvisor-uboot-${{ matrix.board }}
          cache-bin: false
          save-if: ${{ github.event_name == 'push' }}

      - name: Prepare board-specific test inputs
        run: |
          case "${{ matrix.board }}/${{ matrix.guest }}" in
            rdk-s100/linux)
              : "${BOARD_GUEST_LINUX_KERNEL_PATH:?BOARD_GUEST_LINUX_KERNEL_PATH must point to the S100 Linux guest kernel image on the runner}"
              sed -i "s|^kernel_path = .*|kernel_path = \"${BOARD_GUEST_LINUX_KERNEL_PATH}\"|g" \
                os/axvisor/configs/vms/linux-aarch64-s100-smp1.toml
              ;;
            rdk-s100/arceos)
              : "${BOARD_GUEST_ARCEOS_KERNEL_PATH:?BOARD_GUEST_ARCEOS_KERNEL_PATH must point to the S100 ArceOS guest kernel image on the runner}"
              sed -i "s|^kernel_path = .*|kernel_path = \"${BOARD_GUEST_ARCEOS_KERNEL_PATH}\"|g" \
                os/axvisor/configs/vms/arceos-aarch64-s100-smp1.toml
              ;;
          esac

      - name: Run axvisor board tests
        run: cargo axvisor test uboot --board ${{ matrix.board }} --guest ${{ matrix.guest }} --uboot-config ${{ matrix.uboot_config }}
