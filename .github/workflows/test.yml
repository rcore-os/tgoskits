name: Test

on:
  workflow_call:
  push:
    branches: [ no_std ]
  pull_request:
    branches: [ no_std ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Tests
        run: cargo test --all-features
