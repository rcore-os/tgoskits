name: Build & Test

on:
  push:
  pull_request:

permissions:
  contents: read
  packages: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test_std:
    name: Test with std
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}-container:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test
          cache-targets: false

      - run: rustc --version
      - run: cargo xtask test std

  test_os_target:
    name: Test ${{ matrix.os }} ${{ matrix.target }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}-container:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # axvisor
          - os: axvisor
            target: aarch64
          # starry
          - os: starry
            target: riscv64
          - os: starry
            target: aarch64
          - os: starry
            target: loongarch64
          - os: starry
            target: x86_64
          # arceos
          - os: arceos
            target: x86_64-unknown-none
          - os: arceos
            target: riscv64gc-unknown-none-elf
          - os: arceos
            target: aarch64-unknown-none-softfloat
          - os: arceos
            target: loongarch64-unknown-none-softfloat
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - run: rustc --version

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test
          cache-targets: false

      - name: Run ${{ matrix.os }} tests
        run: cargo xtask test qemu ${{ matrix.os }} --target ${{ matrix.target }}

  test_axvisor_x86_64:
    name: Test axvisor x86_64
    runs-on:
      - self-hosted
      - linux
      - intel
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - run: rustc --version

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-axvisor-x86_64
          cache-targets: false

      - name: Run axvisor x86_64 tests
        run: cargo xtask test qemu axvisor --target x86_64
