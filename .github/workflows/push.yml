name: Push to Subrepos

# ═══════════════════════════════════════════════════════════════════════════════
# 使用说明 / Usage Guide
# ═══════════════════════════════════════════════════════════════════════════════
#
# 此工作流使用 scripts/repo/repo.py 将主仓库中修改的组件推送到子仓库。
# 所有组件都推送到子仓库的 mirror 分支。
#
# 【触发方式】
# ─────────────────────────────────────────────────────────────────────────────
# - 自动触发：推送到 main/master/dev/next 分支时自动检测变更并推送
# - 手动触发：Actions → Push to Subrepos → Run workflow
#
# 【手动触发参数】
# ─────────────────────────────────────────────────────────────────────────────
# - components: 指定组件（逗号分隔，留空自动检测）
# - branch: 推送到子仓库的目标分支（默认：mirror）
# - push_all: 推送所有组件（忽略变更检测）
#
# ═══════════════════════════════════════════════════════════════════════════════

on:
  # push:
  #   branches:
  #     - main
  #     - master
  #     - dev
  #     - next
  workflow_dispatch:
    inputs:
      components:
        description: '指定要推送的组件（逗号分隔，留空表示自动检测）'
        required: false
        type: string
        default: ''
      branch:
        description: '推送到子仓库的目标分支'
        required: false
        type: string
        default: 'mirror'
      push_all:
        description: '推送所有组件（忽略变更检测）'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      components: ${{ steps.detect.outputs.components }}
      has-changes: ${{ steps.detect.outputs.has-changes }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed components
        id: detect
        run: |
          # 如果手动指定推送所有组件
          if [ "${{ inputs.push_all }}" = "true" ]; then
            echo "components=__all__" >> $GITHUB_OUTPUT
            echo "has-changes=true" >> $GITHUB_OUTPUT
            echo "Pushing all components"
            exit 0
          fi
          
          # 如果手动指定了组件列表
          if [ -n "${{ inputs.components }}" ]; then
            echo "components=${{ inputs.components }}" >> $GITHUB_OUTPUT
            echo "has-changes=true" >> $GITHUB_OUTPUT
            echo "Using manually specified components: ${{ inputs.components }}"
            exit 0
          fi
          
          # 自动检测修改的组件
          echo "Detecting changed components..."
          
          # 获取修改的文件列表
          if [ "${{ github.event_name }}" = "push" ]; then
            CHANGED_FILES=$(git diff --name-only HEAD^ HEAD)
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          fi
          
          if [ -z "$CHANGED_FILES" ]; then
            echo "No changes detected"
            echo "components=" >> $GITHUB_OUTPUT
            echo "has-changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # 从 repos.csv 获取组件目录列表
          COMPONENT_DIRS=$(python3 scripts/repo/repo.py list 2>/dev/null | \
                           tail -n +3 | \
                           awk '{print $3}' | \
                           grep -v '^$' | \
                           tr '\n' ' ')
          echo "Available components: ${COMPONENT_DIRS}"
          
          # 分析修改的文件，找出涉及的组件
          declare -A CHANGED_COMPONENTS
          
          while IFS= read -r file; do
            for component in ${COMPONENT_DIRS}; do
              if [[ "$file" == "$component"* ]]; then
                CHANGED_COMPONENTS["$component"]=1
                echo "  Found change in component: $component (file: $file)"
                break
              fi
            done
          done <<< "$CHANGED_FILES"
          
          # 生成组件列表（逗号分隔）
          if [ ${#CHANGED_COMPONENTS[@]} -eq 0 ]; then
            echo "No component changes detected"
            echo "components=" >> $GITHUB_OUTPUT
            echo "has-changes=false" >> $GITHUB_OUTPUT
          else
            COMPONENTS_LIST=$(IFS=','; echo "${!CHANGED_COMPONENTS[*]}")
            echo "components=${COMPONENTS_LIST}" >> $GITHUB_OUTPUT
            echo "has-changes=true" >> $GITHUB_OUTPUT
            echo "Detected changed components: ${COMPONENTS_LIST}"
          fi

  push-to-subrepos:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: ${{ needs.detect-changes.outputs.has-changes == 'true' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get target branch
        id: branch
        run: |
          # 使用输入的分支，如果没有输入则默认为 mirror
          TARGET_BRANCH="${{ inputs.branch || 'mirror' }}"
          echo "target_branch=${TARGET_BRANCH}" >> $GITHUB_OUTPUT
          echo "Target branch: ${TARGET_BRANCH}"

      - name: List components to push
        run: |
          echo "=========================================="
          echo "Components Configuration"
          echo "=========================================="
          python3 scripts/repo/repo.py list
          echo ""
          echo "Target branch for all components: ${{ steps.branch.outputs.target_branch }}"
          echo "=========================================="

      - name: Push all components to target branch
        if: ${{ needs.detect-changes.outputs.components == '__all__' }}
        run: |
          echo "Pushing ALL components to ${{ steps.branch.outputs.target_branch }} branch..."
          python3 scripts/repo/repo.py push --all -b ${{ steps.branch.outputs.target_branch }}

      - name: Push changed components to target branch
        if: ${{ needs.detect-changes.outputs.components != '__all__' }}
        run: |
          COMPONENTS="${{ needs.detect-changes.outputs.components }}"
          TARGET_BRANCH="${{ steps.branch.outputs.target_branch }}"
          
          if [ -z "$COMPONENTS" ]; then
            echo "No components to push"
            exit 0
          fi
          
          echo "Pushing changed components to ${TARGET_BRANCH} branch..."
          echo "Components: ${COMPONENTS}"
          
          # 将逗号分隔的组件列表转换为空格分隔
          IFS=',' read -ra COMP_ARRAY <<< "$COMPONENTS"
          
          SUCCESS=0
          FAIL=0
          
          for component in "${COMP_ARRAY[@]}"; do
            component=$(echo "$component" | xargs)
            # 提取组件名（从目录路径中获取最后一部分）
            repo_name=$(basename "${component}")
            
            echo ""
            echo "=========================================="
            echo "Pushing: ${repo_name}"
            echo "=========================================="
            
            if python3 scripts/repo/repo.py push "${repo_name}" -b ${TARGET_BRANCH}; then
              echo "✅ Successfully pushed ${repo_name}"
              ((SUCCESS++))
            else
              echo "❌ Failed to push ${repo_name}"
              ((FAIL++))
            fi
          done
          
          echo ""
          echo "=========================================="
          echo "Push Summary"
          echo "=========================================="
          echo "✅ Success: ${SUCCESS}"
          echo "❌ Failed: ${FAIL}"
          echo "=========================================="
          
          if [ $FAIL -gt 0 ]; then
            echo "::error::${FAIL} component(s) failed to push"
            exit 1
          fi

      - name: Create summary
        if: always()
        run: |
          COMPONENTS="${{ needs.detect-changes.outputs.components }}"
          TARGET_BRANCH="${{ steps.branch.outputs.target_branch }}"
          
          echo "## Push to Subrepos Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Components**: ${COMPONENTS}" >> $GITHUB_STEP_SUMMARY
          echo "- **Target Branch**: ${TARGET_BRANCH}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Source Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All components are pushed to the \`${TARGET_BRANCH}\` branch in their respective repositories." >> $GITHUB_STEP_SUMMARY
