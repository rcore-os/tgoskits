name: Reusable Host Command

on:
  workflow_call:
    inputs:
      runs_on:
        description: JSON-encoded runner labels for runs-on.
        required: false
        type: string
        default: '["ubuntu-latest"]'
      command:
        description: Shell command to execute.
        required: true
        type: string
      cache_key:
        description: Shared cache key for rust-cache. Leave empty to disable cache.
        required: false
        type: string
        default: ""
      apt_packages:
        description: Space-separated apt packages to install before running the command.
        required: false
        type: string
        default: ""

jobs:
  run:
    runs-on: ${{ fromJson(inputs.runs_on) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Restore Rust cache
        if: inputs.cache_key != ''
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ inputs.cache_key }}
          save-if: ${{ github.event_name == 'push' }}

      - name: Install apt packages
        if: inputs.apt_packages != ''
        run: |
          if ! command -v apt-get >/dev/null 2>&1; then
            echo "apt-get is required to install: ${{ inputs.apt_packages }}"
            exit 1
          fi

          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends ${{ inputs.apt_packages }}
          else
            apt-get update
            apt-get install -y --no-install-recommends ${{ inputs.apt_packages }}
          fi

      - name: Show Rust version
        run: rustc --version

      - name: Run command
        run: ${{ inputs.command }}
