# ═══════════════════════════════════════════════════════════════════════════════
# 主仓库 Subtree Pull 工作流
# ═══════════════════════════════════════════════════════════════════════════════
#
# 此工作流使用 scripts/repo/repo.py 从子仓库拉取更新到主仓库。
#
# 【触发方式】
# ─────────────────────────────────────────────────────────────────────────────
# - 自动触发：子仓库通过 repository_dispatch 发送 subtree-update 事件
# - 手动触发：Actions → Subtree Pull → Run workflow
#
# 【手动触发参数】
# ─────────────────────────────────────────────────────────────────────────────
# - repo_name: 组件名称（如 arm_vcpu, axvm）
# - branch: 组件分支（留空自动检测）
# - pull_all: 拉取所有组件更新
#
# ═══════════════════════════════════════════════════════════════════════════════

name: Pull from Subrepos

on:
  repository_dispatch:
    types: [subtree-update]
  workflow_dispatch:
    inputs:
      repo_name:
        description: '组件名称（如 arm_vcpu, axvm）'
        required: false
        type: string
        default: ''
      branch:
        description: '组件分支（留空自动检测）'
        required: false
        type: string
        default: ''
      pull_all:
        description: '拉取所有组件更新'
        required: false
        type: boolean
        default: false
      target_branch:
        description: '拉取结果写入的目标分支（默认：next）'
        required: false
        type: string
        default: 'next'

permissions: {}

jobs:
  subtree-pull:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.target_branch || github.event.client_payload.target_branch || 'next' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Get component info
        id: component
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          INPUT_REPO_NAME: ${{ inputs.repo_name }}
          INPUT_BRANCH: ${{ inputs.branch }}
          INPUT_PULL_ALL: ${{ inputs.pull_all }}
          INPUT_TARGET_BRANCH: ${{ inputs.target_branch }}
          PAYLOAD_COMPONENT: ${{ github.event.client_payload.component }}
          PAYLOAD_BRANCH: ${{ github.event.client_payload.branch }}
          PAYLOAD_TARGET_BRANCH: ${{ github.event.client_payload.target_branch }}
        run: |
          # 从 repository_dispatch 或 workflow_dispatch 获取参数
          if [ "$GH_EVENT_NAME" = "workflow_dispatch" ]; then
            REPO_NAME="$INPUT_REPO_NAME"
            BRANCH="$INPUT_BRANCH"
            PULL_ALL="$INPUT_PULL_ALL"
            TARGET_BRANCH="${INPUT_TARGET_BRANCH:-next}"
          else
            # 从 client_payload 获取（子仓库通知，内容不可信，后续进行白名单校验）
            REPO_NAME="$PAYLOAD_COMPONENT"
            BRANCH="$PAYLOAD_BRANCH"
            PULL_ALL="false"
            TARGET_BRANCH="${PAYLOAD_TARGET_BRANCH:-next}"
          fi
          
          # 校验 target_branch 格式
          if ! echo "$TARGET_BRANCH" | grep -qE '^[a-zA-Z0-9._/-]+$'; then
            echo "::error::Invalid target_branch name: '${TARGET_BRANCH}'"
            exit 1
          fi
          
          echo "repo_name=${REPO_NAME}" >> $GITHUB_OUTPUT
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "pull_all=${PULL_ALL}" >> $GITHUB_OUTPUT
          echo "target_branch=${TARGET_BRANCH}" >> $GITHUB_OUTPUT
          
          echo "=========================================="
          echo "Pull Configuration"
          echo "=========================================="
          echo "Component: ${REPO_NAME:-auto-detect}"
          echo "Branch: ${BRANCH:-auto-detect}"
          echo "Pull All: ${PULL_ALL}"
          echo "Target Branch: ${TARGET_BRANCH}"
          echo "=========================================="

      - name: List current components
        run: |
          echo "=========================================="
          echo "Current Components"
          echo "=========================================="
          python3 scripts/repo/repo.py list
          echo "=========================================="

      - name: Pull all components
        if: ${{ steps.component.outputs.pull_all == 'true' }}
        env:
          BRANCH: ${{ steps.component.outputs.branch }}
        run: |
          # 校验分支名格式（防止参数注入，只允许字母数字及 / . _ -）
          if [ -n "$BRANCH" ] && ! echo "$BRANCH" | grep -qE '^[a-zA-Z0-9._/-]+$'; then
            echo "::error::Invalid branch name: '${BRANCH}'"
            exit 1
          fi
          echo "Pulling ALL components..."
          if [ -n "$BRANCH" ]; then
            python3 scripts/repo/repo.py pull --all -b "$BRANCH"
          else
            python3 scripts/repo/repo.py pull --all
          fi

      - name: Pull specific component
        if: ${{ steps.component.outputs.pull_all != 'true' && steps.component.outputs.repo_name != '' }}
        env:
          REPO_NAME: ${{ steps.component.outputs.repo_name }}
          BRANCH: ${{ steps.component.outputs.branch }}
        run: |
          # 校验 repo_name 在已知组件白名单中（防止路径遍历等注入攻击）
          KNOWN=$(python3 scripts/repo/repo.py list 2>/dev/null | tail -n +3 | awk '{print $1}' | grep -v '^$')
          VALID=false
          while IFS= read -r comp; do
            if [ "$REPO_NAME" = "$comp" ]; then
              VALID=true
              break
            fi
          done <<< "$KNOWN"
          
          if [ "$VALID" != "true" ]; then
            echo "::error::Unknown component: '${REPO_NAME}'. Must be one of the registered components."
            exit 1
          fi
          
          echo "Pulling component: ${REPO_NAME}"
          # 校验分支名格式
          if [ -n "$BRANCH" ] && ! echo "$BRANCH" | grep -qE '^[a-zA-Z0-9._/-]+$'; then
            echo "::error::Invalid branch name: '${BRANCH}'"
            exit 1
          fi
          if [ -n "$BRANCH" ]; then
            python3 scripts/repo/repo.py pull "$REPO_NAME" -b "$BRANCH"
          else
            python3 scripts/repo/repo.py pull "$REPO_NAME"
          fi

      - name: Push changes to target branch
        env:
          TARGET_BRANCH: ${{ steps.component.outputs.target_branch }}
        run: |
          # 检查是否有新提交需要推送
          git fetch origin "$TARGET_BRANCH" --quiet
          AHEAD=$(git rev-list --count "origin/${TARGET_BRANCH}"..HEAD 2>/dev/null || echo "0")
          
          if [ "$AHEAD" -eq 0 ]; then
            echo "No new commits to push"
          else
            echo "Pushing ${AHEAD} commit(s) to ${TARGET_BRANCH} branch..."
            git push origin "HEAD:${TARGET_BRANCH}"
            echo "✅ Changes pushed to ${TARGET_BRANCH} branch successfully"
          fi

      - name: Create summary
        if: always()
        env:
          REPO_NAME: ${{ steps.component.outputs.repo_name }}
          BRANCH: ${{ steps.component.outputs.branch }}
          PULL_ALL: ${{ steps.component.outputs.pull_all }}
          TARGET_BRANCH: ${{ steps.component.outputs.target_branch }}
          GH_EVENT_NAME: ${{ github.event_name }}
        run: |
          echo "## Subtree Pull Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$PULL_ALL" = "true" ]; then
            echo "- **Mode**: Pull All Components" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Component**: ${REPO_NAME}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Source Branch**: ${BRANCH:-auto-detected}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${GH_EVENT_NAME}" >> $GITHUB_STEP_SUMMARY
          echo "- **Target Branch**: ${TARGET_BRANCH}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Updates are pulled into the \`${TARGET_BRANCH}\` branch for integration testing." >> $GITHUB_STEP_SUMMARY
