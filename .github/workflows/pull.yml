# ═══════════════════════════════════════════════════════════════════════════════
# 主仓库 Subtree Pull 工作流
# ═══════════════════════════════════════════════════════════════════════════════
#
# 此工作流使用 scripts/repo/repo.py 从子仓库拉取更新到主仓库。
#
# 【触发方式】
# ─────────────────────────────────────────────────────────────────────────────
# - 自动触发：子仓库通过 repository_dispatch 发送 subtree-update 事件
# - 手动触发：Actions → Subtree Pull → Run workflow
#
# 【手动触发参数】
# ─────────────────────────────────────────────────────────────────────────────
# - repo_name: 组件名称（如 arm_vcpu, axvm）
# - branch: 组件分支（留空自动检测）
# - pull_all: 拉取所有组件更新
#
# ═══════════════════════════════════════════════════════════════════════════════

name: Subtree Pull

on:
  repository_dispatch:
    types: [subtree-update]
  workflow_dispatch:
    inputs:
      repo_name:
        description: '组件名称（如 arm_vcpu, axvm）'
        required: false
        type: string
        default: ''
      branch:
        description: '组件分支（留空自动检测）'
        required: false
        type: string
        default: ''
      pull_all:
        description: '拉取所有组件更新'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  subtree-pull:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: next
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Get component info
        id: component
        run: |
          # 从 repository_dispatch 或 workflow_dispatch 获取参数
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REPO_NAME="${{ inputs.repo_name }}"
            BRANCH="${{ inputs.branch }}"
            PULL_ALL="${{ inputs.pull_all }}"
          else
            # 从 client_payload 获取（子仓库通知）
            REPO_NAME="${{ github.event.client_payload.component }}"
            BRANCH="${{ github.event.client_payload.branch }}"
            PULL_ALL="false"
          fi
          
          echo "repo_name=${REPO_NAME}" >> $GITHUB_OUTPUT
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "pull_all=${PULL_ALL}" >> $GITHUB_OUTPUT
          
          echo "=========================================="
          echo "Pull Configuration"
          echo "=========================================="
          echo "Component: ${REPO_NAME:-auto-detect}"
          echo "Branch: ${BRANCH:-auto-detect}"
          echo "Pull All: ${PULL_ALL}"
          echo "=========================================="

      - name: List current components
        run: |
          echo "=========================================="
          echo "Current Components"
          echo "=========================================="
          python3 scripts/repo/repo.py list
          echo "=========================================="

      - name: Pull all components
        if: ${{ steps.component.outputs.pull_all == 'true' }}
        run: |
          BRANCH="${{ steps.component.outputs.branch }}"
          
          echo "Pulling ALL components..."
          if [ -n "$BRANCH" ]; then
            python3 scripts/repo/repo.py pull --all -b "$BRANCH"
          else
            python3 scripts/repo/repo.py pull --all
          fi

      - name: Pull specific component
        if: ${{ steps.component.outputs.pull_all != 'true' && steps.component.outputs.repo_name != '' }}
        run: |
          REPO_NAME="${{ steps.component.outputs.repo_name }}"
          BRANCH="${{ steps.component.outputs.branch }}"
          
          echo "Pulling component: ${REPO_NAME}"
          if [ -n "$BRANCH" ]; then
            python3 scripts/repo/repo.py pull "$REPO_NAME" -b "$BRANCH"
          else
            python3 scripts/repo/repo.py pull "$REPO_NAME"
          fi

      - name: Push changes to next branch
        run: |
          # 检查是否有新提交需要推送
          git fetch origin next --quiet
          AHEAD=$(git rev-list --count origin/next..HEAD 2>/dev/null || echo "0")
          
          if [ "$AHEAD" -eq 0 ]; then
            echo "No new commits to push"
          else
            echo "Pushing ${AHEAD} commit(s) to next branch..."
            git push origin HEAD:next
            echo "✅ Changes pushed to next branch successfully"
          fi

      - name: Create summary
        if: always()
        run: |
          REPO_NAME="${{ steps.component.outputs.repo_name }}"
          BRANCH="${{ steps.component.outputs.branch }}"
          PULL_ALL="${{ steps.component.outputs.pull_all }}"
          
          echo "## Subtree Pull Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$PULL_ALL" = "true" ]; then
            echo "- **Mode**: Pull All Components" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Component**: ${REPO_NAME}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Branch**: ${BRANCH:-auto-detected}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Target**: next branch" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Updates are pulled into the \`next\` branch for integration testing." >> $GITHUB_STEP_SUMMARY
