name: CI

on:
  push:
    branches-ignore:
      - dev
    paths-ignore:
      - "**/*.md"
      - "**/*.rst"
      - "**/*.adoc"
      - "docs/**"
      - "**/docs/**"
      - "**/doc/**"
  pull_request:
    branches:
      - dev
    paths-ignore:
      - "**/*.md"
      - "**/*.rst"
      - "**/*.adoc"
      - "docs/**"
      - "**/docs/**"
      - "**/doc/**"
  workflow_dispatch:
    inputs:
      container_target:
        description: Container image(s) to publish manually.
        required: true
        default: both
        type: choice
        options:
          - base
          - axvisor-lvz
          - both

concurrency:
  group: >-
    ${{
      github.event_name == 'pull_request'
      && format('ci-pr-{0}', github.event.pull_request.number)
      || github.event_name == 'push'
      && format('ci-push-{0}', github.ref)
      || format('ci-manual-{0}', github.run_id)
    }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  ci:
    name: Run CI
    uses: ./.github/workflows/reusable-ci.yml
    with:
      container_target: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.container_target || 'both' }}
    permissions:
      contents: read
      packages: write
      pull-requests: read
    secrets:
      CLAW_API_KEY: ${{ secrets.CLAW_API_KEY }}
