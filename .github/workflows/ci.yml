name: CI

on:
  push:
    paths-ignore:
      - "**/*.md"
      - "**/*.rst"
      - "**/*.adoc"
      - "docs/**"
      - "**/docs/**"
      - "**/doc/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "**/*.rst"
      - "**/*.adoc"
      - "docs/**"
      - "**/docs/**"
      - "**/doc/**"
  workflow_dispatch:
    inputs:
      container_target:
        description: Container image(s) to publish manually.
        required: true
        default: both
        type: choice
        options:
          - base
          - axvisor-lvz
          - both

permissions:
  contents: read
  packages: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect_changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      ci_checks: ${{ steps.outputs.outputs.ci_checks }}
      base_container_publish: ${{ steps.outputs.outputs.base_container_publish }}
      axvisor_lvz_container_publish: ${{ steps.outputs.outputs.axvisor_lvz_container_publish }}
      base_container_image: ${{ steps.outputs.outputs.base_container_image }}
      axvisor_lvz_container_image: ${{ steps.outputs.outputs.axvisor_lvz_container_image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect CI-relevant changes
        id: filter
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@v4
        with:
          base: ${{ github.event_name == 'push' && github.ref || '' }}
          filters: |
            ci_checks:
              - ".cargo/**"
              - ".github/workflows/container-publish.yml"
              - ".github/workflows/ci.yml"
              - ".github/workflows/reusable-command.yml"
              - "Cargo.toml"
              - "Cargo.lock"
              - "rust-toolchain.toml"
              - "components/**"
              - "drivers/**"
              - "examples/**"
              - "os/**"
              - "platform/**"
              - "scripts/**"
              - "test-suit/**"
              - "xtask/**"
            base_container_publish:
              - "container/Dockerfile"
              - "rust-toolchain.toml"
            axvisor_lvz_container_publish:
              - "container/Dockerfile.axvisor-lvz"
              - "rust-toolchain.toml"

      - name: Resolve workflow outputs
        id: outputs
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          MANUAL_TARGET: ${{ github.event.inputs.container_target }}
          FILTER_CI_CHECKS: ${{ steps.filter.outputs.ci_checks }}
          FILTER_BASE_CONTAINER_PUBLISH: ${{ steps.filter.outputs.base_container_publish }}
          FILTER_AXVISOR_LVZ_CONTAINER_PUBLISH: ${{ steps.filter.outputs.axvisor_lvz_container_publish }}
        run: |
          repository="$(printf '%s' "$GITHUB_REPOSITORY" | LC_ALL=C tr '[:upper:]' '[:lower:]')"
          base_container_image="ghcr.io/${repository}-container"
          axvisor_lvz_container_image="ghcr.io/${repository}-container-axvisor-lvz"

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            ci_checks=false
            case "$MANUAL_TARGET" in
              base)
                base_container_publish=true
                axvisor_lvz_container_publish=false
                ;;
              axvisor-lvz)
                base_container_publish=false
                axvisor_lvz_container_publish=true
                ;;
              both)
                base_container_publish=true
                axvisor_lvz_container_publish=true
                ;;
              *)
                echo "Unexpected container_target: $MANUAL_TARGET" >&2
                exit 1
                ;;
            esac
          else
            if [ "$EVENT_NAME" = "push" ] && { [ "$REF_NAME" = "main" ] || [ "$REF_NAME" = "dev" ]; }; then
              ci_checks=true
            else
              ci_checks="${FILTER_CI_CHECKS}"
            fi
            base_container_publish="${FILTER_BASE_CONTAINER_PUBLISH}"
            axvisor_lvz_container_publish="${FILTER_AXVISOR_LVZ_CONTAINER_PUBLISH}"
          fi

          {
            echo "ci_checks=${ci_checks}"
            echo "base_container_publish=${base_container_publish}"
            echo "axvisor_lvz_container_publish=${axvisor_lvz_container_publish}"
            echo "base_container_image=${base_container_image}"
            echo "axvisor_lvz_container_image=${axvisor_lvz_container_image}"
          } >> "$GITHUB_OUTPUT"

  fmt:
    name: Check formatting
    needs: detect_changes
    if: needs.detect_changes.outputs.ci_checks == 'true'
    uses: ./.github/workflows/reusable-command.yml
    with:
      command: cargo fmt --all -- --check

  post_fmt_checks:
    name: ${{ matrix.name }}
    if: needs.detect_changes.outputs.ci_checks == 'true'
    needs:
      - detect_changes
      - fmt
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: Run clippy
            use_container: true
            runs_on: '["ubuntu-latest"]'
            command: |
              set -eux
              git_cmd() {
                git -c safe.directory="${GITHUB_WORKSPACE}" "$@"
              }
              ensure_since_ref() {
                ref="$1"
                git_cmd cat-file -e "${ref}^{commit}" 2>/dev/null && return 0
                git_cmd fetch --no-tags --depth=1 origin "${ref}" || true
                git_cmd cat-file -e "${ref}^{commit}" 2>/dev/null
              }

              if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
                cargo xtask clippy --since "${{ github.event.pull_request.base.sha }}"
              elif [ "${GITHUB_EVENT_NAME}" = "push" ]; then
                before="${{ github.event.before }}"
                if [ "${before}" = "0000000000000000000000000000000000000000" ]; then
                  cargo xtask clippy
                elif ensure_since_ref "${before}"; then
                  cargo xtask clippy --since "${before}"
                else
                  echo "::notice::before commit ${before} is unavailable; running full clippy"
                  cargo xtask clippy
                fi
              else
                cargo xtask clippy
              fi
            cache_key: clippy
            container_image: base
            fetch_depth: full
            required_repository_owner: ""
            main_pr_only: false
          - name: Run sync-lint
            use_container: true
            runs_on: '["ubuntu-latest"]'
            command: |
              set -eux
              git_cmd() {
                git -c safe.directory="${GITHUB_WORKSPACE}" "$@"
              }
              ensure_since_ref() {
                ref="$1"
                git_cmd cat-file -e "${ref}^{commit}" 2>/dev/null && return 0
                git_cmd fetch --no-tags --depth=1 origin "${ref}" || true
                git_cmd cat-file -e "${ref}^{commit}" 2>/dev/null
              }

              if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
                cargo xtask sync-lint --since "${{ github.event.pull_request.base.sha }}"
              elif [ "${GITHUB_EVENT_NAME}" = "push" ]; then
                before="${{ github.event.before }}"
                if [ "${before}" = "0000000000000000000000000000000000000000" ]; then
                  cargo xtask sync-lint
                elif ensure_since_ref "${before}"; then
                  cargo xtask sync-lint --since "${before}"
                else
                  echo "::notice::before commit ${before} is unavailable; running full sync-lint"
                  cargo xtask sync-lint
                fi
              else
                cargo xtask sync-lint
              fi
            cache_key: sync-lint
            container_image: base
            fetch_depth: full
            required_repository_owner: ""
            main_pr_only: false
          - name: Test with std
            use_container: true
            runs_on: '["ubuntu-latest"]'
            command: cargo xtask test
            cache_key: test-std
            container_image: base
            required_repository_owner: ""
            main_pr_only: false
          - name: Test axvisor aarch64 qemu
            use_container: true
            runs_on: '["ubuntu-latest"]'
            command: cargo xtask axvisor test qemu --arch aarch64
            cache_key: test-axvisor-aarch64
            container_image: base
            apk_region: us
            required_repository_owner: ""
            main_pr_only: false
          - name: Test axvisor riscv64 qemu
            use_container: true
            runs_on: '["ubuntu-latest"]'
            command: cargo xtask axvisor test qemu --arch riscv64
            cache_key: test-axvisor-riscv64
            container_image: base
            apk_region: us
            required_repository_owner: ""
            main_pr_only: false
          - name: Test axvisor loongarch64 qemu
            use_container: true
            runs_on: '["ubuntu-latest"]'
            command: cargo xtask axvisor test qemu --arch loongarch64
            cache_key: test-axvisor-loongarch64
            container_image: axvisor-lvz
            apk_region: us
            required_repository_owner: ""
            main_pr_only: false
          - name: Test starry riscv64 qemu
            use_container: true
            runs_on: '["ubuntu-latest"]'
            command: cargo xtask starry test qemu --arch riscv64
            cache_key: test-starry-riscv64
            container_image: base
            apk_region: us
            required_repository_owner: ""
            main_pr_only: false
          - name: Test starry aarch64 qemu
            use_container: true
            runs_on: '["ubuntu-latest"]'
            command: cargo xtask starry test qemu --arch aarch64
            cache_key: test-starry-aarch64
            container_image: base
            apk_region: us
            required_repository_owner: ""
            main_pr_only: false
          - name: Test starry loongarch64 qemu
            use_container: true
            runs_on: '["ubuntu-latest"]'
            command: cargo xtask starry test qemu --arch loongarch64
            cache_key: test-starry-loongarch64
            container_image: base
            apk_region: us
            required_repository_owner: ""
            main_pr_only: false
          - name: Test starry x86_64 qemu
            use_container: true
            runs_on: '["ubuntu-latest"]'
            command: cargo xtask starry test qemu --arch x86_64
            cache_key: test-starry-x86_64
            container_image: base
            apk_region: us
            required_repository_owner: ""
            main_pr_only: false
          - name: Test arceos x86_64 qemu
            use_container: true
            runs_on: '["ubuntu-latest"]'
            command: cargo xtask arceos test qemu --arch x86_64
            cache_key: test-arceos-x86_64
            container_image: base
            apk_region: us
            required_repository_owner: ""
            main_pr_only: false
          - name: Test arceos riscv64 qemu
            use_container: true
            runs_on: '["ubuntu-latest"]'
            command: cargo xtask arceos test qemu --arch riscv64
            cache_key: test-arceos-riscv64
            container_image: base
            apk_region: us
            required_repository_owner: ""
            main_pr_only: false
          - name: Test arceos aarch64 qemu
            use_container: true
            runs_on: '["ubuntu-latest"]'
            command: cargo xtask arceos test qemu --arch aarch64
            cache_key: test-arceos-aarch64
            container_image: base
            apk_region: us
            required_repository_owner: ""
            main_pr_only: false
          - name: Test arceos loongarch64 qemu
            use_container: true
            runs_on: '["ubuntu-latest"]'
            command: cargo xtask arceos test qemu --arch loongarch64
            cache_key: test-arceos-loongarch64
            container_image: base
            apk_region: us
            required_repository_owner: ""
            main_pr_only: false
          # Stress tests: uncomment to enable (runs only on PRs targeting main).
          # - name: Stress starry aarch64
          #   use_container: true
          #   runs_on: '["ubuntu-latest"]'
          #   command: cargo xtask starry test qemu --arch aarch64 --test-group stress
          #   cache_key: test-starry-stress-aarch64
          #   container_image: base
          #   apk_region: us
          #   required_repository_owner: ""
          #   main_pr_only: true
          # - name: Stress starry riscv64
          #   use_container: true
          #   runs_on: '["ubuntu-latest"]'
          #   command: cargo xtask starry test qemu --arch riscv64 --test-group stress
          #   cache_key: test-starry-stress-riscv64
          #   container_image: base
          #   apk_region: us
          #   required_repository_owner: ""
          #   main_pr_only: true
          # - name: Stress starry loongarch64
          #   use_container: true
          #   runs_on: '["ubuntu-latest"]'
          #   command: cargo xtask starry test qemu --arch loongarch64 --test-group stress
          #   cache_key: test-starry-stress-loongarch64
          #   container_image: base
          #   apk_region: us
          #   required_repository_owner: ""
          #   main_pr_only: true
          # - name: Stress starry x86_64
          #   use_container: true
          #   runs_on: '["ubuntu-latest"]'
          #   command: cargo xtask starry test qemu --arch x86_64 --test-group stress
          #   cache_key: test-starry-stress-x86_64
          #   container_image: base
          #   apk_region: us
          #   required_repository_owner: ""
          #   main_pr_only: true
          - name: Test axvisor self-hosted x86_64
            use_container: false
            runs_on: '["self-hosted","linux","intel"]'
            command: cargo xtask axvisor test qemu --arch x86_64
            cache_key: ""
            container_image: ""
            required_repository_owner: rcore-os
            main_pr_only: false
          - name: Test axvisor self-hosted board orangepi-5-plus-linux
            use_container: false
            runs_on: '["self-hosted","linux","board"]'
            command: cargo xtask axvisor test board --board orangepi-5-plus-linux
            cache_key: ""
            container_image: ""
            required_repository_owner: rcore-os
            main_pr_only: false
          - name: Test starry self-hosted board orangepi-5-plus
            use_container: false
            runs_on: '["self-hosted","linux","board"]'
            command: cargo xtask starry test board --board orangepi-5-plus
            cache_key: ""
            container_image: ""
            required_repository_owner: rcore-os
            main_pr_only: false
    uses: ./.github/workflows/reusable-command.yml
    with:
      runs_on: ${{ matrix.runs_on }}
      use_container: ${{ matrix.use_container }}
      command: ${{ matrix.command }}
      cache_key: ${{ matrix.cache_key }}
      container_image: >-
        ${{
          matrix.container_image == 'base'
          && format('{0}:latest', needs.detect_changes.outputs.base_container_image)
          || matrix.container_image == 'axvisor-lvz'
          && format('{0}:latest', needs.detect_changes.outputs.axvisor_lvz_container_image)
          || matrix.container_image
        }}
      apk_region: ${{ matrix.apk_region || 'china' }}
      required_repository_owner: ${{ matrix.required_repository_owner }}
      main_pr_only: ${{ matrix.main_pr_only }}
      fetch_depth: ${{ matrix.fetch_depth == 'full' && '0' || '1' }}

  skip_non_test_changes:
    name: Skip CI checks for non-test changes
    if: needs.detect_changes.outputs.ci_checks != 'true'
    needs: detect_changes
    runs-on: ubuntu-latest
    steps:
      - name: Summarize skip reason
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          echo "## CI checks skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "This manual run is scoped to container publishing, so fmt and follow-up CI checks were skipped." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Changed files do not match the test-relevant path set, so fmt and follow-up checks were skipped." >> "$GITHUB_STEP_SUMMARY"
          fi

  manual_container_branch_guard:
    name: Explain manual container branch restriction
    if: >-
      ${{
        github.event_name == 'workflow_dispatch'
        && github.ref_name != 'main'
        && github.ref_name != 'dev'
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Summarize branch restriction
        run: |
          echo "## Container publish skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Manual container publishing only runs from the \`main\` or \`dev\` branch. This run targeted \`${{ github.ref_name }}\`, so publish jobs were skipped." >> "$GITHUB_STEP_SUMMARY"

  publish_base_container:
    name: Publish base container image
    if: >-
      ${{
        (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        && (github.ref_name == 'main' || github.ref_name == 'dev')
        && needs.detect_changes.outputs.base_container_publish == 'true'
      }}
    needs:
      - detect_changes
    uses: ./.github/workflows/container-publish.yml
    with:
      image_name: ${{ needs.detect_changes.outputs.base_container_image }}
      dockerfile: container/Dockerfile
      cache_scope: container
    permissions:
      contents: read
      packages: write

  publish_axvisor_lvz_container:
    name: Publish axvisor-lvz container image
    if: >-
      ${{
        always()
        && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        && (github.ref_name == 'main' || github.ref_name == 'dev')
        && needs.detect_changes.outputs.axvisor_lvz_container_publish == 'true'
        && (
          needs.detect_changes.outputs.base_container_publish != 'true'
          || needs.publish_base_container.result == 'success'
        )
      }}
    needs:
      - detect_changes
      - publish_base_container
    uses: ./.github/workflows/container-publish.yml
    with:
      image_name: ${{ needs.detect_changes.outputs.axvisor_lvz_container_image }}
      dockerfile: container/Dockerfile.axvisor-lvz
      cache_scope: container-axvisor-lvz
      build_args: |
        BASE_IMAGE=${{ needs.detect_changes.outputs.base_container_image }}:latest
    permissions:
      contents: read
      packages: write
