name: Reusable Command

on:
  workflow_call:
    inputs:
      runs_on:
        description: JSON-encoded runner labels for runs-on.
        required: false
        type: string
        default: '["ubuntu-latest"]'
      use_container:
        description: Whether to execute the command inside the CI container.
        required: false
        type: boolean
        default: false
      command:
        description: Shell command to execute.
        required: true
        type: string
      cache_key:
        description: Shared cache key for rust-cache. Leave empty to disable cache.
        required: false
        type: string
        default: ""
      container_image:
        description: Container image used for the job when use_container is true.
        required: false
        type: string
        default: ""
      apk_region:
        description: APK mirror region passed through to Starry prebuild flows.
        required: false
        type: string
        default: china
      limit_to_owner:
        description: Only run for this repository owner. Leave empty to run everywhere.
        required: false
        type: string
        default: ""
      main_pr_only:
        description: Only run for pull requests targeting the main branch.
        required: false
        type: boolean
        default: false
      fetch_depth:
        description: Checkout fetch depth. Use 0 when the command needs full git history.
        required: false
        type: string
        default: "1"
      timeout_minutes:
        description: Maximum minutes to allow the command job to run.
        required: false
        type: number
        default: 360
      require_kvm:
        description: Require readable and writable /dev/kvm on self-hosted host jobs.
        required: false
        type: boolean
        default: false
      upload_xtask_bin_artifact:
        description: Upload the tg-xtask binary as a workflow artifact after the command succeeds.
        required: false
        type: boolean
        default: false
      download_xtask_bin_artifact:
        description: Download and restore the tg-xtask binary artifact before running the command.
        required: false
        type: boolean
        default: false
      xtask_bin_artifact_name:
        description: Artifact name used for the tarred tg-xtask binary.
        required: false
        type: string
        default: tg-xtask-bin
    secrets:
      CLAW_API_KEY:
        required: false
jobs:
  run_host:
    if: >-
      ${{
        !inputs.use_container
        && (inputs.limit_to_owner == '' || github.repository_owner == inputs.limit_to_owner)
        && (!inputs.main_pr_only || (github.event_name == 'pull_request' && github.base_ref == 'main'))
      }}
    runs-on: ${{ fromJson(inputs.runs_on) }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ inputs.fetch_depth }}

      - name: Preflight self-hosted host runner
        if: contains(inputs.runs_on, 'self-hosted')
        shell: bash
        env:
          REQUIRED_RUNNER_LABELS: ${{ inputs.runs_on }}
          REQUIRE_KVM: ${{ inputs.require_kvm }}
        run: |
          set -euo pipefail

          failures=0

          record_error() {
            echo "::error::$1"
            failures=1
          }

          require_command() {
            local name="$1"
            if command -v "${name}" >/dev/null 2>&1; then
              echo "${name}: $(command -v "${name}")"
            else
              record_error "required command '${name}' was not found in PATH"
            fi
          }

          {
            echo "## Self-hosted runner preflight"
            echo ""
            echo "- Runner: \`${RUNNER_NAME:-unknown}\`"
            echo "- OS/arch: \`${RUNNER_OS:-unknown}/${RUNNER_ARCH:-unknown}\`"
            echo "- Required labels: \`${REQUIRED_RUNNER_LABELS}\`"
            echo "- KVM required: \`${REQUIRE_KVM}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

          echo "Runner name: ${RUNNER_NAME:-unknown}"
          echo "Runner OS/arch: ${RUNNER_OS:-unknown}/${RUNNER_ARCH:-unknown}"
          echo "Required labels: ${REQUIRED_RUNNER_LABELS}"
          echo "PATH=${PATH}"
          echo "User: $(id -un 2>/dev/null || whoami 2>/dev/null || echo unknown)"
          echo "Groups: $(id -nG 2>/dev/null || groups 2>/dev/null || echo unknown)"

          require_command rustc
          require_command cargo

          if command -v rustc >/dev/null 2>&1; then
            rustc -vV
          fi
          if command -v cargo >/dev/null 2>&1; then
            cargo -V
          fi

          if [ "${REQUIRE_KVM}" = "true" ]; then
            if [ -e /dev/kvm ]; then
              ls -l /dev/kvm || true
              if [ ! -r /dev/kvm ] || [ ! -w /dev/kvm ]; then
                record_error "/dev/kvm exists but is not readable and writable by the runner user"
              fi
            else
              record_error "/dev/kvm does not exist on this runner"
            fi

            if command -v lsmod >/dev/null 2>&1; then
              lsmod | grep -E '^kvm' || echo "::warning::lsmod did not report loaded kvm modules"
            elif [ -r /proc/modules ]; then
              grep -E '^kvm' /proc/modules || echo "::warning::/proc/modules did not report loaded kvm modules"
            else
              echo "::warning::unable to inspect loaded kvm modules"
            fi

            if [ -r /proc/cpuinfo ]; then
              awk -F ': *' '/^(vendor_id|CPU implementer)/ { print "CPU vendor/implementer: " $2; exit }' /proc/cpuinfo || true
            fi
          fi

          if [ "${failures}" -ne 0 ]; then
            {
              echo ""
              echo "Preflight failed before the test command ran. Check the runner label assignment, PATH, Rust toolchain installation, and KVM device permissions."
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 1
          fi

      - name: Restore Rust cache
        if: inputs.cache_key != ''
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ inputs.cache_key }}
          save-if: ${{ github.event_name == 'push' }}

      - name: Download tg-xtask binary artifact
        if: inputs.download_xtask_bin_artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.xtask_bin_artifact_name }}
          path: ${{ runner.temp }}/xtask-bin

      - name: Restore tg-xtask binary artifact
        if: inputs.download_xtask_bin_artifact
        shell: bash
        run: |
          set -eux
          tar -xf "${RUNNER_TEMP}/xtask-bin/tg-xtask-bin.tar" -C "${GITHUB_WORKSPACE}"
          chmod +x "${GITHUB_WORKSPACE}/target/debug/tg-xtask"
          test -x "${GITHUB_WORKSPACE}/target/debug/tg-xtask"

      - name: Show Rust version
        run: rustc --version

      - name: Run command
        shell: bash
        env:
          STARRY_APK_REGION: ${{ inputs.apk_region }}
          CLAW_API_KEY: ${{ secrets.CLAW_API_KEY }}
          REUSABLE_COMMAND: ${{ inputs.command }}
          USE_XTASK_BIN: ${{ inputs.download_xtask_bin_artifact }}
        run: |
          set -eo pipefail

          command_text="${REUSABLE_COMMAND}"
          if [ "${USE_XTASK_BIN}" = "true" ] && [[ "${command_text}" != *$'\n'* ]]; then
            if [[ "${command_text}" == "cargo xtask" || "${command_text}" == cargo\ xtask\ * ]]; then
              command_text="target/debug/tg-xtask${command_text#cargo xtask}"
            fi
          fi

          command_file="${RUNNER_TEMP}/reusable-command.sh"
          printf '%s\n' "${command_text}" > "${command_file}"
          echo "Resolved command:"
          sed 's/^/+ /' "${command_file}"
          bash -e -o pipefail "${command_file}"

  run_container:
    if: >-
      ${{
        inputs.use_container
        && (inputs.limit_to_owner == '' || github.repository_owner == inputs.limit_to_owner)
        && (!inputs.main_pr_only || (github.event_name == 'pull_request' && github.base_ref == 'main'))
      }}
    runs-on: ${{ fromJson(inputs.runs_on) }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    container:
      image: ${{ inputs.container_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ inputs.fetch_depth }}

      - name: Show checkout state
        shell: bash
        run: |
          set -eux
          command -v git
          git -c safe.directory="${GITHUB_WORKSPACE}" rev-parse --show-toplevel
          git -c safe.directory="${GITHUB_WORKSPACE}" rev-parse --is-inside-work-tree

      - name: Ensure qemu user emulators
        shell: bash
        run: |
          set -eux
          for emulator in \
            qemu-aarch64-static \
            qemu-riscv64-static \
            qemu-loongarch64-static \
            qemu-x86_64-static
          do
            if ! command -v "${emulator}" >/dev/null 2>&1; then
              echo "::error::${emulator} not found; rebuild the CI container image to include qemu-user-static"
              exit 1
            fi
          done

      - name: Ensure musl cross toolchains
        shell: bash
        run: |
          set -eux
          for arch in aarch64 riscv64 x86_64 loongarch64; do
            compiler="${arch}-linux-musl-cc"
            if ! command -v "${compiler}" >/dev/null 2>&1; then
              echo "::error::${compiler} not found; rebuild the CI container image to include musl cross toolchains"
              exit 1
            fi
          done

      - name: Restore Rust cache
        if: inputs.cache_key != ''
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ inputs.cache_key }}
          save-if: ${{ github.event_name == 'push' }}

      - name: Download tg-xtask binary artifact
        if: inputs.download_xtask_bin_artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.xtask_bin_artifact_name }}
          path: ${{ runner.temp }}/xtask-bin

      - name: Restore tg-xtask binary artifact
        if: inputs.download_xtask_bin_artifact
        shell: bash
        run: |
          set -eux
          tar -xf "${RUNNER_TEMP}/xtask-bin/tg-xtask-bin.tar" -C "${GITHUB_WORKSPACE}"
          chmod +x "${GITHUB_WORKSPACE}/target/debug/tg-xtask"
          test -x "${GITHUB_WORKSPACE}/target/debug/tg-xtask"

      - name: Show Rust version
        run: rustc --version

      - name: Run command
        shell: bash
        env:
          STARRY_APK_REGION: ${{ inputs.apk_region }}
          CLAW_API_KEY: ${{ secrets.CLAW_API_KEY }}
          REUSABLE_COMMAND: ${{ inputs.command }}
          USE_XTASK_BIN: ${{ inputs.download_xtask_bin_artifact }}
        run: |
          set -eo pipefail

          command_text="${REUSABLE_COMMAND}"
          if [ "${USE_XTASK_BIN}" = "true" ] && [[ "${command_text}" != *$'\n'* ]]; then
            if [[ "${command_text}" == "cargo xtask" || "${command_text}" == cargo\ xtask\ * ]]; then
              command_text="target/debug/tg-xtask${command_text#cargo xtask}"
            fi
          fi

          command_file="${RUNNER_TEMP}/reusable-command.sh"
          printf '%s\n' "${command_text}" > "${command_file}"
          echo "Resolved command:"
          sed 's/^/+ /' "${command_file}"
          bash -e -o pipefail "${command_file}"

      - name: Package tg-xtask binary artifact
        if: success() && inputs.upload_xtask_bin_artifact
        shell: bash
        run: |
          set -eux
          test -x target/debug/tg-xtask
          tar -cf "${RUNNER_TEMP}/tg-xtask-bin.tar" target/debug/tg-xtask

      - name: Upload tg-xtask binary artifact
        if: success() && inputs.upload_xtask_bin_artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.xtask_bin_artifact_name }}
          path: ${{ runner.temp }}/tg-xtask-bin.tar
          if-no-files-found: error
          retention-days: 1
