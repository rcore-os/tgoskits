name: Reusable Container Command

on:
  workflow_call:
    inputs:
      command:
        description: Shell command to execute inside the CI container.
        required: true
        type: string
      cache_key:
        description: Shared cache key for rust-cache. Leave empty to disable cache.
        required: false
        type: string
        default: ""
      container_image:
        description: Container image used for the job.
        required: true
        type: string
      install_fat_tools:
        description: Whether to install dosfstools before running the command.
        required: false
        type: boolean
        default: false

jobs:
  run:
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.container_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install FAT image tools
        if: inputs.install_fat_tools
        run: |
          apt-get update
          apt-get install -y --no-install-recommends dosfstools

      - name: Restore Rust cache
        if: inputs.cache_key != ''
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ inputs.cache_key }}
          save-if: ${{ github.event_name == 'push' }}

      - name: Show Rust version
        run: rustc --version

      - name: Run command
        run: ${{ inputs.command }}
