[package]
name = "axvisor"
authors = ["Keyang Hu <keyang.hu@qq.com>", "周睿 <zrufo747@outlook.com>"]
edition.workspace = true
version = "0.5.8"
description = "A lightweight type-1 hypervisor based on ArceOS"
repository = "https://github.com/arceos-hypervisor/axvisor"
homepage = "https://github.com/arceos-hypervisor/axvisor"
documentation = "https://docs.rs/axvisor"
readme = "README.md"
keywords = ["hypervisor", "virtualization", "arceos", "type-1"]
categories = ["os", "no-std", "embedded"]
license = "Apache-2.0"
include = [
    ".cargo/config.toml",
    ".github/*/**",
    "doc/**",
    "src/**",
    "configs/**",
    "scripts/**",
    "xtask/src/**",
    "README.md",
    "LICENSE*",
]

[[bin]]
name = "axvisor"
path = "src/main.rs"

[[bin]]
name = "xtask"
path = "xtask/src/main.rs"

[features]
default = []
ept-level-4 = ["axvm/4-level-ept"]
fs = ["ax-std/fs", "axvm/host-fs"]
vmx = ["axvm/vmx"]
svm = ["axvm/svm"]
sstc = ["axvm/sstc"]
dyn-plat = ["axvm/plat-dyn", "ax-std/plat-dyn", "ax-driver/plat-dyn"]
x86-qemu-q35 = ["ax-std/x86-qemu-q35"]
aarch64-qemu-virt = ["ax-std/aarch64-qemu-virt"]
riscv64-qemu-virt = ["ax-std/riscv64-qemu-virt"]
loongarch64-qemu-virt = ["ax-std/loongarch64-qemu-virt"]
rockchip-soc = ["ax-driver/rockchip-soc"]
rockchip-sdhci = ["ax-driver/rockchip-sdhci", "ax-driver/rockchip-soc"]
rockchip-dwmmc = ["ax-driver/rockchip-dwmmc", "ax-driver/rockchip-soc"]
phytium-mci = ["ax-driver/phytium-mci"]
sdmmc = [
    "ax-driver/rockchip-sdhci",
    "ax-driver/rockchip-soc",
    "ax-driver/phytium-mci",
]
rockchip-pm = ["ax-driver/rockchip-pm"]
serial = []

[dependencies]
spin = { workspace = true }

[target.'cfg(not(any(windows, unix)))'.dependencies]
ax-kspin = { workspace = true }
ax-lazyinit = { workspace = true }
log = "0.4"
byte-unit = { version = "5", default-features = false, features = ["byte"] }
fdt-parser = "0.4"
hashbrown = "0.14"

# System dependent modules provided by ArceOS.
ax-std = { workspace = true, features = ["paging", "irq", "multitask", "task-ext", "smp", "hv"] }
# System dependent modules provided by ArceOS-Hypervisor (bare-metal only)
# ax-runtime = { version = "=0.3.0-preview.1", features = ["alloc", "irq", "paging", "smp", "multitask"] }
axvm = { workspace = true, default-features = false }
axvm-types = { workspace = true }
axvmconfig = { workspace = true, default-features = false }
# System independent crates provided by ArceOS
ax-errno = { workspace = true }
ax-memory-addr = { workspace = true }
ax-driver.workspace = true

# xtask dependencies (only used on host platforms)
[target.'cfg(any(windows, unix))'.dependencies]
anyhow.workspace = true
axbuild = { workspace = true }
clap = { version = "4.6", features = ["derive"] }
tokio = { version = "1", features = ["full"] }

[build-dependencies]
anyhow = "1.0"
prettyplease = "0.2"
proc-macro2 = "1.0"
quote = "1.0"
syn = "2.0"
toml = "0.9"
