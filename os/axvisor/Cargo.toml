[package]
name = "axvisor"
authors = ["Keyang Hu <keyang.hu@qq.com>", "周睿 <zrufo747@outlook.com>"]
edition.workspace = true
version = "0.5.8"
description = "A lightweight type-1 hypervisor based on ArceOS"
repository = "https://github.com/arceos-hypervisor/axvisor"
homepage = "https://github.com/arceos-hypervisor/axvisor"
documentation = "https://docs.rs/axvisor"
readme = "README.md"
keywords = ["hypervisor", "virtualization", "arceos", "type-1"]
categories = ["os", "no-std", "embedded"]
license = "Apache-2.0"
include = [
    ".cargo/config.toml",
    ".github/*/**",
    "doc/**",
    "src/**",
    "build.rs",
    "configs/**",
    "scripts/**",
    "xtask/src/**",
    "README.md",
    "LICENSE*",
]

[[bin]]
name = "axvisor"
path = "src/main.rs"

[[bin]]
name = "xtask"
path = "xtask/src/main.rs"

[features]
default = ["shell"]
ept-level-4 = ["axvisor_core/ept-level-4"]
fs = ["ax-std/fs", "axvisor_core/fs"]
shell = ["axvisor_api/shell", "axvisor_core/shell"]
vmx = ["axvisor_core/vmx"]
svm = ["axvisor_core/svm"]
sstc = ["axvisor_core/sstc"]
dyn-plat = ["ax-std/plat-dyn", "dep:axplat-dyn"]
rockchip-soc = ["ax-driver/rockchip-soc"]
rockchip-sdhci = ["ax-driver/rockchip-sdhci", "ax-driver/rockchip-soc"]
rockchip-dwmmc = ["ax-driver/rockchip-dwmmc", "ax-driver/rockchip-soc"]
phytium-mci = ["ax-driver/phytium-mci"]
sdmmc = [
    "ax-driver/rockchip-sdhci",
    "ax-driver/rockchip-soc",
    "ax-driver/phytium-mci",
]
rockchip-pm = ["ax-driver/rockchip-pm"]
serial = []

[dependencies]
[target.'cfg(not(any(windows, unix)))'.dependencies]
ax-kspin = { workspace = true }
log = "0.4"

# System dependent modules provided by ArceOS.
ax-std = { workspace = true, features = ["ext-ld", "paging", "irq", "multitask", "task-ext", "smp", "hv"] }
ax-hal = { workspace = true, features = ["paging", "irq", "smp", "hv", "axvisor-linker"] }
# System dependent modules provided by ArceOS-Hypervisor (bare-metal only)
axaddrspace = { workspace = true }
axvisor_api = { workspace = true }
axvisor_core = { workspace = true }
# System independent crates provided by ArceOS
ax-errno = { workspace = true }
extern-trait = "0.4"
ax-memory-addr = { workspace = true }
ax-page-table-multiarch = { workspace = true }
rdif-intc.workspace = true
rdrive.workspace = true
ax-driver.workspace = true
axplat-dyn = { workspace = true, optional = true, default-features = false }

[target.'cfg(target_arch = "x86_64")'.dependencies]
ax-config = { workspace = true, features = ["plat-dyn"] }
[target.'cfg(target_arch = "aarch64")'.dependencies]
aarch64-cpu-ext = "0.1"
arm-gic-driver = { workspace = true, features = ["rdif"] }

# xtask dependencies (only used on host platforms)
[target.'cfg(any(windows, unix))'.dependencies]
anyhow.workspace = true
axbuild = { workspace = true }
clap = { version = "4.6", features = ["derive"] }
tokio = { version = "1", features = ["full"] }

[build-dependencies]
ax-config = { workspace = true, features = ["plat-dyn"] }
prettyplease = "0.2"
quote = "1.0"
syn = "2.0"
proc-macro2 = "1.0"
toml = "0.9"
anyhow = "1.0"
