# AxVM machine policy.
[machine]
mode = "passthrough"
firmware = "auto"
interrupts_passthrough = true

[base]
id = 1
name = "nimbos"
cpu_num = 1
phys_cpu_ids = [0x0]

[kernel]
entry_point = 0x40080000
image_location = "fs"
kernel_path = "nimbos-aarch64.bin"
kernel_load_addr = 0x40080000

[[memory.regions]]
guest_base = 0x40000000
size = 0x1000000
permissions = "rwx"
backing = { kind = "allocate" }

[devices]
disable_defaults = []
deny = [
  { kind = "fdt-path", value = "/pcie@10000000" },
]
