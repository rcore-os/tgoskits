# AxVM machine policy.
[machine]
mode = "passthrough"
firmware = "auto"
interrupts_passthrough = true

[base]
id = 1
name = "linux-loongarch64-qemu-rootfs"
cpu_num = 1
phys_cpu_ids = [0x0]

[kernel]
entry_point = 0x1c000000
image_location = "fs"
kernel_path = "/guest/linux/linux-qemu"
kernel_load_addr = 0x200000
enable_bios = true
boot_protocol = "uefi"
# The firmware path is part of this VM contract; axbuild must not rewrite it at runtime.
uefi_firmware_path = "/tmp/ostool/ovmf/loongarch64/code.fd"
bios_load_addr = 0x1c000000
cmdline = "root=/dev/vda rootfstype=ext4 rootwait rw console=ttyS0,115200 earlycon=uart8250,mmio,0x1fe001e0,115200 nokaslr loglevel=8 ignore_loglevel swiotlb=1024 pci=nomsi initcall_blacklist=raid6_select_algo,ixgbe_init_module,i8042_init,inet6_init"

[[memory.regions]]
guest_base = 0x0
size = 0x10000000
permissions = "rwx"
backing = { kind = "reserved" }

[[memory.regions]]
guest_base = 0x80000000
size = 0x24000000
permissions = "rwx"
backing = { kind = "host", host_base = 0x80000000 }

[[memory.regions]]
guest_base = 0x1c000000
size = 0x1000000
permissions = "rwx"
backing = { kind = "allocate" }

[devices]
disable_defaults = []
deny = []
