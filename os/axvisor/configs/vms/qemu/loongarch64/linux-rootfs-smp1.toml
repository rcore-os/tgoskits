# Vm base info configs
#
[base]
# Guest vm id.
id = 1
# Guest vm name.
name = "linux-loongarch64-qemu-rootfs"
# Virtualization type.
vm_type = 1
# The number of virtual CPUs.
cpu_num = 1
# Guest vm physical cpu ids.
phys_cpu_ids = [0]

#
# Vm kernel configs
#
[kernel]
# The entry point is replaced by the LoongArch ELF loader when vmlinux.elf is used.
entry_point = 0x0020_0000
# The location of image: "memory" | "fs".
image_location = "fs"
# The file path of the kernel image.
kernel_path = "/guest/linux/qemu-loongarch64"
# The ELF LOAD paddr is used by the LoongArch loader; this is a fallback for flat images.
kernel_load_addr = 0x0020_0000
# The file path of the device tree blob (DTB).
dtb_path = "/guest/linux/linux-rootfs-smp1.dtb"
# The load address of the device tree blob (DTB).
dtb_load_addr = 0x0010_0000
# Kernel command line. Rootfs mode intentionally uses virtio-blk /dev/vda.
cmdline = "root=/dev/vda rootfstype=ext4 rootwait rw init=/init console=ttyS0 earlycon=uart,mmio,0x1fe001e0 keep_bootcon nokaslr loglevel=8 ignore_loglevel pci=nomsi swiotlb=1024 initcall_blacklist=raid6_select_algo,ixgbe_init_module,i8042_init,inet6_init"

# Memory regions with format (`base_paddr`, `size`, `flags`, `map_type`).
# For `map_type`, 0 means `MAP_ALLOC`, 1 means `MAP_IDENTICAL`, 2 means `MAP_RESERVED`.
memory_regions = [
  [0x0008_0000, 0x0018_0000, 0x7, 2], # Low bootinfo/DTB RAM 512K-2M MAP_RESERVED
  [0x0020_0000, 0x03e0_0000, 0x7, 2], # System RAM 2-64M MAP_RESERVED
  [0x0400_0000, 0x0200_0000, 0x7, 2], # System RAM 64-96M MAP_RESERVED
  [0x0600_0000, 0x0200_0000, 0x7, 2], # System RAM 96-128M MAP_RESERVED
  [0x0800_0000, 0x0200_0000, 0x7, 2], # System RAM 128-160M MAP_RESERVED
]

#
# Device specifications
#
[devices]
# The interrupt mode.
interrupt_mode = "passthrough"

# Pass-through devices.
passthrough_devices = [
  ["/"],
]

# Passthrough addresses.
# Base-GPA  Length.
passthrough_addresses = [
]

# Devices that are not desired to be passed through to the guest
excluded_devices = [
]

# Emu_devices.
emu_devices = [
]
