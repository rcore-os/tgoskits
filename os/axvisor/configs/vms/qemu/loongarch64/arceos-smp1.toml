# Vm base info configs
#
[base]
# Guest vm id.
id = 1
# Guest vm name.
name = "arceos-qemu"
# Virtualization type.
vm_type = 1
# The number of virtual CPUs.
cpu_num = 1
# Guest vm physical cpu ids.
phys_cpu_ids = [0]

#
# Vm kernel configs
#
[kernel]
# The entry point of the kernel image.
entry_point = 0x0020_0040
# The location of image: "memory" | "fs".
# load from memory.
image_location = "memory"
# The file path of the kernel image.
kernel_path = "/path/to/arceos-helloworld.bin"
# The load address of the kernel image.
kernel_load_addr = 0x0020_0000
# The load address of the device tree blob (DTB).
# dtb_load_addr = 0x8220_0000

## The file path of the ramdisk image.
# ramdisk_path = ""
## The load address of the ramdisk image.
# ramdisk_load_addr = 0
## The path of the disk image.
# disk_path = "disk.img"

# Memory regions with format (`base_paddr`, `size`, `flags`, `map_type`).
# For `map_type`, 0 means `MAP_ALLOC`, 1 means `MAP_IDENTICAL`, 2 means `MAP_RESERVED`.
memory_regions = [
  [0x0, 0x200_0000, 0x7, 0], # System RAM 32M MAP_ALLOC
]

#
# Device specifications
#
[devices]
# The interrupt mode.
interrupt_mode = "passthrough"

# Pass-through devices.
passthrough_devices = [
]

# Passthrough addresses.
# Base-GPA  Length.
passthrough_addresses = [
  [0x1000_0000, 0x0000_0400], # PIC
  [0x100D_0000, 0x0000_1000], # RTC
  [0x100E_0000, 0x0000_1000], # GED
  [0x1FE0_0000, 0x0000_1000], # UART
  [0x2000_0000, 0x1000_0000], # PCI ECAM
  [0x4000_0000, 0x0002_0000], # PCI ranges
]

# Devices that are not desired to be passed through to the guest
excluded_devices = [
]

# Emu_devices.
# Name Base-Ipa Ipa_len Alloc-Irq Emu-Type EmuConfig.
emu_devices = [
]
