# AxVM machine policy.
[machine]
mode = "passthrough"
firmware = "auto"
interrupts_passthrough = false

[base]
id = 1
name = "linux-qemu-uefi"
cpu_num = 1
phys_cpu_sets = [0x1]

[kernel]
entry_point = 0xfffffff0
image_location = "fs"
kernel_path = "/guest/linux/qemu-x86_64"
kernel_load_addr = 0x200000
enable_bios = true
boot_protocol = "uefi"
uefi_firmware_path = "/guest/linux/OVMF_CODE.fd"
bios_load_addr = 0xffc00000
ramdisk_path = "/guest/linux/initramfs.cpio.gz"
ramdisk_load_addr = 0x400000

[[memory.regions]]
guest_base = 0x0
size = 0x2000000
permissions = "rwx"
backing = { kind = "allocate" }

[[memory.regions]]
guest_base = 0xffc00000
size = 0x400000
permissions = "rwx"
backing = { kind = "allocate" }

[devices]
disable_defaults = []
deny = []
