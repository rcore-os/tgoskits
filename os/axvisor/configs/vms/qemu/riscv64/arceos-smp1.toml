# AxVM machine policy.
[machine]
mode = "passthrough"
firmware = "auto"
interrupts_passthrough = true

[base]
id = 1
name = "arceos-qemu"
cpu_num = 1
phys_cpu_ids = [0x0]

[kernel]
entry_point = 0x80200000
image_location = "memory"
kernel_path = "/path/tmp/images/qemu-riscv64"
kernel_load_addr = 0x80200000
dtb_load_addr = 0x82200000

[[memory.regions]]
guest_base = 0x80000000
size = 0x4000000
permissions = "rwx"
backing = { kind = "allocate" }

[devices]
disable_defaults = []
deny = []
