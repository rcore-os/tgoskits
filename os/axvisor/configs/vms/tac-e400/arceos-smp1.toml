# AxVM machine policy.
[machine]
mode = "passthrough"
firmware = "auto"
interrupts_passthrough = true

[base]
id = 2
name = "arceos"
cpu_num = 1
phys_cpu_ids = [0x200]

[kernel]
entry_point = 0x2020080000
image_location = "memory"
kernel_load_addr = 0x2020080000
kernel_path = "/path/to/arceos_aarch64-dyn_smp1.bin"
dtb_load_addr = 0x2020000000

[[memory.regions]]
guest_base = 0x2020000000
size = 0x20000000
permissions = "rwx"
backing = { kind = "host", host_base = 0x2020000000 }

[devices]
disable_defaults = []
deny = []
