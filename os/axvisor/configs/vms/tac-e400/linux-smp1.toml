# AxVM machine policy.
[machine]
mode = "passthrough"
firmware = "auto"
interrupts_passthrough = true

[base]
id = 1
name = "linux"
cpu_num = 1
phys_cpu_ids = [0x100]

[kernel]
entry_point = 0x2040080000
image_location = "memory"
kernel_load_addr = 0x2040080000
kernel_path = "/path/to/Image"
dtb_load_addr = 0x2040000000

[[memory.regions]]
guest_base = 0x2040000000
size = 0x40000000
permissions = "rwx"
backing = { kind = "host", host_base = 0x2040000000 }

[devices]
disable_defaults = []
deny = []
