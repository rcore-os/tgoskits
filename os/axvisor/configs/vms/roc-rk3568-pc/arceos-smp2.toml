# AxVM machine policy.
[machine]
mode = "passthrough"
firmware = "auto"
interrupts_passthrough = true

[base]
id = 2
name = "arceos"
cpu_num = 2
phys_cpu_ids = [0x0, 0x100]

[kernel]
entry_point = 0x70080000
image_location = "fs"
kernel_load_addr = 0x70080000
kernel_path = "/userdata/rootfs_overlay/guest/arceos/roc-rk3568-pc"
dtb_load_addr = 0x70000000

[[memory.regions]]
guest_base = 0x70000000
size = 0x10000000
permissions = "rwx"
backing = { kind = "host", host_base = 0x70000000 }

[devices]
disable_defaults = []
deny = []
