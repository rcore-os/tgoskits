# Vm base info configs
#
[base]
# Guest vm id.
id = 1
# Guest vm name.
name = "linux-x86_64-qemu"
# Virtualization type.
vm_type = 1
# The number of virtual CPUs.
cpu_num = 1
# Guest vm physical cpu sets.
phys_cpu_sets = [1]

#
# Vm kernel configs
#
[kernel]
# The entry point of the kernel image.
# Linux direct boot uses the Linux-specific boot stub at this GPA.
entry_point = 0x8000
# The location of image: "memory" | "fs".
# Embed the Linux images from the host-side paths below.
image_location = "memory"
# The file path of the kernel image.
kernel_path = "/code/tgoskits/tmp/qemu_x86_64_linux/linux/bzImage"
# The load address of the kernel image.
kernel_load_addr = 0x20_0000
# Whether to enable BIOS boot flow.
enable_bios = false
# Linux command line written into boot_params.
cmdline = "console=ttyS0,115200n8 earlycon=uart8250,io,0x3f8,115200 rdinit=/init acpi=off pci=conf1 pci=nomsi nox2apic no_timer_check pmtmr=0x608 initcall_blacklist=i8042_init i8042.nokbd i8042.noaux i8042.nomux"

## The file path of the ramdisk image.
ramdisk_path = "/code/tgoskits/tmp/qemu_x86_64_linux/linux/initramfs.cpio"
## The load address of the ramdisk image.
ramdisk_load_addr = 0x60_00000
## The path of the disk image.
# disk_path = ""

# Memory regions with format (`base_paddr`, `size`, `flags`, `map_type`).
# For `map_type`, 0 means `MAP_ALLOC`, 1 means `MAP_IDENTICAL`, 2 means `MAP_RESERVED`.
memory_regions = [
  [0x0000_0000, 0x0800_0000, 0x7, 1], # System RAM 128M MAP_IDENTICAL for DMA-capable passthrough
  [0x0000_0000, 0x0010_0000, 0x7, 0], # Low boot scratch for real-mode stub and boot_params
]

#
# Device specifications
#
[devices]
# The interrupt mode.
interrupt_mode = "passthrough"

# Emu_devices.
# Name Base-Ipa Ipa_len Alloc-Irq Emu-Type EmuConfig.
emu_devices = []

# Pass-through devices.
# Name Base-Ipa Base-Pa Length Alloc-Irq.
passthrough_devices = [
  [
    "HPET",
    0xfed0_0000,
    0xfed0_0000,
    0x1000,
    0x1,
  ],
]

# Passthrough addresses.
# Base-GPA  Length.
passthrough_addresses = [
  # QEMU q35 low MMIO window needed by PCI/virtio-blk probing.
  [0xfe00_0000, 0x00c0_0000],
]

# Devices that are not desired to be passed through to the guest
excluded_devices = []
