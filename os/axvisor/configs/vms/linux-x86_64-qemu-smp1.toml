# Vm base info configs
#
[base]
# Guest vm id.
id = 1
# Guest vm name.
name = "linux-x86_64-qemu"
# Virtualization type.
vm_type = 2
# The number of virtual CPUs.
cpu_num = 1
# Guest vm physical cpu sets.
phys_cpu_sets = [1]

#
# Vm kernel configs
#
[kernel]
# The entry point of the kernel image.
# Phase 4 will switch Linux direct boot to a Linux-specific boot stub.
entry_point = 0x8000
# The location of image: "memory" | "fs".
# Load from file system.
image_location = "fs"
# The file path of the kernel image.
kernel_path = "/guest/linux/x86_64/bzImage"
# The load address of the kernel image.
kernel_load_addr = 0x20_0000
# Whether to enable BIOS boot flow.
# Linux direct boot will use a Linux-specific boot stub in later phases.
enable_bios = false

## The file path of the ramdisk image.
ramdisk_path = "/guest/linux/x86_64/initramfs.cpio"
## The load address of the ramdisk image.
ramdisk_load_addr = 0x40_0000
## The path of the disk image.
# disk_path = ""

# Memory regions with format (`base_paddr`, `size`, `flags`, `map_type`).
# For `map_type`, 0 means `MAP_ALLOC`, 1 means `MAP_IDENTICAL`, 2 means `MAP_RESERVED`.
memory_regions = [
  [0x0000_0000, 0x0800_0000, 0x7, 0], # Low RAM 128M 0b111 R|W|EXECUTE
]

#
# Device specifications
#
[devices]
# The interrupt mode.
interrupt_mode = "passthrough"

# Emu_devices.
# Name Base-Ipa Ipa_len Alloc-Irq Emu-Type EmuConfig.
emu_devices = []

# Pass-through devices.
# Name Base-Ipa Base-Pa Length Alloc-Irq.
passthrough_devices = [
  [
    "IO APIC",
    0xfec0_0000,
    0xfec0_0000,
    0x1000,
    0x1,
  ],
  [
    "Local APIC",
    0xfee0_0000,
    0xfee0_0000,
    0x1000,
    0x1,
  ],
  [
    "HPET",
    0xfed0_0000,
    0xfed0_0000,
    0x1000,
    0x1,
  ],
]
