# AxVM machine policy.
[machine]
mode = "passthrough"
firmware = "auto"
interrupts_passthrough = true

[base]
id = 1
name = "linux"
cpu_num = 1
phys_cpu_ids = [0x0]

[kernel]
entry_point = 0x240080000
image_location = "fs"
kernel_load_addr = 0x240080000
kernel_path = "/guest/linux/orangepi-5-plus"
dtb_load_addr = 0x240000000
ramdisk_path = "/guest/linux/initramfs.cpio"
ramdisk_load_addr = 0xc0000000
# The hypervisor retains the active FIQ UART. Keep its early console for bring-up,
# then make tty1 the guest's preferred normal console.
cmdline = "root=/dev/mmcblk0p2 rw console=ttyS2,1500000 console=tty1 earlycon=uart8250,mmio32,0xfeb50000 cpuidle.off=1 rodata=off rootwait rootfstype=ext4 ignore_loglevel loglevel=8 cma=128M"

[[memory.regions]]
guest_base = 0xb0000000
size = 0x10000000
permissions = "rwx"
backing = { kind = "reserved" }

[[memory.regions]]
guest_base = 0xc0000000
size = 0x30000000
permissions = "rwx"
backing = { kind = "reserved" }

[[memory.regions]]
guest_base = 0x240000000
size = 0x80000000
permissions = "rwx"
backing = { kind = "host", host_base = 0x240000000 }

[devices]
disable_defaults = []
deny = []
