# AxVM machine policy.
[machine]
mode = "passthrough"
firmware = "auto"
interrupts_passthrough = true

[base]
id = 1
name = "zephyr"
cpu_num = 4
phys_cpu_ids = [0x0, 0x100, 0x200, 0x300]

[kernel]
entry_point = 0x40001084
image_location = "memory"
kernel_load_addr = 0x40000000
kernel_path = "/path/to/zephyr.bin"
dtb_load_addr = 0x60000000

[[memory.regions]]
guest_base = 0x40000000
size = 0x30000000
permissions = "rwx"
backing = { kind = "reserved" }

[devices]
disable_defaults = []
deny = []
