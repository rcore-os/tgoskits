# AxVM machine policy.
[machine]
mode = "passthrough"
firmware = "auto"
interrupts_passthrough = true

[base]
id = 1
name = "freertos"
cpu_num = 1
phys_cpu_ids = [0x100]

[kernel]
entry_point = 0x40000800
image_location = "memory"
kernel_load_addr = 0x40000000
kernel_path = "/path/to/freertos_aarch64_orangepi.bin"

[[memory.regions]]
guest_base = 0x40000000
size = 0x30000000
permissions = "rwx"
backing = { kind = "reserved" }

[devices]
disable_defaults = []
deny = []
