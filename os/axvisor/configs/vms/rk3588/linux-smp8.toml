# AxVM machine policy.
[machine]
mode = "passthrough"
firmware = "auto"
interrupts_passthrough = true

[base]
id = 1
name = "linux"
cpu_num = 8
phys_cpu_sets = [0x1, 0x2, 0x4, 0x8, 0x10, 0x20, 0x40, 0x80]
phys_cpu_ids = [0x0, 0x100, 0x200, 0x300, 0x400, 0x500, 0x600, 0x700]

[kernel]
entry_point = 0x10080000
kernel_load_addr = 0x10080000
dtb_load_addr = 0x10000000
image_location = "memory"
kernel_path = "/path/to/kernel"
dtb_path = "/path/to/dtb"

[[memory.regions]]
guest_base = 0x9400000
size = 0xd5500000
permissions = "rwx"
backing = { kind = "host", host_base = 0x9400000 }

[[memory.regions]]
guest_base = 0x9200000
size = 0x2000
permissions = "rwx"
backing = { kind = "reserved" }

[devices]
disable_defaults = []
deny = []
