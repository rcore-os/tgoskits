# Build-time config template for StarryOS on Orange Pi 5 Plus.
# Runtime U-Boot settings live in `orangepi-5-plus-uboot.toml`.
env = {}
log = "Warn"
features = [
  "common",
  "ax-feat/bus-mmio",
  "ax-feat/driver-sdmmc",
  "axplat-dyn/rk3588-clk",
  "axplat-dyn/sdmmc",
]
max_cpu_num = 8
plat_dyn = true
