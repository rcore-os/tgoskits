# Local U-Boot serial config for booting StarryOS on SG2002.
# The remote board-server config is sg2002-riscv64-board.toml.
serial = "/dev/ttyUSB0"
baud_rate = "115200"
dtb_file = "os/StarryOS/configs/board/sg2002-riscv64.dtb"

kernel_load_addr = "0x80200000"
fit_load_addr = "0x82200000"

shell_prefix = "root@starry:"
shell_init_cmd = "echo STARRY_SG2002_BOOT_OK"
success_regex = ["(?m)^STARRY_SG2002_BOOT_OK\\s*$"]
fail_regex = [
  "(?i)\\bpanic(?:ked)?\\b",
  "failed to determine root device",
]
timeout = 600
