args = [
  "-machine",
  "virt",
  "-cpu",
  "la464",
  "-nographic",
  "-m",
  "512M",
  "-device",
  "virtio-blk-pci,drive=disk0",
  "-drive",
  "id=disk0,if=none,format=raw,file=${workspace}/tmp/axbuild/rootfs/rootfs-loongarch64-alpine.img",
  "-device",
  "virtio-net-pci,netdev=net0",
  "-netdev",
  "user,id=net0",
]
# The LoongArch Starry kernel uses the dynamic UEFI platform on the default QEMU path.
uefi = true
to_bin = true
success_regex = []
fail_regex = ["(?i)\\bpanic(?:ked)?\\b"]
