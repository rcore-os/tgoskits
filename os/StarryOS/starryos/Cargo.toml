[package]
authors = [
  "Azure-stars <Azure_stars@126.com>",
  "Yuekai Jia <equation618@gmail.com>",
  "KylinSoft Co., Ltd. <https://www.kylinos.cn/>",
  "朝倉水希 <asakuramizu111@gmail.com>",
  "Mivik <mivikq@gmail.com>",
]
description = "A Linux-compatible OS kernel built on ArceOS unikernel"
edition.workspace = true
license.workspace = true
name = "starryos"
repository.workspace = true
version = "0.5.12"

[features]
default = []
myplat = ["ax-feat/myplat"]
qemu = [
  "ax-feat/defplat",
  "ax-feat/irq",
  "ax-feat/rtc",
  "ax-feat/display",
  "starry-kernel/input",
  "starry-kernel/vsock", # auxilary features
]
smp = ["ax-feat/smp", "axplat-dyn?/smp", "ax-hal/smp"]

sg2002 = [
  "ax-feat/riscv64-sg2002",
  "starry-kernel/sg2002",
]
sg2002-dyn = [
  "plat-dyn",
  "axplat-dyn/thead-mae",
  "starry-kernel/sg2002",
  "ax-driver/sg2002-placeholder",
]
plat-dyn = ["dep:axplat-dyn", "starry-kernel/plat-dyn"]

# Enable the GICv3 distributor + redistributor + system-register
# CPU interface on aarch64. Only meaningful when the target is the
# QEMU aarch64 virt platform; on other targets it is a no-op
# feature. Off by default so QEMU TCG and physical boards that
# ship GICv2 keep their existing behavior. Orthogonal to
# `cntv-timer`; for the Apple HVF profile enable both, or use the
# convenience feature `aarch64-hvf`.
gic-v3 = ["ax-feat/aarch64-gic-v3"]
# Enable the CNTV (virtual) generic timer and IRQ 27 (PPI 11)
# instead of CNTP + IRQ 30 on aarch64. Required under Apple HVF
# because CNTP is owned by EL2 there. Orthogonal to `gic-v3`.
cntv-timer = ["ax-feat/aarch64-cntv-timer"]
# Convenience feature for the Apple HVF profile: GICv3 + CNTV
# together. Equivalent to `--features gic-v3,cntv-timer`. The
# matching axconfig override is `devices.timer-irq=27`.
aarch64-hvf = ["gic-v3", "cntv-timer"]

rknpu = ["ax-driver/rknpu", "starry-kernel/rknpu"]
vf2 = ["ax-feat/riscv64-visionfive2"]

[[bin]]
name = "starryos"
path = "src/main.rs"

[[bin]]
name = "xtask"
path = "xtask/main.rs"

[dependencies]
ax-feat = { workspace = true, features = ["fs-ng-times", "irq"] }
ax-driver.workspace = true
ax-hal.workspace = true
axplat-dyn = { workspace = true, optional = true }
starry-kernel = { workspace = true, features = ["dev-log", "ext4"] }

[target.'cfg(any(windows,unix))'.dependencies]
anyhow = "1.0"
axbuild = { workspace = true }
clap = { version = "4.6", features = ["derive"] }
tokio = { version = "1.0", features = ["full"] }

[package.metadata.vendor-filter]
all-features = true
platforms = ["riscv64gc-unknown-none-elf", "loongarch64-unknown-none-softfloat"]
