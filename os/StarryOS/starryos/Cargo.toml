[package]
authors = [
  "Azure-stars <Azure_stars@126.com>",
  "Yuekai Jia <equation618@gmail.com>",
  "KylinSoft Co., Ltd. <https://www.kylinos.cn/>",
  "朝倉水希 <asakuramizu111@gmail.com>",
  "Mivik <mivikq@gmail.com>",
]
description = "A Linux-compatible OS kernel built on ArceOS unikernel"
edition.workspace = true
license.workspace = true
name = "starryos"
repository.workspace = true
version = "0.5.16"

[features]
default = []
myplat = ["ax-feat/myplat"]
qemu = [
  "ax-feat/defplat",
  "ax-feat/irq",
  "ax-feat/rtc",
  "ax-feat/display",
  "starry-kernel/input",
  "starry-kernel/vsock", # auxiliary features
]
smp = ["ax-feat/smp", "axplat-dyn?/smp", "ax-hal/smp"]

sg2002 = [
  "ax-hal/riscv64-sg2002",
  "starry-kernel/sg2002",
]
sg2002-dyn = [
  "plat-dyn",
  "axplat-dyn/thead-mae",
  "starry-kernel/sg2002",
  "ax-driver/sg2002-placeholder",
]
k230 = [
  "plat-dyn",
  "starry-kernel/k230-kpu",
  "ax-driver/k230-sdhci",
  "ax-driver/serial",
]
plat-dyn = ["dep:axplat-dyn", "starry-kernel/plat-dyn"]

rknpu = ["ax-driver/rknpu", "starry-kernel/rknpu"]
std-compat = ["starry-kernel/std-compat"]
vf2 = ["ax-hal/riscv64-visionfive2"]

[[bin]]
name = "starryos"
path = "src/main.rs"

[[bin]]
name = "xtask"
path = "xtask/main.rs"

[dependencies]
ax-feat = { workspace = true, features = ["ext-ld", "fs-ng-times", "irq"] }
ax-std = { workspace = true, features = ["ext-ld", "fs", "multitask", "irq"] }
ax-driver.workspace = true
ax-hal.workspace = true
axplat-dyn = { workspace = true, optional = true }
starry-kernel = { workspace = true, features = ["dev-log", "ext4"] }

[target.'cfg(any(windows, all(unix, not(target_env = "musl"))))'.dependencies]
anyhow = "1.0"
axbuild = { workspace = true }
clap = { version = "4.6", features = ["derive"] }
tokio = { version = "1.0", features = ["full"] }

[package.metadata.vendor-filter]
all-features = true
platforms = ["riscv64gc-unknown-none-elf", "loongarch64-unknown-none-softfloat"]
