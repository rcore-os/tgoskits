[package]
authors = [
  "Azure-stars <Azure_stars@126.com>",
  "Yuekai Jia <equation618@gmail.com>",
  "KylinSoft Co., Ltd. <https://www.kylinos.cn/>",
  "朝倉水希 <asakuramizu111@gmail.com>",
  "Mivik <mivikq@gmail.com>",
]
description = "A Linux-compatible OS kernel built on ArceOS unikernel"
edition.workspace = true
license.workspace = true
name = "starryos"
repository.workspace = true
version = "0.5.11"

[features]
default = []
kcov = ["starry-kernel/kcov"]
myplat = ["ax-feat/myplat"]
qemu = [
  "ax-feat/irq",
  "ax-feat/rtc",
  "ax-feat/display",
  "starry-kernel/input",
  "starry-kernel/vsock", # auxilary features
]
smp = ["ax-feat/smp"]

sg2002 = [
  "dep:ax-plat-riscv64-sg2002",
  "starry-kernel/sg2002",
]

rknpu = ["ax-drivers/rknpu", "starry-kernel/rknpu"]
vf2 = ["dep:axplat-riscv64-visionfive2"]

[[bin]]
name = "starryos"
path = "src/main.rs"

[[bin]]
name = "xtask"
path = "xtask/main.rs"

[dependencies]
ax-feat = { workspace = true, features = ["fs-ng-times", "irq"] }
ax-drivers.workspace = true
ax-hal.workspace = true
starry-kernel = { workspace = true, features = ["dev-log", "ext4"] }

[target.'cfg(target_arch = "riscv64")'.dependencies]
ax-plat-riscv64-sg2002 = { workspace = true, features = ["fp-simd", "irq", "rtc"], optional = true }
axplat-riscv64-visionfive2 = { workspace = true, features = ["fp-simd", "irq", "rtc"], optional = true }

[target.'cfg(any(windows,unix))'.dependencies]
anyhow = "1.0"
axbuild = { workspace = true }
clap = { version = "4.6", features = ["derive"] }
tokio = { version = "1.0", features = ["full"] }

[package.metadata.vendor-filter]
all-features = true
platforms = ["riscv64gc-unknown-none-elf", "loongarch64-unknown-none-softfloat"]
