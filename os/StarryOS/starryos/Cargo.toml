[package]
authors = [
  "Azure-stars <Azure_stars@126.com>",
  "Yuekai Jia <equation618@gmail.com>",
  "KylinSoft Co., Ltd. <https://www.kylinos.cn/>",
  "朝倉水希 <asakuramizu111@gmail.com>",
  "Mivik <mivikq@gmail.com>",
]
description = "A Linux-compatible OS kernel built on ArceOS unikernel"
edition.workspace = true
license.workspace = true
name = "starryos"
repository.workspace = true
version = "0.5.10"

[features]
default = []
kcov = ["starry-kernel/kcov"]
qemu = [
  "ax-feat/defplat",
  "ax-feat/irq",
  "ax-feat/rtc",
  "ax-feat/bus-pci",
  "ax-feat/display",
  "starry-kernel/input",
  "starry-kernel/vsock", # auxilary features
  "axplat-dyn?/rtc",
  "axplat-dyn?/intel-net",
  "axplat-dyn?/virtio-net-pci",
]
smp = ["ax-feat/smp", "axplat-dyn?/smp", "axplat-riscv64-visionfive2?/smp"]

sg2002 = ["ax-plat-riscv64-sg2002", "ax-feat/driver-cvsd", "starry-kernel/sg2002"]

rknpu = ["dep:axplat-dyn", "starry-kernel/rknpu", "axplat-dyn/rknpu"]
vf2 = ["dep:axplat-riscv64-visionfive2", "ax-feat/driver-sdmmc"]

[[bin]]
name = "starryos"
path = "src/main.rs"

[[bin]]
name = "xtask"
path = "xtask/main.rs"

[dependencies]
ax-feat = { workspace = true, features = ["fs-ng-times", "irq"] }
axplat-dyn = { workspace = true, optional = true }
starry-kernel = { workspace = true, features = ["dev-log", "ext4"] }

[target.'cfg(any(target_arch = "riscv32", target_arch = "riscv64"))'.dependencies.ax-plat-riscv64-sg2002]
workspace = true
features = ["fp-simd", "irq", "rtc"]
optional = true

[target.'cfg(any(windows,unix))'.dependencies]
anyhow = "1.0"
axbuild = { workspace = true }
clap = { version = "4.6", features = ["derive"] }
tokio = { version = "1.0", features = ["full"] }

[target.'cfg(any(target_arch = "riscv32", target_arch = "riscv64"))'.dependencies.axplat-riscv64-visionfive2]
features = ["fp-simd", "irq", "rtc"]
optional = true
workspace = true

[package.metadata.vendor-filter]
all-features = true
platforms = ["riscv64gc-unknown-none-elf", "loongarch64-unknown-none-softfloat"]
