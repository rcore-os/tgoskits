[package]
name = "kprobe_test"
edition.workspace = true
version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true
publish = false

[dependencies]
ax-driver.workspace = true
ax-hal.workspace = true
ax-runtime = { workspace = true, features = ["ext-ld", "irq"] }
axplat-dyn = { workspace = true, optional = true }
starry-kernel = { workspace = true, features = ["dev-log", "ext4"] }
ax-std = { workspace = true, default-features = false, features = [
  "alloc",
  "fd",
  "ext-ld",
  "fs",
  "multitask",
  "irq",
] }
ax-log.workspace = true

kmod-tools.workspace = true
kprobe.workspace = true

[features]
default = []
qemu = [
  "ax-runtime/irq",
  "ax-runtime/rtc",
  "ax-runtime/display",
  "starry-kernel/input",
  "starry-kernel/vsock", # auxiliary features
]
smp = ["ax-runtime/smp", "axplat-dyn?/smp", "ax-hal/smp"]

k230 = [
  "starry-kernel/k230-kpu",
  "ax-driver/k230-sdhci",
  "ax-driver/serial",
]
rknpu = ["ax-driver/rknpu", "starry-kernel/rknpu"]
