[package]
name = "arceos-rust"
description = "Rust std support for ArceOS"
authors = [
    "eternalcomet <mydragonos@outlook.com>"
]
version = "0.1.1"
edition.workspace = true
license.workspace = true
build = "build.rs"

[lib]

[build-dependencies]
walkdir = "2"

[features]
# Default features are specified in `lib/Cargo.toml`
default = []

# Multicore
smp = []

# Floating point/SIMD
fp-simd = []

# Interrupts
irq = []
ipi = []

# Custom or default platforms
myplat = []
defplat = []
plat-dyn = []

# Memory
alloc = []
paging = []
dma = []
tls = []

# Multi-threading and scheduler
multitask = []
lockdep = []
sched-fifo = []
sched-rr = []
sched-cfs = []

# File system
fd = []
fs = []

# Networking
net = []
dns = []

# Display
display = []

# Real Time Clock (RTC) Driver.
rtc = []

# Logging
log-level-off = []
log-level-error = []
log-level-warn = []
log-level-info = []
log-level-debug = []
log-level-trace = []
