[package]
name = "arceos-rust"
description = "Rust std support for ArceOS"
authors = [
    "eternalcomet <mydragonos@outlook.com>"
]
version = "0.1.0"
edition.workspace = true
license.workspace = true

[lib]

[features]
# Default features are specified in `lib/Cargo.toml`
default = []

# Multicore
smp = ["arceos-rust-interface/smp"]

# Floating point/SIMD
fp-simd = ["arceos-rust-interface/fp-simd"]

# Interrupts
irq = ["arceos-rust-interface/irq"]
ipi = ["arceos-rust-interface/ipi"]

# Custom or default platforms
myplat = ["arceos-rust-interface/myplat"]
defplat = ["arceos-rust-interface/defplat"]

# Memory
alloc = ["arceos-rust-interface/alloc"]
alloc-tlsf = ["arceos-rust-interface/alloc-tlsf"]
alloc-slab = ["arceos-rust-interface/alloc-slab"]
alloc-buddy = ["arceos-rust-interface/alloc-buddy"]
page-alloc-64g = ["arceos-rust-interface/page-alloc-64g"] # Support up to 64G memory capacity
page-alloc-4g = ["arceos-rust-interface/page-alloc-4g"] # Support up to 4G memory capacity
paging = ["arceos-rust-interface/paging"]
dma = ["arceos-rust-interface/dma"]
tls = ["arceos-rust-interface/tls"]

# Multi-threading and scheduler
multitask = ["arceos-rust-interface/multitask"]
sched-fifo = ["arceos-rust-interface/sched-fifo"]
sched-rr = ["arceos-rust-interface/sched-rr"]
sched-cfs = ["arceos-rust-interface/sched-cfs"]

# File system
fd = ["arceos-rust-interface/fd"]
fs = ["arceos-rust-interface/fs"]

# Networking
net = ["arceos-rust-interface/net"]
dns = ["arceos-rust-interface/dns"]

# Display
display = ["arceos-rust-interface/display"]

# Real Time Clock (RTC) Driver.
rtc = ["arceos-rust-interface/rtc"]

# Device drivers
bus-mmio = ["arceos-rust-interface/bus-mmio"]
bus-pci = ["arceos-rust-interface/bus-pci"]
driver-ramdisk = ["arceos-rust-interface/driver-ramdisk"]
driver-ixgbe = ["arceos-rust-interface/driver-ixgbe"]
driver-fxmac = ["arceos-rust-interface/driver-fxmac"]
driver-bcm2835-sdhci = ["arceos-rust-interface/driver-bcm2835-sdhci"]

# Logging
log-level-off = ["arceos-rust-interface/log-level-off"]
log-level-error = ["arceos-rust-interface/log-level-error"]
log-level-warn = ["arceos-rust-interface/log-level-warn"]
log-level-info = ["arceos-rust-interface/log-level-info"]
log-level-debug = ["arceos-rust-interface/log-level-debug"]
log-level-trace = ["arceos-rust-interface/log-level-trace"]

[target.'cfg(target_os = "hermit")'.dependencies]
arceos-rust-interface = { path = "lib" }
