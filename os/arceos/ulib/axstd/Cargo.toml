[package]
name = "ax-std"
version = "0.5.28"
repository = "https://github.com/rcore-os/tgoskits"
edition.workspace = true
authors = [
    "Yuekai Jia <equation618@gmail.com>",
    "yanjuguang <coolyanjg@163.com>",
    "wudashuai <wu-ds20@mails.tsinghua.edu.cn>",
    "yfblock <321353225@qq.com>",
    "scPointer <bhy18@mails.tsinghua.edu.cn>",
    "Shiping Yuan <robert_yuan@pku.edu.com>",
]
description = "ArceOS user library with an interface similar to rust std"
license.workspace = true

[lib]
name = "ax_std"
crate-type = ["rlib", "staticlib"]

[features]
default = ["alloc", "tls"]

# Multicore
smp = ["ax-runtime/smp", "ax-kspin/smp", "ax-task/smp"]

# Floating point/SIMD
fp-simd = ["ax-hal/fp-simd"]

# User space support
uspace = ["ax-runtime/uspace"]

# Hypervisor support
hv = ["ax-hal/hv"]

# Interrupts
irq = ["ax-task/irq", "ax-runtime/irq"]
ipi = ["dep:ax-ipi", "ax-runtime/ipi"]
wake-ipi = ["ax-runtime/wake-ipi"]

ext-ld = ["ax-runtime/ext-ld"]

# Memory
alloc = ["dep:ax-alloc", "ax-io/alloc"]
paging = ["alloc", "ax-runtime/paging"]
dma = ["dep:ax-dma", "ax-runtime/paging"]
tls = ["ax-runtime/tls"]

# Multi-threading and scheduler
multitask = ["ax-task/multitask", "ax-sync/multitask", "ax-runtime/multitask"]
lockdep = ["multitask", "ax-sync/lockdep", "ax-runtime/lockdep"]
task-ext = ["ax-task/task-ext"]
tracepoint-hooks = ["ax-task/tracepoint-hooks"]
sched-rr = ["irq", "multitask", "ax-task/sched-rr"]
sched-cfs = ["irq", "multitask", "ax-task/sched-cfs"]
stack-guard-page = ["ax-runtime/stack-guard-page"]
stack-protector = ["ax-runtime/stack-protector"]

# File system
fs = [
    "dep:ax-fs-ng",
    "ax-runtime/fs",
    "ax-driver/virtio-blk",
]
ext4fs = ["fs", "ax-runtime/ext4fs"]
fatfs = ["fs", "ax-runtime/fatfs"]

# Networking
net = [
    "dep:ax-net",
    "ax-runtime/net",
    "ax-driver/virtio-net",
]
vsock = ["ax-runtime/vsock"]
aic8800-wifi = ["ax-runtime/aic8800-wifi"]
dns = ["net"]

# Driver feature forwards used by std-aware apps that depend on `axstd` directly.
virtio-blk = ["ax-driver/virtio-blk"]
virtio-net = ["ax-driver/virtio-net"]
virtio-gpu = ["ax-driver/virtio-gpu"]
virtio-input = ["ax-driver/virtio-input"]
virtio-socket = ["ax-driver/virtio-socket"]

# Display
display = ["dep:ax-display", "ax-runtime/display"]

# Input
input = ["ax-runtime/input"]

# USB
usb = ["irq", "ax-driver/usb"]

# Real Time Clock (RTC) Driver.
rtc = ["ax-runtime/rtc"]

# Backtrace
backtrace = ["axbacktrace/alloc"]
dwarf = ["axbacktrace/dwarf"]

[dependencies]
ax-alloc = { workspace = true, optional = true }
axbacktrace.workspace = true
ax-display = { workspace = true, optional = true }
ax-dma = { workspace = true, optional = true }
ax-driver.workspace = true
ax-errno.workspace = true
ax-fs-ng = { workspace = true, optional = true }
ax-hal.workspace = true
ax-ipi = { workspace = true, optional = true }
ax-io.workspace = true
ax-kspin.workspace = true
ax-lazyinit.workspace = true
ax-log.workspace = true
ax-net = { workspace = true, optional = true }
ax-runtime.workspace = true
ax-sync.workspace = true
ax-task.workspace = true
lock_api.workspace = true
