[package]
name = "ax-libc"
version = "0.5.28"
repository = "https://github.com/rcore-os/tgoskits"
edition.workspace = true
authors = [
    "Yuekai Jia <equation618@gmail.com>",
    "yanjuguang <coolyanjg@163.com>",
    "wudashuai <wu-ds20@mails.tsinghua.edu.cn>",
    "yfblock <321353225@qq.com>",
    "scPointer <bhy18@mails.tsinghua.edu.cn>",
    "Shiping Yuan <robert_yuan@pku.edu.com>",
]
description = "ArceOS user program library for C apps"
license.workspace = true

[lib]
name = "ax_libc"
crate-type = ["staticlib"]

[features]
default = []

# Multicore
smp = ["ax-runtime/smp", "ax-kspin/smp", "ax-task/smp"]

# Floating point/SIMD
fp-simd = ["ax-hal/fp-simd"]

# Interrupts
irq = ["ax-task/irq", "ax-runtime/irq"]

# Memory
alloc = ["dep:ax-alloc"]
paging = ["ax-runtime/paging"]
tls = ["alloc", "ax-runtime/tls"]

# Multi-task
multitask = ["alloc", "ax-task/multitask", "ax-sync/multitask", "ax-runtime/multitask"]
lockdep = ["multitask", "ax-sync/lockdep", "ax-kspin/lockdep", "ax-runtime/lockdep"]
stack-protector = ["ax-runtime/stack-protector"]

# File system
fs = ["dep:ax-fs-ng", "ax-runtime/fs", "fd"]
ext4fs = ["fs", "ax-runtime/ext4fs"]
fatfs = ["fs", "ax-runtime/fatfs"]

# Networking
net = ["dep:ax-net", "ax-runtime/net", "fd"]

# Libc features
fd = ["alloc", "dep:scope-local"]
pipe = ["fd"]
select = ["fd"]
poll = ["fd"]
epoll = ["fd"]

[dependencies]
ax-driver.workspace = true
ax-alloc = { workspace = true, optional = true }
ax-fs-ng = { workspace = true, optional = true }
ax-hal.workspace = true
ax-kspin.workspace = true
ax-errno.workspace = true
ax-io.workspace = true
ax-log.workspace = true
ax-net = { workspace = true, optional = true }
axpoll.workspace = true
ax-runtime.workspace = true
ax-sync.workspace = true
ax-task.workspace = true
flatten_objects = "0.2"
scope-local = { workspace = true, optional = true }
spin.workspace = true

[build-dependencies]
bindgen.workspace = true
