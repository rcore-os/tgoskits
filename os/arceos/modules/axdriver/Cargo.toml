[package]
name = "ax-driver"
version = "0.5.15"
repository = "https://github.com/rcore-os/tgoskits"
edition.workspace = true
authors = [
    "Yuekai Jia <equation618@gmail.com>",
    "ChengXiang Qi <kuangjux@outlook.com>",
]
description = "ArceOS device drivers"
license.workspace = true

[features]
net = ["ax-drivers/net"]
block = ["ax-drivers/block"]
display = ["ax-drivers/display"]
input = ["ax-drivers/input"]
vsock = ["ax-drivers/vsock"]

# Enabled by features `virtio-*`
virtio = ["ax-drivers/virtio"]

# various types of drivers
virtio-blk = ["ax-drivers/virtio-blk"]
virtio-net = ["ax-drivers/virtio-net"]
virtio-gpu = ["ax-drivers/virtio-gpu"]
virtio-input = ["ax-drivers/virtio-input"]
virtio-socket = ["ax-drivers/virtio-socket"]
ramdisk = ["ax-drivers/ramdisk"]
bcm2835-sdhci = ["ax-drivers/bcm2835-sdhci"]
sdmmc = ["ax-drivers/sdmmc"]
cvsd = ["ax-drivers/cvsd"]
ahci = ["ax-drivers/ahci"]
ixgbe = ["ax-drivers/ixgbe"]
fxmac = ["ax-drivers/fxmac"]

irq = ["ax-drivers/irq"]

default = []

[dependencies]
ax-drivers.workspace = true
