[package]
authors = ["Yuekai Jia <equation618@gmail.com>"]
description = "Runtime library of ArceOS"
edition.workspace = true
license.workspace = true
name = "ax-runtime"
repository = "https://github.com/rcore-os/tgoskits"
version = "0.8.2"

[features]
default = []

dma = ["paging"]
ext-ld = []
std-compat = []
ipi = ["dep:ax-ipi"]
irq = [
  "ax-hal/irq",
  "ax-task?/irq",
  "dep:ax-percpu",
  "dep:axklib",
  "ax-driver/irq",
]
multitask = ["ax-task/multitask"]
paging = ["ax-hal/paging", "dep:ax-mm", "dep:axklib"]
rtc = ["ax-hal/rtc", "ax-driver/rtc"]
smp = ["ax-hal/smp", "ax-task?/smp"]
stack-guard-page = ["multitask", "paging", "ax-task/stack-guard-page"]
stack-protector = []
tls = ["ax-hal/tls", "ax-task?/tls"]

plat-dyn = [
  "ax-driver/plat-dyn",
  "ax-hal/plat-dyn",
  "paging",
  "irq",
  "rtc",
  "smp",
  "stack-guard-page",
  "tls",
]

display = ["dep:ax-display", "ax-driver/display"]
fs = [
  "irq",
  "multitask",
  "dma",
  "dep:ax-errno",
  "dep:ax-fs-ng",
  "ax-fs-ng/vfs",
  "dep:axfs-ng-vfs",
  "dep:spin",
  "dep:axklib",
  "dep:dma-api",
  "dep:rdif-block",
  "ax-driver/block",
]
fs-ext4 = ["fs", "ax-fs-ng/ext4"]
fs-fat = ["fs", "ax-fs-ng/fat"]
input = ["dep:ax-input", "ax-driver/input"]
net = ["dep:ax-net", "dep:rd-net", "dep:spin", "dep:axklib", "ax-driver/net"]
# SG2002 AIC8800 SoftAP Wi-Fi. Pulls the FDT probe into ax-driver and installs
# the ArceOS runtime glue (the driver cores are OS-independent) before probing.
aic8800-wifi = [
  "net",
  "plat-dyn",
  "multitask",
  "ax-driver/aic8800-wifi",
  "dep:aic8800",
  "dep:sdhci-cv1800",
]
vsock = ["net", "ax-net/vsock", "ax-driver/vsock"]

[dependencies]
aic8800 = {workspace = true, optional = true}
sdhci-cv1800 = {workspace = true, optional = true}
ax-alloc = {workspace = true}
ax-crate-interface = {workspace = true}
ax-ctor-bare = {workspace = true}
ax-display = {workspace = true, optional = true}
ax-driver = {workspace = true}
ax-errno = {workspace = true, optional = true}
ax-fs-ng = {workspace = true, optional = true}
axfs-ng-vfs = {workspace = true, optional = true}
ax-hal = {workspace = true}
ax-input = {workspace = true, optional = true}
ax-ipi = {workspace = true, optional = true}
ax-lazyinit = {workspace = true}
ax-log = {workspace = true}
ax-memory-addr = {workspace = true}
ax-mm = {workspace = true, optional = true}
ax-net = {workspace = true, optional = true}
ax-percpu = {workspace = true, optional = true}
ax-plat = {workspace = true}
ax-task = {workspace = true, optional = true}
axbacktrace = {workspace = true}
axklib = {workspace = true, optional = true}
axpanic = {workspace = true}
cfg-if = {workspace = true}
chrono = {version = "0.4", default-features = false}
dma-api = { workspace = true, optional = true }
indoc = "2"
rdif-block = { workspace = true, optional = true }
rd-net = { workspace = true, optional = true }
rdrive.workspace = true
spin = {workspace = true, optional = true}

[build-dependencies]
toml.workspace = true
