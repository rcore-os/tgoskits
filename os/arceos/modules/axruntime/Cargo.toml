[package]
authors = ["Yuekai Jia <equation618@gmail.com>"]
description = "Runtime library of ArceOS"
edition.workspace = true
license.workspace = true
name = "ax-runtime"
repository = "https://github.com/rcore-os/tgoskits"
version = "0.10.4"

[features]
default = []

ext-ld = []
std-compat = []
ipi = ["irq", "dep:ax-ipi", "ax-hal/ipi"]
# Register a lightweight IPI IRQ handler that only acknowledges SGIs so idle
# CPUs can wake and re-enter the scheduler. This intentionally does not enable
# the ax-ipi callback queue.
wake-ipi = ["irq", "ax-hal/ipi"]
irq = [
  # Required interrupt-controller probes use MMIO. Someboot's boot table maps
  # RAM only, so the runtime needs the generic DEVICE mapper before IRQ enable.
  "paging",
  "ax-hal/irq",
  "dep:rdif-intc",
  "ax-driver/irq",
]
multitask = ["irq", "dep:ax-task"]
workqueue = ["multitask"]
block = [
  "workqueue",
  "paging",
  "dep:dma-api",
  "dep:rdif-block",
  "ax-driver/block",
]
fp-simd = ["ax-hal/fp-simd"]
paging = ["ax-hal/paging", "dep:ax-mm"]
rtc = ["ax-hal/rtc", "ax-driver/rtc"]
smp = ["ax-hal/smp", "wake-ipi"]
uspace = ["ax-hal/uspace"]
lockdep = ["ax-fs-ng?/lockdep", "ax-kspin/lockdep"]
stack-guard-page = ["ipi", "multitask", "paging"]
stack-protector = []
tls = ["ax-hal/tls"]

display = ["paging", "dep:ax-display", "ax-driver/display"]
fs = [
  "block",
  "dep:ax-errno",
  "dep:ax-fs-ng",
  "ax-fs-ng/vfs",
  "dep:axfs-ng-vfs",
  "dep:spin",
]
ext4fs = ["fs", "ax-fs-ng/ext4"]
fatfs = ["fs", "ax-fs-ng/fat"]
input = ["paging", "dep:ax-input", "ax-driver/input"]
net = [
  "irq",
  "multitask",
  "paging",
  "dep:ax-net",
  "dep:rd-net",
  "dep:spin",
  "ax-driver/net",
]
# SG2002 AIC8800 SoftAP Wi-Fi. Pulls the FDT probe into ax-driver and installs
# the ArceOS runtime glue (the driver cores are OS-independent) before probing.
aic8800-wifi = [
  "net",
  "ax-driver/aic8800-wifi",
  "dep:aic8800",
  "dep:sdhci-cv1800",
]
vsock = ["net", "ax-net/vsock", "ax-driver/vsock"]

[dependencies]
aic8800 = {workspace = true, optional = true}
sdhci-cv1800 = {workspace = true, optional = true}
ax-alloc = {workspace = true}
ax-crate-interface = {workspace = true}
ax-ctor-bare = {workspace = true}
ax-cpu-local = {workspace = true}
ax-display = {workspace = true, optional = true}
ax-driver = {workspace = true}
ax-errno = {workspace = true, optional = true}
ax-fs-ng = {workspace = true, optional = true}
axfs-ng-vfs = {workspace = true, optional = true}
ax-hal = {workspace = true}
ax-input = {workspace = true, optional = true}
ax-ipi = {workspace = true, optional = true}
ax-kspin.workspace = true
ax-lazyinit = {workspace = true}
ax-log = {workspace = true}
ax-memory-addr = {workspace = true}
ax-mm = {workspace = true, optional = true}
ax-net = {workspace = true, optional = true}
ax-percpu.workspace = true
ax-plat = {workspace = true}
ax-task = {workspace = true, optional = true}
axbacktrace = {workspace = true}
axklib.workspace = true
axpanic = {workspace = true}
cfg-if = {workspace = true}
chrono = {version = "0.4", default-features = false}
dma-api = { workspace = true, optional = true }
indoc = "2"
irq-framework = { workspace = true }
rdif-block = { workspace = true, optional = true }
rdif-intc = { workspace = true, optional = true }
rd-net = { workspace = true, optional = true }
rdrive.workspace = true
spin = {workspace = true, optional = true}
thiserror.workspace = true

[build-dependencies]
quote = "1.0"

[dev-dependencies]
loom.workspace = true

[[test]]
name = "block_irq_only_contract"
required-features = ["block"]

[[test]]
name = "block_request_model"
required-features = ["block"]

[[test]]
name = "workqueue_model"
required-features = ["workqueue"]

[[test]]
name = "workqueue_loom"
required-features = ["workqueue"]

[[test]]
name = "user_entry_notification_loom"
required-features = ["multitask", "uspace"]
