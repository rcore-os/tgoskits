[package]
name = "ax-runtime"
version = "0.5.14"
repository = "https://github.com/rcore-os/tgoskits"
edition.workspace = true
authors = ["Yuekai Jia <equation618@gmail.com>"]
description = "Runtime library of ArceOS"
license.workspace = true

[features]
default = []

alloc = ["dep:ax-alloc"]
dma = ["paging"]
buddy-slab = ["alloc", "ax-alloc/buddy-slab"]
ipi = ["dep:ax-ipi"]
irq = ["ax-hal/irq", "ax-task?/irq", "dep:ax-percpu"]
multitask = ["ax-task/multitask"]
paging = ["ax-hal/paging", "dep:ax-mm", "dep:axklib"]
rtc = []
smp = ["alloc", "ax-hal/smp", "ax-task?/smp"]
tls = ["ax-hal/tls", "ax-task?/tls"]

plat-dyn = ["ax-hal/plat-dyn", "dep:axplat-dyn", "paging", "buddy-slab"]

display = ["dep:ax-display", "axplat-dyn?/display"]
driver-ramdisk = ["dep:ramdisk", "static-devices"]
fs = ["dep:ax-errno", "dep:ax-fs", "static-devices"]
fs-ng = ["dep:ax-errno", "dep:ax-fs-ng", "static-devices"]
input = ["dep:ax-input", "axplat-dyn?/input"]
net = ["dep:ax-net", "axplat-dyn?/net"]
net-ng = ["dep:ax-net-ng", "static-devices", "axplat-dyn?/net"]
static-devices = [
    "alloc",
    "dep:dma-api",
    "dep:mmio-api",
    "dep:pcie",
    "dep:rd-block",
    "dep:rd-net",
    "dep:rdrive",
    "dep:spin",
    "dep:virtio-drivers",
]
vsock = ["net-ng", "ax-net-ng/vsock", "axplat-dyn?/vsock"]

[dependencies]
ax-alloc = { workspace = true, optional = true }
axbacktrace = { workspace = true }
ax-config = { workspace = true }
ax-display = { workspace = true, optional = true }
ax-errno = { workspace = true, optional = true }
ax-fs = { workspace = true, optional = true }
ax-fs-ng = { workspace = true, optional = true }
ax-hal = { workspace = true }
ax-input = { workspace = true, optional = true }
ax-ipi = { workspace = true, optional = true }
axklib = { workspace = true, optional = true }
ax-log = { workspace = true }
ax-lazyinit = { workspace = true }
ax-memory-addr = { workspace = true }
ax-mm = { workspace = true, optional = true }
ax-net = { workspace = true, optional = true }
ax-net-ng = { workspace = true, optional = true }
axpanic = { workspace = true }
ax-plat = { workspace = true }
ax-task = { workspace = true, optional = true }
axplat-dyn = { workspace = true, optional = true }
cfg-if = { workspace = true }
chrono = { version = "0.4", default-features = false }
ax-crate-interface = { workspace = true }
ax-ctor-bare = { workspace = true }
indoc = "2"
ax-percpu = { workspace = true, optional = true }
dma-api = { workspace = true, optional = true }
mmio-api = { workspace = true, optional = true }
pcie = { workspace = true, optional = true }
ramdisk = { workspace = true, optional = true }
rd-block = { workspace = true, optional = true }
rd-net = { workspace = true, optional = true }
rdrive = { workspace = true, optional = true }
spin = { workspace = true, optional = true }
virtio-drivers = { workspace = true, optional = true }
