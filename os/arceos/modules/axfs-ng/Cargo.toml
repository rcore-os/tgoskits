[package]
name = "ax-fs-ng"
version = "0.8.4"
repository = "https://github.com/rcore-os/tgoskits"
edition.workspace = true
authors = ["Mivik <mivikq@gmail.com>"]
description = "ArceOS filesystem module"
license.workspace = true

[features]
fat = ["dep:fatfs"]
ext4 = ["dep:rsext4"]
vfs = []
lockdep = ["axfs-ng-vfs/lockdep", "ax-sync/lockdep"]

[dependencies]
ax-errno = { workspace = true }
axfs-ng-vfs = { workspace = true }
ax-io = { workspace = true, features = ["alloc"] }
ax-sync = { workspace = true, features = ["multitask"] }
bitflags = "2.10"
chrono = { workspace = true }
intrusive-collections = "0.9"
ax-kspin = { workspace = true }
log = { workspace = true }
lru = "0.16"
scope-local = { workspace = true }
slab = { version = "0.4", default-features = false }
spin = { workspace = true }
thiserror = { workspace = true }

[dependencies.rsext4]
workspace = true
optional = true

[dependencies.fatfs]
package = "starry-fatfs"
version = "0.4.1-preview.2"
default-features = false
optional = true
features = ["alloc", "lfn", "log_level_trace", "unicode"]
