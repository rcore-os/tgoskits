[package]
name = "ax-fs"
version = "0.5.11"
repository = "https://github.com/rcore-os/tgoskits"
edition.workspace = true
authors = ["Yuekai Jia <equation618@gmail.com>"]
description = "ArceOS filesystem module"
license.workspace = true

[features]
default = []
times = []
use-ramdisk = [] # TODO: init ramdisk

[dependencies]
ax-driver = { workspace = true, features = ["block"] }
ax-errno = { workspace = true }
ax-hal = { workspace = true }
ax-fs-devfs = { workspace = true }
ax-fs-ramfs = { workspace = true }
ax-fs-vfs = { workspace = true }
ax-io = { workspace = true, features = ["alloc"] }
ax-cap-access = { workspace = true }
ax-lazyinit = { workspace = true }
log = { workspace = true }
rsext4 = { workspace = true }
spin = { workspace = true }

[dependencies.axfatfs]
version = "0.1.0-pre.0"
default-features = false
features = [
  # no std
  "alloc",
  "lfn",
  "log_level_trace",
  "unicode",
]
