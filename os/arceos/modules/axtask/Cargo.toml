[package]
authors = ["Yuekai Jia <equation618@gmail.com>"]
description = "ArceOS task management module"
edition.workspace = true
license.workspace = true
name = "ax-task"
repository = "https://github.com/rcore-os/tgoskits"
version = "0.5.24"

[features]
default = []

# Full remote callback IPI support. This includes the lightweight IRQ-wake IPI
# path plus the ax-ipi callback queue used by scheduler reschedule requests.
ipi = ["irq-wake-ipi", "dep:ax-ipi"]
# Lightweight hardware IPI support for hard-IRQ task wake. This wakes the target
# CPU so its IRQ epilogue can drain the per-CPU IRQ wake queue, but does not
# enable ax-ipi remote callback execution.
irq-wake-ipi = ["ax-hal/ipi"]
multitask = [
  "stack-canary",
  "dep:axpoll",
  "dep:ax-sched",
  "dep:ax-cpumask",
  "dep:ax-crate-interface",
  "dep:futures-util",
  "dep:ax-kernel-guard",
  "dep:ax-kspin",
  "dep:ax-lazyinit",
  "dep:ax-memory-addr",
  "dep:ax-percpu",
  "dep:bare-task",
  "dep:spin",
  "dep:ax-timer-list",
]
preempt = ["ax-percpu?/preempt", "ax-kernel-guard/preempt"]
smp = ["ax-kspin/smp"]
stack-canary = []
stack-guard-page = ["multitask", "dep:ax-alloc", "dep:ax-mm", "ax-hal/paging"]
lockdep = [
  "multitask",
  "ax-kspin/lockdep",
  "dep:ax-lockdep",
  "ax-lockdep/task-context",
]
task-ext = ["dep:extern-trait"]
tls = ["ax-hal/tls"]
# Cross-crate tracepoint hook for the scheduler context switch.
# Enabling this exposes a `SchedTracepoint` interface (via `ax-crate-interface`)
# that another crate (e.g. starry-kernel) must implement; otherwise the link
# step will fail with an unresolved symbol. Pure ArceOS unikernels leave this
# off and pay no cost.
tracepoint-hooks = ["multitask"]
uspace = ["ax-hal/uspace"]

sched-cfs = ["multitask", "preempt"]
sched-fifo = ["multitask"]
sched-rr = ["multitask", "preempt"]

host-test = [
  "ax-hal/host-test",
  "ax-kspin?/host-test",
  "ax-kspin?/smp",
  "ax-percpu?/sp-naive",
]
test = ["host-test"]

[dependencies]
ax-alloc = {workspace = true, optional = true}
ax-cpumask = { workspace = true, optional = true }
ax-crate-interface = {workspace = true, optional = true}
ax-errno.workspace = true
ax-hal.workspace = true
ax-ipi = {workspace = true, optional = true}
ax-kernel-guard = {workspace = true, optional = true}
ax-lockdep = {workspace = true, optional = true}
ax-kspin = {workspace = true, optional = true}
ax-lazyinit = {workspace = true, optional = true}
ax-memory-addr = {workspace = true, optional = true}
ax-mm = {workspace = true, optional = true}
ax-percpu = {workspace = true, optional = true}
ax-sched = { workspace = true, optional = true }
ax-timer-list = {workspace = true, optional = true}
axpoll = {workspace = true, optional = true}
bare-task = {workspace = true, optional = true}
cfg-if.workspace = true
extern-trait = {version = "0.4", optional = true}
futures-util = {version = "0.3", default-features = false, optional = true, features = [
  "alloc",
  "async-await-macro",
]}
log.workspace = true
spin = {workspace = true, optional = true}

[target.'cfg(not(target_os = "none"))'.dev-dependencies]
ax-hal = { workspace = true, features = ["fp-simd"] }

[build-dependencies]
quote = "1.0"
