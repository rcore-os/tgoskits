# QEMU AArch64 board configuration for ArceOS

arch = "aarch64"
platform = "aarch64-qemu-virt"
app = "examples/helloworld"
mode = "debug"
log = "warn"

# CPU configuration
smp = 1

# Memory configuration (e.g., "128M", "256M", "1G")
mem = "128M"

# ArceOS features
# Available: fs, net, fp-simd, irq, alloc, multitask, fd, pipe, select, epoll
features = []

# Application-specific features
app_features = []

[axlibc]
# Enable axlibc for C applications (if needed)
enabled = false

[qemu]
# Enable block device support
blk = false

# Disk image path (optional, uses default if not specified)
# disk_img = "resources/disk.img"

# Enable network support
net = false

# Network device type: "user", "tap", or "bridge"
net_dev = "user"

# Enable graphic output
graphic = false

# Enable hardware acceleration (KVM/HVF)
accel = false

# Extra QEMU arguments
extra_args = []
