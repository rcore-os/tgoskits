[package]
name = "ax-api"
version.workspace = true
edition.workspace = true
authors = ["Yuekai Jia <equation618@gmail.com>"]
description = "Public APIs and types for ArceOS modules"
license.workspace = true
homepage.workspace = true
repository = "https://github.com/arceos-org/arceos/tree/main/api/arceos_api"

[features]
default = []

irq = ["ax-feat/irq"]
ipi = ["dep:axipi", "ax-feat/ipi"]
alloc = ["dep:axalloc", "ax-feat/alloc"]
paging = ["dep:axmm", "ax-feat/paging"]
dma = ["dep:axdma", "ax-feat/dma"]
multitask = ["axtask/multitask", "axsync/multitask", "ax-feat/multitask"]
fs = ["dep:ax-fs", "dep:axdriver", "ax-feat/fs"]
net = ["dep:axnet", "dep:axdriver", "ax-feat/net"]
display = ["dep:ax-display", "dep:axdriver", "ax-feat/display"]


# Use dummy functions if the feature is not enabled
dummy-if-not-enabled = []

[dependencies]
axalloc = { workspace = true, optional = true }
axconfig.workspace = true
ax-display = { workspace = true, optional = true }
axdma = { workspace = true, optional = true }
axdriver = { workspace = true, optional = true }
axerrno.workspace = true
ax-feat.workspace = true
ax-fs = { workspace = true, optional = true }
axhal.workspace = true
axio.workspace = true
axipi = { workspace = true, optional = true }
axlog.workspace = true
axmm = { workspace = true, optional = true }
axnet = { workspace = true, optional = true }
ax-runtime.workspace = true
axsync.workspace = true
axtask = { workspace = true, optional = true }
