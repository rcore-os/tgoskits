board_type = "OrangePi-5-Plus"
shell_prefix = "root@starry:/root #"
success_regex = [
  '(?m)^uvc-fps: saved id=4 path=/root/uvc-frames/frame-000004\.jpg bytes=[1-9][0-9]*$'
  ]
fail_regex = [
  '(?i)\bpanic(?:ked)?\b',
  '(?m)^uvc-fps: error: .*$',
  '(?m)^uvc-fps: save error: .*$',
  '(?m)^unable to initialize libusb: .*$',
  '(?i)(uvc-fps|sh): .*not found',
]
timeout = 300
