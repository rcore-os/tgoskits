board_type = "OrangePi-5-Plus"
shell_prefix = "root@starry:/root #"
success_regex = [
  '(?m)^-.*frame-000001\.jpg$'
  ]
fail_regex = [
  '(?i)\bpanic(?:ked)?\b',
  '(?m)^uvc-fps: error: .*$',
  '(?m)^uvc-fps: save error: .*$',
  '(?m)^unable to initialize libusb: .*$',
  '(?i)(uvc-fps|sh): .*not found',
]
timeout = 300
