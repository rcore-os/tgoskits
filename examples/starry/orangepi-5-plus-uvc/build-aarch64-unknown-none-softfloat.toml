# Build-time config for the Orange Pi 5 Plus UVC Starry example.
target = "aarch64-unknown-none-softfloat"
env = {}
features = [
  "ax-hal/plat-dyn",
  "starry-kernel/plat-dyn",
  "ax-drivers/rockchip-soc",
  "ax-drivers/rockchip-dwc-xhci",
  "ax-drivers/rockchip-sdhci",
]
log = "Info"
max_cpu_num = 1
plat_dyn = true
