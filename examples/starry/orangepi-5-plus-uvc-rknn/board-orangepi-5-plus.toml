board_type = "OrangePi-5-Plus"
shell_prefix = "root@starry:/root #"
shell_init_cmd = '''
echo UVC_RKNN_STREAM_BEGIN && cd /rknn_yolov8_image && export LD_LIBRARY_PATH=/rknn_yolov8_image/lib:/usr/local/lib:/usr/lib/aarch64-linux-gnu:${LD_LIBRARY_PATH:-} && ./rknn_yolov8_stream --model model/yolov8.rknn --label model/coco_80_labels_list.txt --device 0 --width 320 --height 240 --fps 30 --duration-sec 0 --infer-every 2 --max-inferences 0 --http-port 8080 --http-fps 15 --push-host 10.3.10.11 --push-port 18080 --push-fps 15 --jpeg-quality 80
'''
#success_regex = [
#  "(?m)^YOLO_RESULT index=3 .*$",
#]
fail_regex = [
  "(?i)\\bpanic(?:ked)?\\b",
  "(?m)^uvc-fps: error: .*$",
  "(?m)^uvc-fps: save error: .*$",
  "(?m)^rknn_init fail!.*$",
  "(?m)^read_image fail!.*$",
  "(?m)^inference_yolov8_model fail!.*$",
  "(?m)^(uvc_init|uvc_open|uvc_start_streaming|uvc_get_device_list) failed: .*$",
  "(?m)^dlopen libuvc\\.so failed: .*$",
  "(?i)error while loading shared libraries",
  "(?i)(uvc-fps|rknn_yolov8_image|rknn_yolov8_stream|sh): .*not found",
]
timeout = 86400
