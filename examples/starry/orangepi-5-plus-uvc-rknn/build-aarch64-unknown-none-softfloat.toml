# Build-time config for the Orange Pi 5 Plus UVC + RKNN Starry example.
target = "aarch64-unknown-none-softfloat"
env = {}
features = [
  "ax-hal/plat-dyn",
  "starry-kernel/plat-dyn",
  "ax-drivers/irq",
  "ax-drivers/pci-list-devices",
  "ax-drivers/realtek-rtl8125",
  "ax-drivers/rockchip-soc",
  "ax-drivers/rockchip-dwc-xhci",
  "ax-drivers/rockchip-sdhci",
  "rknpu",
]
log = "Warn"
max_cpu_num = 1
plat_dyn = true
